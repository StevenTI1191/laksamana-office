<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordering — Laksamana Muda</title>
    <meta name="description" content="Pilih sisi Kitchen atau Purchasing untuk melanjutkan ke login.">
    <meta name="theme-color" content="#A9791F">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#A9791F', 'gold-2': '#C8961F', 'gold-dim': '#7A560F', 'gold-soft': '#F2E9D3',
                        ink: '#2A2620', 'ink-2': '#3A3428', paper: '#F7F6F4', line: '#E7E1D3',
                        muted: '#5C574D', 'muted-2': '#928C80'
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        .tile { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
        .tile:hover { transform: translateY(-4px); box-shadow: 0 18px 40px -18px rgba(122,86,15,.45); border-color: #C8961F; }
        @media (prefers-reduced-motion: reduce){ .tile{transition:none} .tile:hover{transform:none} }
    </style>
</head>
<body class="min-h-screen bg-paper text-ink">

    <!-- Tujuan tiap sisi -->
    <script>
        const SIDES = { kitchen: "./kitchen/", purchasing: "./purchasing/" };
        function goTo(side) { window.location.href = SIDES[side]; }
    </script>

    <div class="max-w-4xl mx-auto px-5 py-10 sm:py-16">

        <!-- Header -->
        <div class="mb-6">
            <a href="../" class="inline-flex items-center gap-2 text-[11px] font-bold text-muted hover:text-gold-dim transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Office
            </a>
        </div>

        <header class="flex items-center gap-4 mb-10 sm:mb-12">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-gold-2 to-gold-dim flex items-center justify-center shadow-lg shadow-gold-dim/25">
                <i class="fa-solid fa-box-open text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight leading-none">Ordering</h1>
                <p class="text-[11px] sm:text-xs font-bold uppercase tracking-[0.2em] text-gold mt-1.5">Kitchen · Purchasing</p>
            </div>
        </header>

        <div class="mb-8">
            <h2 class="text-2xl sm:text-3xl font-extrabold tracking-tight">Pilih Sisi Anda</h2>
            <p class="text-muted text-sm font-medium mt-2 max-w-xl">Setiap sisi punya login sendiri. Anda bisa berpindah kapan saja dari halaman login masing-masing.</p>
        </div>

        <!-- Pilihan sisi -->
        <div class="grid sm:grid-cols-2 gap-4 sm:gap-5">

            <button onclick="goTo('kitchen')"
                    class="tile group text-left bg-white border border-line rounded-3xl p-6 focus:outline-none focus:ring-2 focus:ring-gold">
                <div class="flex items-center justify-between mb-5">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-xl text-white shadow-lg shadow-gold-dim/20 bg-gradient-to-br from-gold-2 to-gold-dim">
                        <i class="fa-solid fa-kitchen-set"></i>
                    </div>
                    <i class="fa-solid fa-arrow-right text-muted-2 group-hover:text-gold group-hover:translate-x-1 transition-all"></i>
                </div>
                <h3 class="text-lg font-extrabold tracking-tight text-ink">Kitchen</h3>
                <p class="text-[11px] font-bold uppercase tracking-wider text-gold-dim mt-1">Order &amp; Check-in</p>
                <p class="text-muted text-[13px] font-medium mt-2 leading-relaxed">Input order belanja &amp; check-in penerimaan. Login per staf (multi-akun).</p>
            </button>

            <button onclick="goTo('purchasing')"
                    class="tile group text-left bg-white border border-line rounded-3xl p-6 focus:outline-none focus:ring-2 focus:ring-gold">
                <div class="flex items-center justify-between mb-5">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-xl text-white shadow-lg shadow-gold-dim/20 bg-gradient-to-br from-gold-2 to-gold-dim">
                        <i class="fa-solid fa-clipboard-list"></i>
                    </div>
                    <i class="fa-solid fa-arrow-right text-muted-2 group-hover:text-gold group-hover:translate-x-1 transition-all"></i>
                </div>
                <h3 class="text-lg font-extrabold tracking-tight text-ink">Purchasing</h3>
                <p class="text-[11px] font-bold uppercase tracking-wider text-gold-dim mt-1">Panel Pembelian</p>
                <p class="text-muted text-[13px] font-medium mt-2 leading-relaxed">Kelola antrian order, vendor, dan dispatch WhatsApp.</p>
            </button>

        </div>
    </div>

</body>
</html>
