; PHP Production Settings untuk EventManagement

[PHP]
; Upload & POST (poster maks 10MB + kontrak 5MB + overhead)
upload_max_filesize  = 12M
post_max_size        = 30M
max_execution_time   = 120
max_input_time       = 120
memory_limit         = 256M

; Error reporting (sembunyikan di production)
display_errors       = Off
display_startup_errors = Off
log_errors           = On
error_log            = /var/www/html/storage/logs/php_errors.log

; Timezone
date.timezone        = Asia/Jakarta

; Sessions
session.cookie_httponly = 1
session.cookie_secure   = 1
session.use_strict_mode = 1

[opcache]
; OPcache untuk performa lebih baik di production
opcache.enable            = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.validate_timestamps  = 0
opcache.save_comments        = 1
opcache.fast_shutdown        = 1
