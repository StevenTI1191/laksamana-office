# =============================================================================
# HTTP → HTTPS redirect (semua domain)
# Juga melayani Let's Encrypt ACME challenge
# =============================================================================
server {
    listen 80;
    server_name laksamanamuda.my.id www.laksamanamuda.my.id backstage.laksamanamuda.my.id;

    # Dibutuhkan certbot untuk verifikasi domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# =============================================================================
# CLIENT — laksamanamuda.my.id (https)
# =============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name laksamanamuda.my.id www.laksamanamuda.my.id;

    # --- SSL ---
    ssl_certificate     /etc/letsencrypt/live/laksamanamuda.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laksamanamuda.my.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Root ---
    root  /var/www/html/public;
    index index.php;

    # --- Upload size ---
    client_max_body_size 30M;

    # --- File privat (bukti/kontrak) disajikan via route PHP (auth-protected) ---
    # ^~ agar menang atas regex static .jpg/.png di bawah; tanpa ini gambar bukti 404.
    location ^~ /bukti-pembayaran/ { try_files $uri /index.php?$query_string; }
    location ^~ /bukti-transaksi/  { try_files $uri /index.php?$query_string; }
    location ^~ /kontrak/          { try_files $uri /index.php?$query_string; }

    # --- Static assets (cache lama, immutable karena Vite hashing) ---
    location ~* \.(css|js|woff|woff2|ttf|svg|ico|webp|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Main routing ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- PHP-FPM ---
    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_hide_header     X-Powered-By;
        # Cegah 502 "upstream sent too big header" (header respons besar: cookie/flash/session)
        fastcgi_buffer_size       32k;
        fastcgi_buffers           8 16k;
        fastcgi_busy_buffers_size 64k;
    }

    # --- WebSocket proxy untuk Reverb (client domain) ---
    # Trailing slash WAJIB: tanpa itu /app jadi prefix match dan menangkap
    # /appointment/* (salah dikirim ke Reverb → "Not found.")
    location /app/ {
        proxy_pass          http://reverb:9090;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
    }

    # --- Block hidden files (kecuali .well-known) ---
    location ~ /\.(?!well-known).* {
        deny all;
    }
}


# =============================================================================
# BACKSTAGE — backstage.laksamanamuda.my.id (https)
# =============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name backstage.laksamanamuda.my.id;

    # --- SSL (gunakan sertifikat wildcard atau sertifikat tersendiri) ---
    ssl_certificate     /etc/letsencrypt/live/laksamanamuda.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laksamanamuda.my.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Root ---
    root  /var/www/html/public;
    index index.php;

    client_max_body_size 30M;

    # --- File privat (bukti/kontrak) disajikan via route PHP (auth-protected) ---
    location ^~ /bukti-pembayaran/ { try_files $uri /index.php?$query_string; }
    location ^~ /bukti-transaksi/  { try_files $uri /index.php?$query_string; }
    location ^~ /kontrak/          { try_files $uri /index.php?$query_string; }

    location ~* \.(css|js|woff|woff2|ttf|svg|ico|webp|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_hide_header     X-Powered-By;
        # Cegah 502 "upstream sent too big header" (header respons besar: cookie/flash/session)
        fastcgi_buffer_size       32k;
        fastcgi_buffers           8 16k;
        fastcgi_busy_buffers_size 64k;
    }

    # --- WebSocket proxy untuk Reverb (backstage domain) ---
    # Trailing slash WAJIB (lihat catatan di blok client domain)
    location /app/ {
        proxy_pass          http://reverb:9090;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
