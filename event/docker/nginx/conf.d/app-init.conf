# =============================================================================
# INIT CONFIG — HTTP only (dipakai SEBELUM SSL cert tersedia)
# Setelah certbot selesai, file ini diganti dengan app.conf
# =============================================================================
server {
    listen 80;
    server_name laksamanamuda.my.id www.laksamanamuda.my.id backstage.laksamanamuda.my.id;

    # Certbot ACME challenge (untuk verifikasi kepemilikan domain)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Semua request lain → tolak dulu (belum siap)
    location / {
        return 503;
    }
}
