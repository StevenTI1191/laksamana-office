<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Sistem Reservasi — Laksamana Muda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1F3A; --ink-2:#12294a; --ink-3:#1c3557;
  --gold:#E3A008; --gold-2:#F5C542; --gold-soft:#FBF3DE;
  --paper:#F6F3EC; --surface:#FFFFFF; --line:#E4DECF;
  --text:#16202E; --muted:#647084; --muted-2:#8a94a5;
  --ok:#137E4E; --ok-bg:#E4F5EC;
  --warn:#B7791F; --warn-bg:#FBF0D9;
  --danger:#C0362C; --danger-bg:#FBE6E3;
  --info:#1F5FA8; --info-bg:#E6F0FB;
  --purple:#6B46C1; --purple-bg:#EFE9FB;
  --radius:14px; --radius-sm:10px;
  --shadow:0 1px 2px rgba(11,31,58,.05),0 8px 24px rgba(11,31,58,.06);
  --shadow-lg:0 12px 40px rgba(11,31,58,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--paper); color:var(--text);
  font-size:15.5px; line-height:1.55; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif; line-height:1.15; color:var(--ink)}
button{font-family:inherit; cursor:pointer}
input,select,textarea{font-family:inherit; font-size:15px}
a{color:var(--info)}
.hidden{display:none !important}

/* ---------- LOGIN ---------- */
#loginScreen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(227,160,8,.10), transparent 60%),
    linear-gradient(160deg,var(--ink) 0%,#081428 100%);
  padding:24px;
}
.login-card{
  width:100%; max-width:440px; background:var(--surface); border-radius:20px;
  box-shadow:var(--shadow-lg); padding:38px 34px; text-align:center;
}
.login-card img{width:118px; height:118px; object-fit:contain; margin:0 auto 6px}
.login-card .brand{font-family:'Fraunces';font-weight:700;font-size:26px;color:var(--ink);letter-spacing:.5px}
.login-card .tag{font-size:12.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-top:2px}
.login-card .sub{color:var(--muted);font-size:14px;margin:16px 0 22px}
.field{text-align:left;margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(227,160,8,.15)
}
.btn{
  border:none;border-radius:var(--radius-sm);padding:12px 18px;font-weight:600;font-size:15px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .05s,filter .15s,background .15s
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--gold);color:#3a2a00}
.btn-primary:hover{filter:brightness(1.05)}
.btn-ink{background:var(--ink);color:#fff}
.btn-ink:hover{background:var(--ink-2)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn-ghost:hover{background:var(--paper)}
.btn-ok{background:var(--ok);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-wa{background:#25D366;color:#0a3a1c}
.btn-wa:hover{filter:brightness(1.04)}
.btn-block{width:100%}
.btn-sm{padding:7px 12px;font-size:13.5px;border-radius:8px}
.btn-xs{padding:5px 9px;font-size:12.5px;border-radius:7px}

/* ---------- APP SHELL ---------- */
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{
  background:linear-gradient(180deg,var(--ink) 0%,#0a1c34 100%);
  color:#fff;padding:0 18px;display:flex;align-items:center;gap:14px;
  height:60px;position:sticky;top:0;z-index:40;box-shadow:0 2px 12px rgba(11,31,58,.25)
}
.topbar .logo{width:38px;height:38px;object-fit:contain;flex:none}
.topbar .title{font-family:'Fraunces';font-weight:700;font-size:18px;letter-spacing:.3px;white-space:nowrap}
.topbar .title small{display:block;font-family:'Inter';font-weight:500;font-size:10.5px;letter-spacing:2.5px;color:var(--gold-2);text-transform:uppercase}
.topbar .spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.08);padding:6px 8px 6px 12px;border-radius:30px}
.user-chip .avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#3a2a00;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.user-chip .info{line-height:1.2}
.user-chip .info b{font-size:13.5px;color:#fff}
.user-chip .info span{font-size:11px;color:var(--gold-2);text-transform:capitalize}
.logout-x{background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px}
.logout-x:hover{background:rgba(255,255,255,.2)}

.nav{background:var(--ink-2);padding:0 10px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:60px;z-index:39;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav::-webkit-scrollbar{height:0}
.nav button{
  background:none;border:none;color:#b9c6da;padding:13px 15px;font-size:14px;font-weight:600;
  border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px;transition:color .15s
}
.nav button .ico{font-size:16px}
.nav button:hover{color:#fff}
.nav button.active{color:var(--gold-2);border-bottom-color:var(--gold)}
.nav button .badge{background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}

.main{flex:1;padding:22px;max-width:1440px;width:100%;margin:0 auto}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.page-head h2{font-size:26px;font-weight:700}
.page-head .desc{color:var(--muted);font-size:14px;margin-top:2px}

/* ---------- CARDS / RECAP ---------- */
.recap-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:13px;margin-bottom:20px}
.recap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.recap::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
.recap.ok::before{background:var(--ok)}.recap.warn::before{background:var(--warn)}.recap.danger::before{background:var(--danger)}.recap.info::before{background:var(--info)}.recap.purple::before{background:var(--purple)}
.recap .lbl{font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
.recap .val{font-family:'Fraunces';font-weight:700;font-size:30px;color:var(--ink);margin-top:6px;line-height:1}
.recap .val small{font-size:15px;color:var(--muted);font-weight:500;font-family:'Inter'}
.recap .sub{font-size:12.5px;color:var(--muted);margin-top:5px}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px}
.panel-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.panel-head h3{font-size:18px;font-weight:600}
.panel-body{padding:18px}

/* ---------- FILTERS ---------- */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.filters .field{margin-bottom:0}
.filters .field label{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.filters .field input,.filters .field select{padding:9px 11px;min-width:130px}

/* ---------- TABLE ---------- */
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:var(--ink);color:#fff;text-align:left;padding:11px 13px;font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;position:sticky;top:0}
tbody td{padding:11px 13px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover{background:var(--gold-soft)}
tbody tr:last-child td{border-bottom:none}
td .name{font-weight:600;color:var(--ink)}
td .muted{color:var(--muted);font-size:13px}
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:8px}

/* ---------- BADGES ---------- */
.badge-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.st-pending{background:var(--warn-bg);color:var(--warn)}
.st-confirmed{background:var(--info-bg);color:var(--info)}
.st-checkedin{background:var(--ok-bg);color:var(--ok)}
.st-completed{background:#EDEFF2;color:#4a5568}
.st-noshow{background:var(--danger-bg);color:var(--danger)}
.st-cancelled{background:#EDEFF2;color:var(--muted)}
.dp-yes{background:var(--ok-bg);color:var(--ok)}
.dp-no{background:var(--warn-bg);color:var(--warn)}
.tag-vip{background:var(--purple-bg);color:var(--purple)}
.tag-loyal{background:var(--gold-soft);color:var(--warn)}
.tag-new{background:var(--info-bg);color:var(--info)}
.tag-blacklist{background:var(--danger-bg);color:var(--danger)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ---------- FORM GRID ---------- */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.form-grid .full{grid-column:1/-1}
.req{color:var(--danger)}
.hint{font-size:12px;color:var(--muted);margin-top:4px}
.inline-warn{background:var(--warn-bg);border:1px solid #EBD6A6;color:#7a5a12;padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px;display:flex;gap:8px}
.inline-danger{background:var(--danger-bg);border:1px solid #E7BDB8;color:#8a2820;padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px;display:flex;gap:8px}
.inline-info{background:var(--info-bg);border:1px solid #C4DBF3;color:#1a4d85;padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;margin-top:8px;display:flex;gap:8px}
.toggle-row{display:flex;gap:10px}
.toggle-row label{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;border:1.5px solid var(--line);border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);transition:.15s}
.toggle-row input{display:none}
.toggle-row input:checked+span{color:var(--ink)}
.toggle-row label:has(input:checked){border-color:var(--gold);background:var(--gold-soft);color:var(--ink)}

/* ---------- MODAL ---------- */
.modal-back{position:fixed;inset:0;background:rgba(11,31,58,.55);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:26px 16px;overflow-y:auto}
.modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:620px;margin:auto 0;animation:pop .18s ease}
.modal.wide{max-width:820px}
@keyframes pop{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:20px}
.modal-body{padding:22px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.close-x{background:var(--paper);border:none;width:34px;height:34px;border-radius:50%;font-size:18px;color:var(--muted)}
.close-x:hover{background:var(--line)}

/* ---------- DETAIL ---------- */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 22px}
.detail-grid .full{grid-column:1/-1}
.detail-item .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.detail-item .v{font-size:15px;color:var(--ink);font-weight:500;margin-top:2px;word-break:break-word}
.section-title{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line);grid-column:1/-1}

/* ---------- WA OPTIONS ---------- */
.wa-target{border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.wa-target h4{font-family:'Inter';font-size:14.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:5px}
.wa-target p{font-size:12.5px;color:var(--muted);margin-bottom:10px}
.wa-preview{background:#EAF6ED;border:1px solid #C9EBD3;border-radius:10px;padding:12px 13px;font-size:13px;white-space:pre-wrap;color:#0c3a1e;max-height:200px;overflow-y:auto;margin-bottom:10px;font-family:ui-monospace,monospace;line-height:1.5}
.wa-actions{display:flex;gap:8px;flex-wrap:wrap}
.check-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.check-list label{display:flex;align-items:center;gap:7px;font-size:13.5px;padding:4px 0}
.check-list input{width:16px;height:16px;accent-color:var(--gold)}

/* ---------- CALENDAR ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-head h3{font-size:20px}
.cal-nav{display:flex;gap:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:4px}
.cal-cell{background:var(--paper);border:1px solid var(--line);border-radius:10px;min-height:78px;padding:7px;cursor:pointer;transition:.12s;position:relative}
.cal-cell:hover{border-color:var(--gold);background:var(--gold-soft)}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{border-color:var(--gold);border-width:2px}
.cal-cell .d{font-size:13px;font-weight:700;color:var(--ink)}
.cal-cell .cnt{font-size:11px;color:var(--muted);margin-top:2px}
.cal-bar{height:5px;border-radius:3px;margin-top:6px;background:var(--line)}
.cal-cell.busy-1 .cal-bar{background:#A7D8B9}
.cal-cell.busy-2 .cal-bar{background:var(--gold-2)}
.cal-cell.busy-3 .cal-bar{background:#E89B4B}
.cal-cell.busy-4 .cal-bar{background:var(--danger)}
.cal-cell .mini{display:inline-block;background:var(--ink);color:#fff;font-size:10px;font-weight:700;border-radius:8px;padding:0 5px;margin-top:4px}

/* ---------- ANALYTICS ---------- */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bar-item{margin-bottom:11px}
.bar-item .bl{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:4px}
.bar-item .bl b{color:var(--ink)}
.bar-track{height:14px;background:var(--paper);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));border-radius:8px;transition:width .5s}
.bar-fill.blue{background:linear-gradient(90deg,var(--info),#5b9bd8)}
.bar-fill.green{background:linear-gradient(90deg,var(--ok),#3aa870)}
.bar-fill.red{background:linear-gradient(90deg,var(--danger),#e07267)}

/* ---------- MISC ---------- */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);z-index:200;display:flex;align-items:center;gap:9px;animation:up .25s ease}
@keyframes up{from{transform:translateX(-50%) translateY(14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.toast.ok{background:var(--ok)}.toast.err{background:var(--danger)}
.mini-actions{display:flex;gap:6px;flex-wrap:wrap}
.search-box{position:relative}
.search-box input{padding-left:36px !important}
.search-box .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.pill-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--paper);color:var(--muted);border:1px solid var(--line)}
.divider{height:1px;background:var(--line);margin:16px 0}
.master-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.master-tag{display:inline-flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:5px 6px 5px 12px;font-size:13.5px}
.master-tag button{background:none;border:none;color:var(--danger);font-size:16px;line-height:1;padding:0 3px}
.rolehint{font-size:12px;color:var(--muted);background:var(--gold-soft);border:1px solid #EBD6A6;padding:8px 12px;border-radius:8px;margin-bottom:14px;display:flex;gap:8px}
.fu-log{border-left:3px solid var(--gold);padding:8px 0 8px 12px;margin-bottom:8px;font-size:13px}
.fu-log .meta{color:var(--muted);font-size:11.5px}
.count-tag{background:var(--ink);color:#fff;font-size:12px;font-weight:600;border-radius:20px;padding:2px 10px}

@media(max-width:820px){
  .main{padding:14px}
  .form-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .chart-row{grid-template-columns:1fr}
  .check-list{grid-template-columns:1fr}
  .page-head h2{font-size:22px}
  .topbar .title{font-size:15px}
  .topbar .title small{display:none}
  .user-chip .info{display:none}
  body{font-size:15px}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <img id="loginLogo" alt="Laksamana Muda">
    <div class="brand">LAKSAMANA MUDA</div>
    <div class="tag">Coffee &amp; Live Space</div>
    <div class="sub">Sistem Reservasi Digital — masuk untuk memulai</div>
    <div class="field">
      <label>Pilih Nama / Akun</label>
      <select id="loginUser"></select>
    </div>
    <div class="field">
      <label>Role</label>
      <input id="loginRole" readonly style="background:var(--paper);color:var(--muted)">
    </div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">⚓ Masuk</button>
    <p style="font-size:11.5px;color:var(--muted-2);margin-top:16px">Data tersimpan lokal di perangkat ini (localStorage).</p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <img class="logo" id="topLogo" alt="">
    <div class="title">Reservasi Laksamana Muda<small>Sail to Good Taste, Stay for the Vibes</small></div>
    <div class="spacer"></div>
    <div class="user-chip">
      <div class="avatar" id="userAvatar">?</div>
      <div class="info"><b id="userName">—</b><span id="userRole">—</span></div>
    </div>
    <button class="logout-x" title="Keluar" onclick="doLogout()">⏻</button>
  </div>

  <nav class="nav" id="navBar"></nav>

  <div class="main">
    <div id="page-dashboard" class="page"></div>
    <div id="page-input" class="page hidden"></div>
    <div id="page-hariH" class="page hidden"></div>
    <div id="page-riwayat" class="page hidden"></div>
    <div id="page-analitik" class="page hidden"></div>
    <div id="page-master" class="page hidden"></div>
    <div id="page-audit" class="page hidden"></div>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

/* ================= UTIL ================= */
function uid(){ return "r"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function rp(n){ n=Number(n)||0; return "Rp "+n.toLocaleString("id-ID"); }
function normPhone(p){ let x=(p||"").replace(/[^0-9]/g,""); if(x.startsWith("0")) x="62"+x.slice(1); else if(x.startsWith("62")){} else if(x.length>0 && !x.startsWith("62")) x="62"+x; return x; }
function displayPhone(p){ return (p||"").replace(/[^0-9]/g,""); }
function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtDate(s){ if(!s) return "-"; const d=new Date(s+"T00:00:00"); if(isNaN(d)) return s; return d.toLocaleDateString("id-ID",{weekday:"short",day:"numeric",month:"short",year:"numeric"}); }
function fmtDateShort(s){ if(!s) return "-"; const d=new Date(s+"T00:00:00"); if(isNaN(d)) return s; return d.toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric"}); }
function fmtTime(t){ return t||"-"; }
function fmtTs(ts){ if(!ts) return "-"; return new Date(ts).toLocaleString("id-ID",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }
function byId(id){ return document.getElementById(id); }

function toast(msg,type){ 
  const el=document.createElement("div"); el.className="toast "+(type||""); 
  el.innerHTML=(type==="ok"?"✅ ":type==="err"?"⚠️ ":"")+esc(msg);
  byId("toastRoot").appendChild(el);
  setTimeout(()=>{el.style.transition="opacity .3s";el.style.opacity="0";setTimeout(()=>el.remove(),300);},2600);
}
function openModal(html, wide){
  byId("modalRoot").innerHTML=`<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal ${wide?'wide':''}">${html}</div></div>`;
}
function closeModal(){ byId("modalRoot").innerHTML=""; }

/* customer profile dari nomor HP (CRM ringan) */
function customerProfile(phone){
  const key=normPhone(phone);
  const hist = STATE.reservations.filter(r=>normPhone(r.phone)===key);
  const done = hist.filter(r=>["Completed","Checked-in"].includes(r.status));
  const noshow = hist.filter(r=>r.status==="No-show").length;
  const visits = done.length;
  let type="Baru";
  if(visits>=5) type="Loyal";
  else if(visits>=1) type="Repeat";
  const blacklist = noshow>=2;
  const isMember = hist.some(r=>r.member);
  const memberNo = (hist.find(r=>r.member && r.memberNo)||{}).memberNo || "";
  const vip = hist.some(r=>r.vip) || visits>=8;
  const lastVisit = done.map(r=>r.date).sort().slice(-1)[0]||null;
  const avgPax = hist.length? Math.round(hist.reduce((a,r)=>a+(Number(r.pax)||0),0)/hist.length) : 0;
  return {key,count:hist.length,visits,noshow,type,blacklist,isMember,memberNo,vip,lastVisit,avgPax,name:(hist[0]||{}).name||""};
}

/* ================= NAV / ROUTING ================= */
let CURRENT_PAGE = "dashboard";
function buildNav(){
  const allowed = ROLE_NAV[SESSION.role];
  byId("navBar").innerHTML = NAV_ITEMS.filter(n=>allowed.includes(n.id)).map(n=>{
    let badge="";
    if(n.id==="hariH"){ const c=needFollowUpCount(); if(c>0) badge=`<span class="badge">${c}</span>`; }
    const click = n.id==="input" ? "newReservation()" : `navigate('${n.id}')`;
    return `<button data-nav="${n.id}" onclick="${click}"><span class="ico">${n.ico}</span>${n.label}${badge}</button>`;
  }).join("");
}
function navigate(page){
  const allowed = ROLE_NAV[SESSION.role];
  if(!allowed.includes(page)) page=allowed[0];
  CURRENT_PAGE=page;
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  byId("page-"+page).classList.remove("hidden");
  document.querySelectorAll("#navBar button").forEach(b=>b.classList.toggle("active", b.dataset.nav===page));
  window.scrollTo(0,0);
  if(page==="dashboard") renderDashboard();
  else if(page==="input") renderInput(EDIT_ID);
  else if(page==="hariH") renderHariH();
  else if(page==="riwayat") renderRiwayat();
  else if(page==="analitik") renderAnalitik();
  else if(page==="master") renderMaster();
  else if(page==="audit") renderAudit();
}

function needFollowUpCount(){
  const t=todayStr();
  return STATE.reservations.filter(r=>r.date===t && ["Pending","Confirmed"].includes(r.status)).length;
}

/* helper: reservasi untuk sebuah meja/tanggal (deteksi bentrok) */
function conflictCheck(date, table, time, exceptId){
  if(!table) return null;
  return STATE.reservations.find(r=>r.id!==exceptId && r.date===date && r.table===table &&
    !["Cancelled","No-show"].includes(r.status) &&
    Math.abs(toMin(r.time)-toMin(time))<120);
}
function toMin(t){ if(!t) return 0; const[h,m]=t.split(":").map(Number); return h*60+m; }

let PENDING_FILES = {};
function fileToData(input, targetId){
  const f = input.files[0]; if(!f){ return; }
  if(f.size > 1.6*1024*1024){ toast("File terlalu besar (maks 1.5MB)","err"); input.value=""; return; }
  const reader = new FileReader();
  reader.onload = e=>{ PENDING_FILES[targetId]={data:e.target.result, name:f.name}; byId(targetId).innerHTML="✓ "+esc(f.name); };
  reader.readAsDataURL(f);
}
function toggleDP(){
  const sudah = document.querySelector('input[name=dpStatus]:checked')?.value==="Sudah";
  ["dpMethodWrap","dpNominalWrap","dpProofWrap"].forEach(id=>byId(id).classList.toggle("hidden",!sudah));
}
function togglePIC(){
  const isMkt = byId("resForm").elements["picType"].value==="Marketing";
  byId("picNameWrap").classList.toggle("hidden",!isMkt);
}
function toggleMember(){
  const ya = document.querySelector('input[name=member]:checked')?.value==="ya";
  byId("memberNoWrap").classList.toggle("hidden",!ya);
}
function checkPhoneHistory(v){
  const el=byId("phoneHint"); if(!el) return;
  if(displayPhone(v).length<8){ el.innerHTML=""; return; }
  const p=customerProfile(v);
  if(p.count===0){ el.innerHTML=`<div class="inline-info">🆕 Nomor baru — tamu pertama kali.</div>`; return; }
  let tag = p.blacklist? `<span class="badge-status tag-blacklist">⛔ Blacklist (${p.noshow}× no-show)</span>`
          : p.vip? `<span class="badge-status tag-vip">👑 VIP</span>`
          : p.type==="Loyal"? `<span class="badge-status tag-loyal">⭐ Loyal</span>`
          : `<span class="badge-status tag-loyal">🔁 Repeat</span>`;
  el.innerHTML=`<div class="${p.blacklist?'inline-danger':'inline-warn'}">${p.blacklist?"⚠️":"👋"} Tamu dikenal: <b>${esc(p.name)}</b> &nbsp;${tag}<br>${p.visits}× kunjungan${p.lastVisit?" · terakhir "+fmtDateShort(p.lastVisit):""}${p.isMember?" · Member "+esc(p.memberNo):""}${p.blacklist?" · <b>Disarankan wajib DP</b>":""}</div>`;
}
function checkConflict(){
  const f=byId("resForm"); const el=byId("conflictHint"); if(!el) return;
  const c = conflictCheck(f.elements["date"].value, f.elements["table"].value, f.elements["time"].value, EDIT_ID);
  el.innerHTML = c? `<div class="inline-danger">⛔ Bentrok! <b>${esc(c.table)}</b> sudah dipesan <b>${esc(c.name)}</b> jam ${c.time} (${c.status}).</div>` : "";
}
function checkBigEvent(v){
  const el=byId("bigEventHint"); if(!el) return;
  el.innerHTML = Number(v)>=20? `<div class="inline-warn">🎉 Reservasi besar (${v} pax). Butuh approval manajer sebelum konfirmasi.</div>` : "";
}
function saveReservation(){
  const f = byId("resForm");
  const g = n => f.elements[n]?.value?.trim() || "";
  const req = ["name","phone","date","time","pax"];
  for(const n of req){ if(!g(n)){ toast("Lengkapi field wajib: "+n,"err"); f.elements[n].focus(); return; } }
  const dpStatus = document.querySelector('input[name=dpStatus]:checked').value;
  const now = Date.now();
  const existing = EDIT_ID ? STATE.reservations.find(x=>x.id===EDIT_ID) : null;
  const rec = {
    id: existing?existing.id:uid(),
    name:g("name"), phone:normPhone(g("phone")),
    date:g("date"), time:g("time"), pax:Number(g("pax")),
    table:g("table"), foodReq:g("foodReq"), drinkReq:g("drinkReq"),
    dpStatus, dpMethod: dpStatus==="Sudah"?g("dpMethod"):"", dpAmount: dpStatus==="Sudah"?Number(g("dpAmount")||0):0,
    dpProofData: PENDING_FILES.dpProofData?.data || existing?.dpProofData || "",
    dpProofName: PENDING_FILES.dpProofData?.name || existing?.dpProofName || "",
    docReqData: PENDING_FILES.docReqData?.data || existing?.docReqData || "",
    docReqName: PENDING_FILES.docReqData?.name || existing?.docReqName || "",
    source:g("source"),
    picType:g("picType"), picName: g("picType")==="Marketing"?g("picName"):SESSION.name,
    member: document.querySelector('input[name=member]:checked').value==="ya",
    memberNo:g("memberNo"), notes:g("notes"),
    vip: existing?.vip||false,
    status: existing?existing.status:(dpStatus==="Sudah"?"Confirmed":"Pending"),
    createdBy: existing?existing.createdBy:SESSION.name,
    createdAt: existing?existing.createdAt:now,
    updatedAt: now,
    actualPax: existing?.actualPax||null,
    checkinAt: existing?.checkinAt||null,
    followups: existing?.followups||[],
    cancelReason: existing?.cancelReason||"",
  };
  if(EDIT_ID){
    STATE.reservations = STATE.reservations.map(x=>x.id===EDIT_ID?rec:x);
    logAudit("Edit Reservasi", `${rec.name} (${fmtDateShort(rec.date)} ${rec.time})`);
  }else{
    STATE.reservations.push(rec);
    logAudit("Buat Reservasi", `${rec.name} (${fmtDateShort(rec.date)} ${rec.time}, ${rec.pax} pax)`);
  }
  PENDING_FILES={}; saveState(); buildNav();
  toast(EDIT_ID?"Reservasi diperbarui":"Reservasi tersimpan","ok");
  const saved=rec; EDIT_ID=null;
  // langsung tawarkan kirim WA
  openWAModal(saved.id, true);
}

/* ================= WHATSAPP ================= */
const FIELD_LABELS = {nama:"Nama Tamu",tanggal:"Tanggal",jam:"Jam",pax:"Jumlah Pax",meja:"Meja",menu:"Menu Request",catatan:"Catatan Khusus",dp:"Info DP",pic:"PIC",source:"Sumber Info"};
function buildWAText(r, fields){
  const L=[]; L.push("*RESERVASI — LAKSAMANA MUDA* ⚓");
  L.push("─────────────────");
  if(fields.includes("nama")) L.push("👤 Nama : "+r.name);
  if(fields.includes("tanggal")) L.push("📅 Tanggal : "+fmtDate(r.date));
  if(fields.includes("jam")) L.push("🕗 Jam : "+r.time+" WIB");
  if(fields.includes("pax")) L.push("👥 Pax : "+r.pax+" orang");
  if(fields.includes("meja")&&r.table) L.push("🪑 Meja : "+r.table);
  if(fields.includes("menu")){ if(r.foodReq) L.push("🍽️ Makanan : "+r.foodReq); if(r.drinkReq) L.push("🥤 Minuman : "+r.drinkReq); }
  if(fields.includes("dp")){
    L.push("─────────────────");
    L.push("💰 Status DP : "+r.dpStatus);
    if(r.dpStatus==="Sudah"){ L.push("   Nominal : "+rp(r.dpAmount)); L.push("   Metode : "+r.dpMethod); if(r.dpProofData) L.push("   (Bukti transfer terlampir di sistem)"); }
  }
  if(fields.includes("catatan")&&r.notes) L.push("📝 Catatan : "+r.notes);
  if(fields.includes("pic")) L.push("🧭 PIC : "+(r.picType==="Marketing"?"Marketing — "+r.picName:r.picType));
  if(fields.includes("source")&&r.source) L.push("📣 Sumber : "+r.source);
  L.push("─────────────────");
  L.push("_Diinput oleh "+r.createdBy+"_");
  return L.join("\n");
}
function openWAModal(id, justSaved){
  const r = STATE.reservations.find(x=>x.id===id); if(!r) return;
  const targets = STATE.master.waTargets;
  const tgtHtml = targets.map((t,ti)=>{
    const txt = buildWAText(r, t.fields);
    return `<div class="wa-target">
      <h4>${t.includeDP?"💰":"📋"} ${esc(t.name)} ${t.includeDP?'<span class="pill" style="background:var(--ok-bg);color:var(--ok)">+ DP</span>':'<span class="pill">tanpa DP</span>'}</h4>
      <p>${t.type==="group"?"Grup — salin pesan lalu tempel di grup":"Nomor: "+esc(t.detail||"belum diisi")}</p>
      <div class="wa-preview">${esc(txt)}</div>
      <div class="wa-actions">
        <button class="btn btn-sm btn-ghost" onclick="waTargetCopy(this,'${id}',${ti})">📋 Salin Pesan</button>
        <button class="btn btn-sm btn-wa" onclick="waTargetSend('${id}',${ti})">💬 Buka WhatsApp</button>
      </div>
    </div>`;
  }).join("");

  const allFields = Object.keys(FIELD_LABELS);
  const customChecks = allFields.map(f=>`<label><input type="checkbox" class="wa-cf" value="${f}" ${["nama","tanggal","jam","pax","meja"].includes(f)?"checked":""} onchange="updateCustomWA('${id}')">${FIELD_LABELS[f]}</label>`).join("");

  openModal(`
    <div class="modal-head"><h3>💬 Kirim Notifikasi WhatsApp</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      ${justSaved?`<div class="inline-info" style="margin-bottom:14px">✅ Reservasi tersimpan. Kirim info ke tim terkait:</div>`:""}
      ${tgtHtml}
      <div class="wa-target" style="border-color:var(--gold);border-style:dashed">
        <h4>✏️ Personal / Grup Lain (Custom)</h4>
        <p>Pilih field yang mau disertakan:</p>
        <div class="check-list">${customChecks}</div>
        <div class="field" style="margin-bottom:10px"><label style="font-size:12px">No. tujuan (opsional, kosongkan utk salin ke grup)</label><input id="waCustomNum" placeholder="08xxxx" inputmode="numeric" oninput="updateCustomWA('${id}')"></div>
        <div class="wa-preview" id="waCustomPreview"></div>
        <div class="wa-actions">
          <button class="btn btn-sm btn-ghost" onclick="copyWA(this, byId('waCustomPreview').textContent)">📋 Salin</button>
          <button class="btn btn-sm btn-wa" id="waCustomSend">💬 Buka WhatsApp</button>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      ${justSaved?`<button class="btn btn-ghost" onclick="closeModal();navigate('dashboard')">Lihat Dashboard</button><button class="btn btn-primary" onclick="closeModal();navigate('input')">+ Reservasi Lain</button>`:`<button class="btn btn-ink" onclick="closeModal()">Tutup</button>`}
    </div>
  `, true);
  updateCustomWA(id);
}
function updateCustomWA(id){
  const r = STATE.reservations.find(x=>x.id===id);
  const fields = [...document.querySelectorAll(".wa-cf:checked")].map(c=>c.value);
  const txt = buildWAText(r, fields);
  byId("waCustomPreview").textContent = txt;
  const num = byId("waCustomNum").value;
  byId("waCustomSend").onclick = ()=> sendWA(num?"number":"group", num, txt);
}
function waTargetCopy(btn, id, ti){
  const r=STATE.reservations.find(x=>x.id===id); const t=STATE.master.waTargets[ti];
  copyWA(btn, buildWAText(r, t.fields));
}
function waTargetSend(id, ti){
  const r=STATE.reservations.find(x=>x.id===id); const t=STATE.master.waTargets[ti];
  sendWA(t.type, t.detail||"", buildWAText(r, t.fields));
}
function copyWA(btn, txt){
  navigator.clipboard.writeText(txt).then(()=>{ const o=btn.innerHTML; btn.innerHTML="✓ Tersalin"; setTimeout(()=>btn.innerHTML=o,1500); toast("Pesan disalin","ok"); })
  .catch(()=>{ toast("Gagal menyalin — salin manual","err"); });
}
function sendWA(type, detail, txt){
  const enc = encodeURIComponent(txt);
  if(type==="number" && normPhone(detail).length>=8){
    window.open(`https://wa.me/${normPhone(detail)}?text=${enc}`,"_blank");
  }else{
    navigator.clipboard.writeText(txt).catch(()=>{});
    toast("Pesan disalin. Membuka WhatsApp — tempel di grup tujuan.","ok");
    window.open("https://web.whatsapp.com/","_blank");
  }
}

/* ================= DASHBOARD ================= */
let DASH_FILTER = { mode:"month", date:todayStr(), month:todayStr().slice(0,7), year:new Date().getFullYear(), from:"", to:"", status:"", dp:"", pic:"", ctype:"", q:"" };
let DASH_VIEW = "table"; // table | calendar
let CAL_MONTH = new Date();

function applyFilter(list){
  let r=[...list];
  const F=DASH_FILTER;
  if(F.mode==="day") r=r.filter(x=>x.date===F.date);
  else if(F.mode==="month") r=r.filter(x=>x.date.slice(0,7)===F.month);
  else if(F.mode==="year") r=r.filter(x=>x.date.slice(0,4)===String(F.year));
  else if(F.mode==="range" && F.from && F.to) r=r.filter(x=>x.date>=F.from && x.date<=F.to);
  if(F.status) r=r.filter(x=>x.status===F.status);
  if(F.dp) r=r.filter(x=>x.dpStatus===F.dp);
  if(F.pic) r=r.filter(x=>(x.picType==="Marketing"?x.picName:x.picType)===F.pic);
  if(F.ctype){ r=r.filter(x=>{ const p=customerProfile(x.phone); return F.ctype==="Baru"?p.visits===0:F.ctype==="Loyal"?(p.type==="Loyal"||p.type==="Repeat"):F.ctype==="Member"?p.isMember:true; }); }
  if(F.q){ const q=F.q.toLowerCase(); r=r.filter(x=>x.name.toLowerCase().includes(q)||x.phone.includes(q)); }
  return r.sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));
}

function renderDashboard(){
  const F=DASH_FILTER;
  const picNames = [...new Set(STATE.reservations.map(r=>r.picType==="Marketing"?r.picName:r.picType))].filter(Boolean);
  const filtered = applyFilter(STATE.reservations);
  // recap
  const totalPax = filtered.reduce((a,r)=>a+(Number(r.pax)||0),0);
  const arrivedPax = filtered.reduce((a,r)=>a+(Number(r.actualPax)||0),0);
  const dpYes = filtered.filter(r=>r.dpStatus==="Sudah").length;
  const newC = filtered.filter(r=>customerProfile(r.phone).visits===0).length;
  const loyalC = filtered.length-newC;
  const today = todayStr();
  const needFU = STATE.reservations.filter(r=>r.date===today && ["Pending","Confirmed"].includes(r.status)).length;

  byId("page-dashboard").innerHTML = `

     <div style="display:flex;gap:8px">
       <button class="btn btn-sm ${DASH_VIEW==='table'?'btn-ink':'btn-ghost'}" onclick="DASH_VIEW='table';renderDashboard()">📋 Tabel</button>
       <button class="btn btn-sm ${DASH_VIEW==='calendar'?'btn-ink':'btn-ghost'}" onclick="DASH_VIEW='calendar';renderDashboard()">🗓️ Kalender</button>
       ${CAN.input(SESSION.role)?`<button class="btn btn-sm btn-primary" onclick="newReservation()">➕ Reservasi</button>`:""}
     </div>
   </div>

   <div class="recap-grid">
     <div class="recap"><div class="lbl">📋 Total Reservasi</div><div class="val">${filtered.length}</div><div class="sub">periode terpilih</div></div>
     <div class="recap info"><div class="lbl">👥 Pax Dipesan vs Datang</div><div class="val">${totalPax}<small> / ${arrivedPax} datang</small></div><div class="sub">${totalPax?Math.round(arrivedPax/totalPax*100):0}% realisasi</div></div>
     <div class="recap ok"><div class="lbl">💰 Sudah DP</div><div class="val">${dpYes}<small> / ${filtered.length-dpYes} belum</small></div><div class="sub">reservasi ber-DP</div></div>
     <div class="recap purple"><div class="lbl">🔁 Baru vs Loyal</div><div class="val">${newC}<small> / ${loyalC} loyal</small></div><div class="sub">tamu baru vs repeat</div></div>
     <div class="recap ${needFU>0?'danger':''}"><div class="lbl">📞 Perlu Follow Up</div><div class="val">${needFU}</div><div class="sub">belum konfirmasi hari ini</div></div>
   </div>

   <div class="panel">
     <div class="panel-body">
      <div class="filters">
        <div class="field"><label>Periode</label>
          <select onchange="DASH_FILTER.mode=this.value;renderDashboard()">
            <option value="day" ${F.mode==="day"?"selected":""}>Harian</option>
            <option value="month" ${F.mode==="month"?"selected":""}>Bulanan</option>
            <option value="year" ${F.mode==="year"?"selected":""}>Tahunan</option>
            <option value="range" ${F.mode==="range"?"selected":""}>Rentang</option>
            <option value="all" ${F.mode==="all"?"selected":""}>Semua</option>
          </select>
        </div>
        ${F.mode==="day"?`<div class="field"><label>Tanggal</label><input type="date" value="${F.date}" onchange="DASH_FILTER.date=this.value;renderDashboard()"></div>`:""}
        ${F.mode==="month"?`<div class="field"><label>Bulan</label><input type="month" value="${F.month}" onchange="DASH_FILTER.month=this.value;renderDashboard()"></div>`:""}
        ${F.mode==="year"?`<div class="field"><label>Tahun</label><input type="number" value="${F.year}" onchange="DASH_FILTER.year=this.value;renderDashboard()"></div>`:""}
        ${F.mode==="range"?`<div class="field"><label>Dari</label><input type="date" value="${F.from}" onchange="DASH_FILTER.from=this.value;renderDashboard()"></div><div class="field"><label>Sampai</label><input type="date" value="${F.to}" onchange="DASH_FILTER.to=this.value;renderDashboard()"></div>`:""}

        <div class="field"><label>Tipe Tamu</label><select onchange="DASH_FILTER.ctype=this.value;renderDashboard()"><option value="">Semua</option><option ${F.ctype==="Baru"?"selected":""}>Baru</option><option ${F.ctype==="Loyal"?"selected":""}>Loyal/Repeat</option><option ${F.ctype==="Member"?"selected":""}>Member</option></select></div>

function dashTable(list){
  if(!list.length) return `<div class="panel"><div class="empty"><div class="big">🗒️</div>Belum ada reservasi untuk filter ini.</div></div>`;

    <button class="btn btn-sm btn-ghost" onclick="exportCSV(${JSON.stringify(list.map(r=>r.id)).replace(/"/g,'&quot;')})">⬇️ Export CSV</button></div>
   <div class="table-wrap"><table>
    <thead><tr><th>Tamu</th><th>Tanggal</th><th>Jam</th><th>Pax</th><th>Meja</th><th>DP</th><th>PIC</th><th>Status</th><th></th></tr></thead>
    <tbody>${list.map(r=>{ const p=customerProfile(r.phone);
      return `<tr onclick="openDetail('${r.id}')" style="cursor:pointer">
       <td><div class="name">${esc(r.name)} ${tagFor(p)}</div><div class="muted">${displayPhone(r.phone)}</div></td>
       <td>${fmtDateShort(r.date)}</td>

       <td>${r.table?esc(r.table):'<span class="muted">—</span>'}</td>
       <td><span class="badge-status ${r.dpStatus==="Sudah"?"dp-yes":"dp-no"}">${r.dpStatus==="Sudah"?"✓ "+rp(r.dpAmount):"Belum"}</span></td>
       <td class="muted">${r.picType==="Marketing"?esc(r.picName):"Host/Capt"}</td>
       <td><span class="badge-status ${STATUS_CLASS[r.status]}">${STATUS_ICON[r.status]} ${r.status}</span></td>
       <td onclick="event.stopPropagation()"><div class="mini-actions">
         <button class="btn btn-xs btn-wa" onclick="openWAModal('${r.id}')">💬</button>
         ${CAN.input(SESSION.role)?`<button class="btn btn-xs btn-ghost" onclick="editReservation('${r.id}')">✏️</button>`:""}
       </div></td>
      </tr>`; }).join("")}
    </tbody></table></div></div>`;

function tagFor(p){
  if(p.blacklist) return `<span class="badge-status tag-blacklist" style="font-size:10px;padding:2px 7px">⛔</span>`;
  if(p.vip) return `<span class="badge-status tag-vip" style="font-size:10px;padding:2px 7px">👑 VIP</span>`;
  if(p.type==="Loyal") return `<span class="badge-status tag-loyal" style="font-size:10px;padding:2px 7px">⭐</span>`;
  if(p.type==="Repeat") return `<span class="badge-status tag-loyal" style="font-size:10px;padding:2px 7px">🔁</span>`;
  return `<span class="badge-status tag-new" style="font-size:10px;padding:2px 7px">baru</span>`;
}

function dashCalendar(){
  const y=CAL_MONTH.getFullYear(), mo=CAL_MONTH.getMonth();
  const first=new Date(y,mo,1), start=first.getDay(), days=new Date(y,mo+1,0).getDate();
  const monthName=CAL_MONTH.toLocaleDateString("id-ID",{month:"long",year:"numeric"});
  const dow=["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
  const counts={};
  STATE.reservations.forEach(r=>{ if(r.date.slice(0,7)===`${y}-${String(mo+1).padStart(2,"0")}`){ counts[r.date]=(counts[r.date]||0)+1; } });
  let cells="";
  for(let i=0;i<start;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const c=counts[ds]||0;
    const busy = c===0?0:c<=2?1:c<=4?2:c<=6?3:4;
    const isToday = ds===todayStr();
    cells+=`<div class="cal-cell busy-${busy} ${isToday?'today':''}" onclick="DASH_FILTER.mode='day';DASH_FILTER.date='${ds}';DASH_VIEW='table';renderDashboard()">
      <div class="d">${d}</div>${c>0?`<div class="mini">${c} resv</div>`:'<div class="cnt">—</div>'}<div class="cal-bar"></div></div>`;
  }
  return `<div class="panel"><div class="panel-body">
    <div class="cal-head"><h3>🗓️ ${monthName}</h3>
      <div class="cal-nav"><button class="btn btn-sm btn-ghost" onclick="calMove(-1)">‹ Prev</button><button class="btn btn-sm btn-ghost" onclick="CAL_MONTH=new Date();renderDashboard()">Hari Ini</button><button class="btn btn-sm btn-ghost" onclick="calMove(1)">Next ›</button></div>
    </div>
    <div class="cal-grid">${dow.map(d=>`<div class="cal-dow">${d}</div>`).join("")}${cells}</div>
    <div class="pill-row" style="margin-top:14px"><span class="pill">Klik tanggal → lihat detail hari itu</span><span class="pill">🟩 sepi</span><span class="pill">🟨 sedang</span><span class="pill">🟧 ramai</span><span class="pill">🟥 penuh</span></div>
  </div></div>`;
}
function calMove(n){ CAL_MONTH.setMonth(CAL_MONTH.getMonth()+n); renderDashboard(); }

function exportCSV(ids){
  const list = STATE.reservations.filter(r=>ids.includes(r.id));
  const cols=["Nama","No HP","Tanggal","Jam","Pax","Pax Aktual","Meja","Status","DP","Nominal DP","Metode DP","Sumber","PIC","Member","No Member","Catatan","Diinput Oleh"];
  const rows=list.map(r=>[r.name,displayPhone(r.phone),r.date,r.time,r.pax,r.actualPax??"",r.table,r.status,r.dpStatus,r.dpAmount,r.dpMethod,r.source,(r.picType==="Marketing"?r.picName:r.picType),r.member?"Ya":"Tidak",r.memberNo,r.notes,r.createdBy]);
  const csv=[cols,...rows].map(row=>row.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`reservasi_laksamana_${todayStr()}.csv`; a.click();
  toast("CSV diunduh","ok");
}

/* ================= HARI-H / KEDATANGAN ================= */
let HARIH_DATE = todayStr();

    .sort((a,b)=>a.time.localeCompare(b.time));
  const nowMin = new Date().getHours()*60+new Date().getMinutes();
  const isToday = HARIH_DATE===todayStr();
  const arrived = list.filter(r=>["Checked-in","Completed"].includes(r.status)).length;
  const pending = list.filter(r=>["Pending","Confirmed"].includes(r.status)).length;
  const noshow = list.filter(r=>r.status==="No-show").length;

   <div class="page-head">

   </div>
   ${!list.length?`<div class="panel"><div class="empty"><div class="big">📭</div>Tidak ada reservasi pada ${fmtDate(HARIH_DATE)}.</div></div>`:`
   <div class="panel"><div class="panel-head"><h3>Jadwal Kedatangan — ${fmtDate(HARIH_DATE)}</h3></div>
   <div class="table-wrap"><table>
     <thead><tr><th>Jam</th><th>Tamu</th><th>Pax</th><th>Meja</th><th>DP</th><th>Status</th><th>Aksi</th></tr></thead>
     <tbody>${list.map(r=>{
        const p=customerProfile(r.phone);
        const late = isToday && ["Pending","Confirmed"].includes(r.status) && toMin(r.time)<nowMin;
        const near = isToday && ["Pending","Confirmed"].includes(r.status) && toMin(r.time)-nowMin<=30 && toMin(r.time)>=nowMin;
        const rowStyle = late?'background:#FBECEA':near?'background:#FBF6E6':'';
        return `<tr style="${rowStyle};cursor:pointer" onclick="openDetail('${r.id}')">
          <td><b>${r.time}</b>${late?'<br><span class="badge-status st-noshow" style="font-size:10px">⏰ lewat</span>':near?'<br><span class="badge-status st-pending" style="font-size:10px">segera</span>':''}</td>
          <td><div class="name">${esc(r.name)} ${tagFor(p)}</div><div class="muted">${displayPhone(r.phone)}</div></td>
          <td>${r.pax}${r.actualPax!=null?` <span class="muted">/${r.actualPax}✓</span>`:""}</td>
          <td>${r.table?esc(r.table):'<span class="muted">—</span>'}</td>
          <td><span class="badge-status ${r.dpStatus==="Sudah"?"dp-yes":"dp-no"}" style="font-size:11px">${r.dpStatus==="Sudah"?"✓ DP":"Belum"}</span></td>
          <td><span class="badge-status ${STATUS_CLASS[r.status]}">${STATUS_ICON[r.status]} ${r.status}</span></td>
          <td onclick="event.stopPropagation()"><div class="mini-actions">
            ${["Pending","Confirmed"].includes(r.status)?`<button class="btn btn-xs btn-ok" onclick="checkIn('${r.id}')">✅ Datang</button>
              <button class="btn btn-xs btn-wa" onclick="followUp('${r.id}')">📞 Follow Up</button>
              <button class="btn btn-xs btn-danger" onclick="markNoShow('${r.id}')">⚠️</button>`:""}

            ${r.followups?.length?`<span class="pill">${r.followups.length} FU</span>`:""}
          </div></td>
        </tr>`; }).join("")}
     </tbody></table></div></div>`}

function checkIn(id){
  const r=STATE.reservations.find(x=>x.id===id);
  const actual = prompt(`Check-in "${r.name}".\nJumlah tamu yang benar-benar datang (dipesan ${r.pax} pax):`, r.pax);
  if(actual===null) return;
  r.status="Checked-in"; r.actualPax=Number(actual)||r.pax; r.checkinAt=Date.now(); r.updatedAt=Date.now();
  logAudit("Check-in",`${r.name} — ${r.actualPax} pax datang`); saveState(); buildNav(); renderHariH();
  toast(`${r.name} check-in ✓`,"ok");
}
function completeVisit(id){
  const r=STATE.reservations.find(x=>x.id===id);
  r.status="Completed"; r.updatedAt=Date.now();
  logAudit("Selesai",`${r.name}`); saveState(); renderHariH(); toast("Kunjungan selesai","ok");
}
function markNoShow(id){
  const r=STATE.reservations.find(x=>x.id===id);
  if(!confirm(`Tandai "${r.name}" sebagai NO-SHOW?`)) return;
  r.status="No-show"; r.updatedAt=Date.now();
  logAudit("No-show",`${r.name}`); saveState(); buildNav(); renderHariH(); toast("Ditandai no-show","err");
}

  window.open(`https://wa.me/${normPhone(r.phone)}?text=${encodeURIComponent(msg)}`,"_blank");
  // catat follow up
  openModal(`
    <div class="modal-head"><h3>📞 Catat Hasil Follow Up</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="inline-info" style="margin-bottom:14px">WhatsApp terbuka ke <b>${esc(r.name)}</b> (${displayPhone(r.phone)}). Catat hasilnya:</div>

        <span class="pill" style="cursor:pointer" onclick="byId('fuNote').value='Tamu konfirmasi hadir tepat waktu'">✓ Hadir</span>
        <span class="pill" style="cursor:pointer" onclick="byId('fuNote').value='Tamu konfirmasi telat ~15 menit'">⏰ Telat</span>
        <span class="pill" style="cursor:pointer" onclick="byId('fuNote').value='Tamu membatalkan'">✕ Batal</span>

      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Nanti Saja</button>
      <button class="btn btn-primary" onclick="saveFollowUp('${id}')">Simpan Catatan</button>

function saveFollowUp(id){
  const r=STATE.reservations.find(x=>x.id===id);
  const note=byId("fuNote").value.trim(); if(!note){ closeModal(); return; }
  r.followups=r.followups||[]; r.followups.push({ts:Date.now(),by:SESSION.name,note});
  r.updatedAt=Date.now(); logAudit("Follow Up",`${r.name}: ${note}`); saveState();
  closeModal(); renderHariH(); toast("Catatan follow up tersimpan","ok");
}

function viewFile(id,which){

function changeStatus(id){
  const r=STATE.reservations.find(x=>x.id===id); const ns=byId("stSel").value;

  r.status=ns; r.updatedAt=Date.now(); logAudit("Ubah Status",`${r.name} → ${ns}`); saveState(); buildNav();
  closeModal(); toast("Status diubah → "+ns,"ok");

function delReservation(id){
  const r=STATE.reservations.find(x=>x.id===id);

let HIST_F={ q:"", status:"", mode:"all", month:todayStr().slice(0,7), year:new Date().getFullYear() };

  const today=todayStr();
  let list=STATE.reservations.filter(r=>r.date<today || ["Completed","No-show","Cancelled"].includes(r.status));
  if(HIST_F.mode==="month") list=list.filter(r=>r.date.slice(0,7)===HIST_F.month);
  else if(HIST_F.mode==="year") list=list.filter(r=>r.date.slice(0,4)===String(HIST_F.year));
  if(HIST_F.status) list=list.filter(r=>r.status===HIST_F.status);
  if(HIST_F.q){ const q=HIST_F.q.toLowerCase(); list=list.filter(r=>r.name.toLowerCase().includes(q)||r.phone.includes(q)); }
  list.sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));

  byId("page-riwayat").innerHTML=`
   <div class="page-head"><div><h2>Riwayat Reservasi</h2><div class="desc">Arsip reservasi yang sudah lewat — basis CRM & evaluasi. Cari nama/HP untuk lihat riwayat pelanggan.</div></div></div>
   <div class="panel"><div class="panel-body"><div class="filters">
     <div class="field search-box"><label>Cari Pelanggan</label><span class="ico">🔍</span><input placeholder="Nama / No HP" value="${esc(HIST_F.q)}" oninput="HIST_F.q=this.value;renderRiwayat()"></div>
     <div class="field"><label>Periode</label><select onchange="HIST_F.mode=this.value;renderRiwayat()"><option value="all" ${HIST_F.mode==="all"?"selected":""}>Semua</option><option value="month" ${HIST_F.mode==="month"?"selected":""}>Bulanan</option><option value="year" ${HIST_F.mode==="year"?"selected":""}>Tahunan</option></select></div>
     ${HIST_F.mode==="month"?`<div class="field"><label>Bulan</label><input type="month" value="${HIST_F.month}" onchange="HIST_F.month=this.value;renderRiwayat()"></div>`:""}
     ${HIST_F.mode==="year"?`<div class="field"><label>Tahun</label><input type="number" value="${HIST_F.year}" onchange="HIST_F.year=this.value;renderRiwayat()"></div>`:""}
     <div class="field"><label>Status Akhir</label><select onchange="HIST_F.status=this.value;renderRiwayat()"><option value="">Semua</option><option ${HIST_F.status==="Completed"?"selected":""}>Completed</option><option ${HIST_F.status==="No-show"?"selected":""}>No-show</option><option ${HIST_F.status==="Cancelled"?"selected":""}>Cancelled</option></select></div>
   </div></div></div>
   ${HIST_F.q && list.length? crmCard(list):""}
   ${!list.length?`<div class="panel"><div class="empty"><div class="big">🗂️</div>Belum ada riwayat.</div></div>`:`
   <div class="panel"><div class="panel-head"><h3>Arsip <span class="count-tag">${list.length}</span></h3>
     <button class="btn btn-sm btn-ghost" onclick="exportCSV(${JSON.stringify(list.map(r=>r.id)).replace(/"/g,'&quot;')})">⬇️ Export CSV</button></div>
   <div class="table-wrap"><table><thead><tr><th>Tanggal</th><th>Tamu</th><th>Pax</th><th>Meja</th><th>DP</th><th>Status</th><th></th></tr></thead>
   <tbody>${list.map(r=>{const p=customerProfile(r.phone);return `<tr onclick="openDetail('${r.id}')" style="cursor:pointer">
     <td>${fmtDateShort(r.date)}<div class="muted">${r.time}</div></td>
     <td><div class="name">${esc(r.name)} ${tagFor(p)}</div><div class="muted">${displayPhone(r.phone)}</div></td>
     <td>${r.pax}${r.actualPax!=null?` <span class="muted">/${r.actualPax}✓</span>`:""}</td>
     <td>${esc(r.table)||'—'}</td>
     <td><span class="badge-status ${r.dpStatus==="Sudah"?"dp-yes":"dp-no"}" style="font-size:11px">${r.dpStatus==="Sudah"?"✓":"—"}</span></td>
     <td><span class="badge-status ${STATUS_CLASS[r.status]}">${STATUS_ICON[r.status]} ${r.status}</span></td>
     <td onclick="event.stopPropagation()"><button class="btn btn-xs btn-ghost" onclick="openDetail('${r.id}')">Detail</button></td>
   </tr>`;}).join("")}</tbody></table></div></div>`}
  `;
}
function crmCard(list){
  const p=customerProfile(list[0].phone);
  return `<div class="panel" style="border-color:var(--gold)"><div class="panel-body">
    <h3 style="font-size:19px;margin-bottom:4px">${esc(p.name||list[0].name)} ${tagFor(p)}</h3>
    <div class="muted" style="margin-bottom:14px">${displayPhone(list[0].phone)}${p.isMember?" · Member "+esc(p.memberNo):""}</div>
    <div class="recap-grid" style="margin:0">
      <div class="recap"><div class="lbl">Total Kunjungan</div><div class="val">${p.visits}</div></div>
      <div class="recap info"><div class="lbl">Rata-rata Pax</div><div class="val">${p.avgPax}</div></div>
      <div class="recap ${p.noshow?'danger':'ok'}"><div class="lbl">No-show</div><div class="val">${p.noshow}<small>/${p.count}</small></div></div>
      <div class="recap ${p.blacklist?'danger':p.vip?'purple':''}"><div class="lbl">Status</div><div class="val" style="font-size:18px;font-family:Inter">${p.blacklist?"⛔ Blacklist":p.vip?"👑 VIP":p.type}</div></div>
    </div>
  </div></div>`;
}

/* ================= ANALITIK ================= */
function renderAnalitik(){
  const all=STATE.reservations;
  const bar=(label,val,max,cls)=>`<div class="bar-item"><div class="bl"><span>${esc(label)}</span><b>${val}</b></div><div class="bar-track"><div class="bar-fill ${cls||''}" style="width:${max?Math.round(val/max*100):0}%"></div></div></div>`;
  // sumber
  const bySource={}; all.forEach(r=>{if(r.source)bySource[r.source]=(bySource[r.source]||0)+1;});
  const srcArr=Object.entries(bySource).sort((a,b)=>b[1]-a[1]); const srcMax=Math.max(1,...srcArr.map(x=>x[1]));
  // PIC
  const byPic={}; all.forEach(r=>{const k=r.picType==="Marketing"?r.picName:"Host/Captain";byPic[k]=byPic[k]||{total:0,hadir:0};byPic[k].total++;if(["Checked-in","Completed"].includes(r.status))byPic[k].hadir++;});
  const picArr=Object.entries(byPic).sort((a,b)=>b[1].total-a[1].total); const picMax=Math.max(1,...picArr.map(x=>x[1].total));
  // peak hour
  const byHour={}; all.forEach(r=>{const h=(r.time||"0").split(":")[0];byHour[h]=(byHour[h]||0)+1;});
  const hourArr=Object.entries(byHour).sort((a,b)=>a[0]-b[0]); const hourMax=Math.max(1,...hourArr.map(x=>x[1]));
  // day of week
  const dow=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"]; const byDow=[0,0,0,0,0,0,0];
  all.forEach(r=>{const d=new Date(r.date+"T00:00:00");if(!isNaN(d))byDow[d.getDay()]++;});
  const dowMax=Math.max(1,...byDow);
  // monthly trend
  const byMonth={}; all.forEach(r=>{const m=r.date.slice(0,7);byMonth[m]=(byMonth[m]||0)+1;});
  const monArr=Object.entries(byMonth).sort(); const monMax=Math.max(1,...monArr.map(x=>x[1]));
  // no-show ratio
  const done=all.filter(r=>["Completed","Checked-in","No-show"].includes(r.status));
  const noshow=all.filter(r=>r.status==="No-show").length;
  const nsRatio=done.length?Math.round(noshow/done.length*100):0;
  const avgPax=all.length?(all.reduce((a,r)=>a+(Number(r.pax)||0),0)/all.length).toFixed(1):0;

  byId("page-analitik").innerHTML=`
   <div class="page-head"><div><h2>Analitik & Laporan</h2><div class="desc">Insight bisnis dari seluruh data reservasi. Angka menyesuaikan seiring data bertambah.</div></div></div>
   <div class="recap-grid">
     <div class="recap"><div class="lbl">Total Reservasi</div><div class="val">${all.length}</div></div>
     <div class="recap info"><div class="lbl">Rata-rata Pax</div><div class="val">${avgPax}</div></div>
     <div class="recap ${nsRatio>15?'danger':'ok'}"><div class="lbl">Rasio No-show</div><div class="val">${nsRatio}<small>%</small></div><div class="sub">${noshow} dari ${done.length} tamu</div></div>
     <div class="recap purple"><div class="lbl">Pelanggan Unik</div><div class="val">${new Set(all.map(r=>normPhone(r.phone))).size}</div></div>
   </div>
   <div class="chart-row">
     <div class="panel"><div class="panel-head"><h3>📣 Sumber Reservasi Terefektif</h3></div><div class="panel-body">${srcArr.length?srcArr.map(([k,v])=>bar(k,v,srcMax)).join(""):"<div class='muted'>Belum ada data.</div>"}</div></div>
     <div class="panel"><div class="panel-head"><h3>🧭 Performa PIC</h3></div><div class="panel-body">${picArr.length?picArr.map(([k,v])=>bar(k+` (${v.total?Math.round(v.hadir/v.total*100):0}% hadir)`,v.total,picMax,"blue")).join(""):"<div class='muted'>Belum ada data.</div>"}</div></div>
   </div>
   <div class="chart-row">
     <div class="panel"><div class="panel-head"><h3>🕗 Jam Paling Ramai (Peak Hour)</h3></div><div class="panel-body">${hourArr.length?hourArr.map(([k,v])=>bar(k+":00 WIB",v,hourMax,"green")).join(""):"<div class='muted'>Belum ada data.</div>"}</div></div>
     <div class="panel"><div class="panel-head"><h3>📅 Hari Paling Ramai</h3></div><div class="panel-body">${byDow.map((v,i)=>bar(dow[i],v,dowMax,"green")).join("")}</div></div>
   </div>
   <div class="panel"><div class="panel-head"><h3>📈 Tren Reservasi per Bulan</h3></div><div class="panel-body">${monArr.length?monArr.map(([k,v])=>bar(k,v,monMax)).join(""):"<div class='muted'>Belum ada data.</div>"}</div></div>
  `;
}

/* ================= MASTER DATA ================= */
function renderMaster(){
  if(!CAN.master(SESSION.role)){ byId("page-master").innerHTML="<div class='empty'>Tidak ada akses.</div>"; return; }
  const m=STATE.master;
  const listBlock=(title,key,items)=>`<div class="panel"><div class="panel-head"><h3>${title}</h3></div><div class="panel-body">
     <div class="master-list">${items.map((v,i)=>`<span class="master-tag">${esc(v)}<button onclick="delMaster('${key}',${i})">×</button></span>`).join("")||"<span class='muted'>Kosong</span>"}</div>
     <div style="display:flex;gap:8px;margin-top:12px"><input id="add_${key}" placeholder="Tambah baru..." style="flex:1;padding:9px 11px;border:1.5px solid var(--line);border-radius:8px"><button class="btn btn-sm btn-primary" onclick="addMaster('${key}')">+ Tambah</button></div>
   </div></div>`;
  byId("page-master").innerHTML=`
   <div class="page-head"><div><h2>Master Data</h2><div class="desc">Kelola pilihan dropdown & pengaturan sistem.</div></div>
     <button class="btn btn-sm btn-ghost" onclick="dataTools()">🛠️ Data & Backup</button></div>
   <div class="chart-row">${listBlock("🪑 Meja / Posisi Duduk","tables",m.tables)}${listBlock("💳 Metode DP","dpMethods",m.dpMethods)}</div>
   <div class="chart-row">${listBlock("📣 Sumber Informasi","infoSources",m.infoSources)}
     <div class="panel"><div class="panel-head"><h3>💬 Tujuan WhatsApp</h3></div><div class="panel-body">
       ${m.waTargets.map((t,i)=>`<div class="master-tag" style="width:100%;justify-content:space-between;border-radius:10px;margin-bottom:6px"><span>${t.includeDP?"💰":"📋"} <b>${esc(t.name)}</b> <span class="muted" style="font-size:12px">(${t.type})</span></span></div>`).join("")}
       <p class="hint">Grup Cashier & Koordinasi sudah otomatis dengan template siap pakai. Untuk grup lain, gunakan opsi "Custom" saat kirim WA.</p>
     </div></div>
   </div>`;
}
function addMaster(key){ const v=byId("add_"+key).value.trim(); if(!v)return; STATE.master[key].push(v); logAudit("Master +",`${key}: ${v}`); saveState(); renderMaster(); }
function delMaster(key,i){ const v=STATE.master[key][i]; STATE.master[key].splice(i,1); logAudit("Master −",`${key}: ${v}`); saveState(); renderMaster(); }
function dataTools(){
  openModal(`<div class="modal-head"><h3>🛠️ Data & Backup</h3><button class="close-x" onclick="closeModal()">×</button></div>
   <div class="modal-body">
     <p style="margin-bottom:14px">Total reservasi: <b>${STATE.reservations.length}</b> · Audit log: <b>${STATE.audit.length}</b></p>
     <div style="display:grid;gap:10px">
       <button class="btn btn-ghost" onclick="backupJSON()">⬇️ Backup Semua Data (JSON)</button>
       <label class="btn btn-ghost" style="cursor:pointer">⬆️ Restore dari Backup<input type="file" accept=".json" style="display:none" onchange="restoreJSON(this)"></label>
       <button class="btn btn-danger" onclick="wipeData()">🗑️ Hapus Semua Data</button>
     </div>
     <p class="hint" style="margin-top:14px">⚠️ Data tersimpan di browser ini saja. Backup rutin agar tidak hilang. Untuk multi-user real-time & keamanan penuh, perlu backend server (fase lanjutan).</p>
   </div>`);
}
function backupJSON(){ const blob=new Blob([JSON.stringify(STATE,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`backup_laksamana_${todayStr()}.json`; a.click(); toast("Backup diunduh","ok"); }
function restoreJSON(input){ const f=input.files[0]; if(!f)return; const rd=new FileReader(); rd.onload=e=>{ try{ const d=JSON.parse(e.target.result); if(!d.reservations)throw 0; STATE=Object.assign(STATE,d); saveState(); logAudit("Restore Data","dari backup"); toast("Data dipulihkan","ok"); closeModal(); navigate("dashboard"); }catch{ toast("File backup tidak valid","err"); } }; rd.readAsText(f); }
function wipeData(){ if(!confirm("Hapus SEMUA data reservasi & histori? Tidak bisa dibatalkan!"))return; if(!confirm("Yakin 100%? Backup dulu kalau perlu."))return; STATE.reservations=[]; STATE.audit=[]; saveState(); toast("Semua data dihapus","err"); closeModal(); navigate("dashboard"); }

/* ================= AUDIT LOG ================= */
function renderAudit(){
  if(!CAN.audit(SESSION.role)){ byId("page-audit").innerHTML="<div class='empty'>Tidak ada akses.</div>"; return; }
  byId("page-audit").innerHTML=`
   <div class="page-head"><div><h2>Audit Log</h2><div class="desc">Jejak seluruh aktivitas: siapa, kapan, apa yang diubah. Untuk akuntabilitas & kontrol data DP.</div></div></div>
   <div class="panel"><div class="table-wrap"><table><thead><tr><th>Waktu</th><th>User</th><th>Role</th><th>Aksi</th><th>Detail</th></tr></thead>
   <tbody>${STATE.audit.length?STATE.audit.map(a=>`<tr><td class="muted">${fmtTs(a.ts)}</td><td class="name">${esc(a.user)}</td><td class="muted">${ROLE_LABEL[a.role]||a.role}</td><td><span class="pill">${esc(a.action)}</span></td><td>${esc(a.detail)}</td></tr>`).join(""):`<tr><td colspan="5" class="empty">Belum ada aktivitas tercatat.</td></tr>`}</tbody></table></div></div>`;
}

/* ================= DEMO SEED (opsional) ================= */
function seedDemo(){
  if(STATE.reservations.length){ if(!confirm("Sudah ada data. Tambahkan contoh data demo?"))return; }
  const names=["Budi Santoso","Sarah Wijaya","Andre Kurniawan","Melati Putri","PT Nusantara Jaya","Rian Hidayat","Keluarga Tanjung","Fitri Amelia"];
  const now=new Date();
  names.forEach((n,i)=>{
    const d=new Date(now); d.setDate(d.getDate()-7+i*2);
    const dp = i%3===0;
    STATE.reservations.push({ id:uid(), name:n, phone:normPhone("08"+(1234500000+i*11111)), date:d.toISOString().slice(0,10), time:["18:00","19:00","19:30","20:00","20:30"][i%5], pax:[2,4,6,10,25,4,8,3][i], table:STATE.master.tables[i%STATE.master.tables.length], foodReq:i%2?"Nasi Goreng Kapal":"", drinkReq:"", dpStatus:dp?"Sudah":"Belum", dpMethod:dp?"QRIS":"", dpAmount:dp?100000:0, dpProofData:"",dpProofName:"", docReqData:"",docReqName:"", source:STATE.master.infoSources[i%STATE.master.infoSources.length], picType:i%2?"Marketing":"Host/Captain", picName:["Devani","Aurel","Christy"][i%3], member:i%4===0, memberNo:i%4===0?"LM-000"+i:"", notes:i===4?"Reservasi korporat, butuh proyektor":"", vip:false, status:["Completed","Completed","No-show","Completed","Confirmed","Pending","Completed","Checked-in"][i], createdBy:"Devani", createdAt:Date.now()-i*86400000, updatedAt:Date.now(), actualPax:i%3?[2,4,null,10,null,null,8,3][i]:null, checkinAt:null, followups:[] });
  });
  logAudit("Seed Demo","8 reservasi contoh ditambahkan"); saveState(); toast("Data demo ditambahkan","ok"); navigate("dashboard");
}

loadState();
initLogin();
// expose seed via console for convenience
window.seedDemo=seedDemo;
</script>
