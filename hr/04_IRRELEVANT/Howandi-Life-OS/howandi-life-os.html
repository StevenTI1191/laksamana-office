<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Howandi Life OS — CEO Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
/* ============ TOKENS: warm-paper executive, light & readable ============ */
:root{
  --bg:#F4F3EF; --panel:#FFFFFF; --panel-2:#FAF9F6; --panel-3:#F1EFE9;
  --line:#E5E2DA; --line-soft:#EDEAE3;
  --text:#1F272E; --muted:#68727B; --faint:#A0A8AF;
  --primary:#2A3742; --primary-h:#354553;
  --brass:#B0812F; --brass-bright:#C9A249; --brass-dim:#8A6522;
  --urgent:#C2691F; --overdue:#BE3B34; --go:#2C8A78; --info:#3E74A6; --violet:#7B5EA6;
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 2px rgba(31,39,46,.04), 0 10px 26px -18px rgba(31,39,46,.22);
  --disp:"Space Grotesk",system-ui,sans-serif;
  --body:"Inter",system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1100px 640px at 82% -10%, rgba(176,129,47,.06), transparent 60%),
    radial-gradient(820px 560px at 4% 110%, rgba(62,116,166,.05), transparent 55%),
    var(--bg);
  color:var(--text); font-family:var(--body); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#D8D4CB;border-radius:20px;border:3px solid transparent;background-clip:content-box}
::selection{background:rgba(176,129,47,.22)}

/* ============ SHELL ============ */
.app{display:grid;grid-template-columns:238px 1fr;min-height:100vh}
.rail{
  position:sticky;top:0;height:100vh;border-right:1px solid var(--line);
  background:linear-gradient(180deg,#FBFAF7,#F4F3EF);
  display:flex;flex-direction:column;padding:20px 14px;gap:3px;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 16px}
.brand .mark{
  width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;
  background:linear-gradient(140deg,var(--brass-bright),var(--brass-dim));
  color:#fff;font-family:var(--disp);font-weight:700;font-size:17px;
  box-shadow:0 6px 15px -7px rgba(176,129,47,.7);
}
.brand .t1{font-family:var(--disp);font-weight:600;font-size:14.5px;letter-spacing:.2px;line-height:1.15}
.brand .t2{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:1.4px;text-transform:uppercase;margin-top:2px}
.nav-group{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);padding:13px 10px 5px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:8.5px 11px;border-radius:9px;
  color:var(--muted);font-size:13.5px;font-weight:500;width:100%;text-align:left;
  transition:background .15s,color .15s;
}
.nav-item:hover{background:var(--panel-3);color:var(--text)}
.nav-item.active{background:rgba(176,129,47,.12);color:var(--brass-dim)}
.nav-item.active .ic{color:var(--brass)}
.nav-item .ic{width:17px;height:17px;flex-shrink:0;color:var(--faint)}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--panel-3);color:var(--muted);padding:1px 6px;border-radius:20px}
.nav-item.active .badge{background:rgba(176,129,47,.18);color:var(--brass-dim)}

.main{min-width:0;padding:26px 30px 96px;max-width:1180px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.pagetitle{font-family:var(--disp);font-size:25px;font-weight:600;letter-spacing:-.3px}
.pagesub{color:var(--muted);font-size:13px;margin-top:3px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--panel);color:var(--text);transition:.15s}
.btn:hover{border-color:var(--brass-dim);background:var(--panel-2)}
.btn .ic{width:15px;height:15px}
.btn-primary{background:var(--primary);color:#fff;border:1px solid var(--primary);font-weight:600}
.btn-primary:hover{background:var(--primary-h);border-color:var(--primary-h)}
.btn-ghost{background:none;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--panel-3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}

/* panels */
.grid{display:grid;gap:16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.panel-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px 0}
.panel-title{font-family:var(--mono);font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:7px}
.panel-title .dot{width:6px;height:6px;border-radius:50%;background:var(--brass)}
.panel-b{padding:14px 16px 16px}

/* cockpit strip */
.cockpit{
  background:linear-gradient(120deg,rgba(176,129,47,.09),rgba(255,255,255,0) 46%),var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;
  display:grid;grid-template-columns:1.4fr 1fr;gap:22px;align-items:center;box-shadow:var(--shadow);
}
.cp-date{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--brass-dim)}
.cp-focus-label{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin:12px 0 5px}
.cp-focus{font-family:var(--disp);font-size:21px;font-weight:600;line-height:1.25;letter-spacing:-.3px;background:none;width:100%;border:none;color:var(--text);resize:none;outline:none}
.cp-focus::placeholder{color:var(--faint)}
.cp-focus:focus{color:var(--brass-dim)}
.dials{display:flex;gap:26px;justify-content:flex-end}
.dial{text-align:center}
.dial-label{font-family:var(--mono);font-size:9px;letter-spacing:1.3px;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.dial-row{display:flex;gap:5px}
.seg{width:14px;height:26px;border-radius:4px;background:var(--panel-3);border:1px solid var(--line);cursor:pointer;transition:.12s}
.seg.on{background:linear-gradient(180deg,var(--brass-bright),var(--brass-dim));border-color:var(--brass)}
.seg.on.energy{background:linear-gradient(180deg,#3fae99,#236a5c);border-color:var(--go)}

/* dashboard grid */
.dash{grid-template-columns:repeat(12,1fr)}
.col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-5{grid-column:span 5}.col-6{grid-column:span 6}.col-7{grid-column:span 7}.col-8{grid-column:span 8}.col-12{grid-column:span 12}

/* stats */
.stat{display:flex;flex-direction:column;gap:3px}
.stat .k{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
.stat .v{font-family:var(--disp);font-size:24px;font-weight:600;letter-spacing:-.5px;line-height:1.05}
.stat .s{font-size:11.5px;color:var(--faint)}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* task rows */
.trow{display:flex;align-items:center;gap:11px;padding:9px 4px;border-bottom:1px solid var(--line-soft)}
.trow:last-child{border-bottom:none}
.chk{width:19px;height:19px;border-radius:6px;border:1.5px solid #D2CDC3;flex-shrink:0;display:grid;place-items:center;transition:.15s;background:var(--panel)}
.chk:hover{border-color:var(--brass)}
.chk.done{background:var(--go);border-color:var(--go)}
.chk svg{width:11px;height:11px;color:#fff;opacity:0;transition:.15s}
.chk.done svg{opacity:1}
.t-main{min-width:0;flex:1}
.t-name{font-size:13.5px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-name.done{color:var(--faint);text-decoration:line-through}
.t-meta{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.4px;padding:2px 6px;border-radius:5px;background:var(--panel-3);color:var(--muted);white-space:nowrap}
.tag.q-do{background:rgba(190,59,52,.12);color:#a5322c}
.tag.q-schedule{background:rgba(62,116,166,.12);color:#2f6191}
.tag.q-delegate{background:rgba(194,105,31,.13);color:#a4571a}
.tag.q-delete{background:#EEECE6;color:var(--muted)}
.tag.biz{background:rgba(176,129,47,.13);color:var(--brass-dim)}
.tag.pic{background:rgba(123,94,166,.13);color:#63489a}
.tag.due{color:var(--muted)}
.tag.overdue{background:rgba(190,59,52,.14);color:#a5322c}
.t-actions{display:flex;gap:3px;opacity:0;transition:.15s}
.trow:hover .t-actions{opacity:1}
.icon-btn{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--faint);transition:.15s}
.icon-btn:hover{background:var(--panel-3);color:var(--text)}
.icon-btn svg{width:15px;height:15px}
.icon-btn.gcal:hover{color:var(--brass-dim)}

.empty{text-align:center;padding:24px 16px;color:var(--faint)}
.empty .em-t{font-size:13px;color:var(--muted);margin-bottom:3px}
.empty .em-s{font-size:12px}

/* gauges */
.goal{padding:11px 0;border-bottom:1px solid var(--line-soft)}
.goal:last-child{border-bottom:none}
.goal-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;gap:10px}
.goal-n{font-size:13px;font-weight:500}
.goal-v{font-family:var(--mono);font-size:11px;color:var(--muted)}
.goal-v b{color:var(--brass-dim);font-weight:600}
.gauge{height:6px;border-radius:20px;background:var(--panel-3);overflow:hidden}
.gauge > i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brass-dim),var(--brass-bright));transition:width .5s cubic-bezier(.2,.8,.2,1)}
.gauge.go > i{background:linear-gradient(90deg,#236a5c,var(--go))}

/* habits */
.habits{display:flex;flex-wrap:wrap;gap:8px}
.habit{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:9px;border:1px solid var(--line);background:var(--panel);font-size:12.5px;transition:.15s}
.habit:hover{border-color:var(--brass-dim)}
.habit.done{background:rgba(44,138,120,.1);border-color:rgba(44,138,120,.35)}
.habit .streak{font-family:var(--mono);font-size:10px;color:var(--faint)}
.habit.done .streak{color:var(--go)}

/* brain dump */
.dump-input{display:flex;gap:8px;margin-bottom:10px}
.dump-input input{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;outline:none}
.dump-input input:focus{border-color:var(--brass-dim)}
.dump-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line-soft);font-size:13px;color:var(--muted)}
.dump-item:last-child{border-bottom:none}
.dump-item .d{width:5px;height:5px;border-radius:50%;background:var(--brass);flex-shrink:0}
.dump-item button{margin-left:auto;color:var(--faint);font-size:11px}
.dump-item button:hover{color:var(--overdue)}

/* eisenhower */
.eisen{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.quad{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);overflow:hidden;min-height:180px;box-shadow:var(--shadow)}
.quad-h{padding:12px 15px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:9px}
.quad-h .q-badge{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:6px;text-transform:uppercase;font-weight:600}
.quad-h .q-desc{font-size:11px;color:var(--faint)}
.quad-b{padding:8px 12px 12px}
.quad.do{border-top:2px solid var(--overdue)}
.quad.schedule{border-top:2px solid var(--info)}
.quad.delegate{border-top:2px solid var(--urgent)}
.quad.delete{border-top:2px solid var(--faint)}
.q-badge.do{background:rgba(190,59,52,.12);color:#a5322c}
.q-badge.schedule{background:rgba(62,116,166,.12);color:#2f6191}
.q-badge.delegate{background:rgba(194,105,31,.13);color:#a4571a}
.q-badge.delete{background:#EEECE6;color:var(--muted)}

/* segmented nav */
.seg-nav{display:inline-flex;background:var(--panel-3);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;flex-wrap:wrap}
.seg-nav button{padding:6px 13px;border-radius:7px;font-size:12.5px;color:var(--muted);font-weight:500;transition:.15s}
.seg-nav button.on{background:var(--panel);color:var(--brass-dim);box-shadow:0 1px 3px rgba(31,39,46,.08)}

/* kanban */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px}
.kcol{flex:0 0 262px;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;max-height:calc(100vh - 200px)}
.kcol-h{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line-soft)}
.kcol-h .kt{font-family:var(--mono);font-size:10px;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted)}
.kcol-h .kc{font-family:var(--mono);font-size:10px;color:var(--faint);background:var(--panel);padding:1px 7px;border-radius:20px}
.kcol-b{padding:10px;overflow-y:auto;flex:1;min-height:40px}
.kcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:9px;cursor:grab;transition:.15s;box-shadow:0 1px 2px rgba(31,39,46,.03)}
.kcard:hover{border-color:var(--brass-dim)}
.kcard.dragging{opacity:.4}
.kcard-t{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:8px}
.kcard-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.mini-gauge{height:4px;border-radius:20px;background:var(--panel-3);margin-top:9px;overflow:hidden}
.mini-gauge > i{display:block;height:100%;background:linear-gradient(90deg,var(--brass-dim),var(--brass-bright))}
.kcol.drop{outline:1.5px dashed var(--brass-dim);outline-offset:-4px;background:rgba(176,129,47,.05)}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.cal-dow{background:var(--panel);padding:9px;text-align:center;font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--faint)}
.cal-cell{background:var(--panel);min-height:104px;padding:7px 8px;position:relative;transition:.15s}
.cal-cell:hover{background:var(--panel-2)}
.cal-cell.other{background:var(--panel-3);color:var(--faint)}
.cal-num{font-family:var(--mono);font-size:12px;color:var(--muted);display:inline-block;margin-bottom:5px}
.cal-cell.today{background:linear-gradient(180deg,rgba(176,129,47,.08),transparent)}
.cal-cell.today .cal-num{background:var(--brass);color:#fff;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-weight:600}
.cal-ev{font-size:10.5px;padding:2px 6px;border-radius:5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-left:2px solid}
.cal-ev.meeting{background:rgba(62,116,166,.1);border-color:var(--info);color:#2f6191}
.cal-ev.deadline{background:rgba(190,59,52,.1);border-color:var(--overdue);color:#a5322c}
.cal-ev.personal{background:rgba(44,138,120,.1);border-color:var(--go);color:#236a5c}
.cal-ev.content{background:rgba(123,94,166,.11);border-color:var(--violet);color:#63489a}
.cal-ev.event{background:rgba(176,129,47,.11);border-color:var(--brass);color:var(--brass-dim)}
.cal-more{font-size:10px;color:var(--faint)}

/* agenda */
.ag-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.ag-row:last-child{border-bottom:none}
.ag-time{font-family:var(--mono);font-size:11px;color:var(--muted);width:52px;flex-shrink:0;padding-top:1px}
.ag-body{flex:1;min-width:0}
.ag-bar{width:3px;border-radius:3px;flex-shrink:0}
.ag-bar.meeting{background:var(--info)}.ag-bar.deadline{background:var(--overdue)}.ag-bar.personal{background:var(--go)}.ag-bar.content{background:var(--violet)}.ag-bar.event{background:var(--brass)}

/* roadmap timeline */
.tl{position:relative;padding-left:26px}
.tl:before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-year{position:relative;margin-bottom:22px}
.tl-year .yr{font-family:var(--disp);font-size:16px;font-weight:600;color:var(--brass-dim);margin-bottom:9px;position:relative}
.tl-year .yr:before{content:'';position:absolute;left:-26px;top:5px;width:12px;height:12px;border-radius:50%;background:var(--brass);border:3px solid var(--panel);box-shadow:0 0 0 1px var(--brass)}
.mile{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:9px;margin-bottom:7px}
.mile.done{background:rgba(44,138,120,.07);border-color:rgba(44,138,120,.25)}
.mile .mtxt{flex:1;font-size:13px}
.mile.done .mtxt{color:var(--muted);text-decoration:line-through}

/* dream cards */
.dream{display:flex;gap:11px;padding:11px;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;align-items:flex-start}
.dream .dm-ic{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;color:#fff}
.dream .dm-b{flex:1;min-width:0}
.dream .dm-t{font-size:13.5px;font-weight:500;line-height:1.3}
.dream .dm-note{font-size:12px;color:var(--muted);margin-top:2px}
.dream.done .dm-t{color:var(--muted);text-decoration:line-through}

/* learning */
.learn-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:var(--shadow)}
.learn-h{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.learn-t{font-family:var(--disp);font-size:15px;font-weight:600;line-height:1.25}
.learn-src{font-size:12px;color:var(--muted);margin-top:2px}
.stars{font-size:12px;color:var(--brass);letter-spacing:1px;white-space:nowrap}
.learn-take{font-size:12.5px;color:var(--muted);line-height:1.55;background:var(--panel-2);border-left:2px solid var(--brass);padding:9px 11px;border-radius:0 8px 8px 0;margin-top:8px;white-space:pre-wrap}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(31,39,46,.42);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:540px;box-shadow:0 30px 70px -25px rgba(31,39,46,.4);animation:pop .2s ease}
@keyframes pop{from{transform:translateY(8px) scale(.99);opacity:0}to{transform:none;opacity:1}}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{margin:0;font-family:var(--disp);font-size:17px;font-weight:600}
.modal-b{padding:20px 22px;display:grid;gap:15px}
.modal-f{padding:16px 22px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;gap:10px}
.field label{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brass-dim);background:var(--panel)}
.field textarea{resize:vertical;min-height:64px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.toggles{display:flex;gap:10px}
.toggle{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);font-size:13px;color:var(--muted);transition:.15s;font-weight:500}

/* ============ GOOGLE CALENDAR ============ */
function pad(n){return String(n).padStart(2,'0')}
function gcalDates(date,start,end){if(start){const s=date.replace(/-/g,'')+'T'+start.replace(':','')+'00';let e;if(end){e=date.replace(/-/g,'')+'T'+end.replace(':','')+'00'}else{const[h,m]=start.split(':');e=date.replace(/-/g,'')+'T'+pad((+h+1)%24)+m+'00'}return s+'/'+e}const nx=new Date(date+'T00:00');nx.setDate(nx.getDate()+1);return date.replace(/-/g,'')+'/'+nx.toLocaleDateString('en-CA').replace(/-/g,'')}
function gcalLink(title,date,start,end,details){const p=new URLSearchParams({action:'TEMPLATE',text:title,dates:gcalDates(date,start,end)});if(details)p.set('details',details);return'https://calendar.google.com/calendar/render?'+p.toString()}
function openGcal(title,date,start,end,details){window.open(gcalLink(title,date,start,end,details),'_blank');toast('Membuka Google Calendar…')}
function icsBlock(t,date,start,end,desc){const dt=(d,tm)=>d.replace(/-/g,'')+(tm?('T'+tm.replace(':','')+'00'):'');let o='BEGIN:VEVENT\r\nUID:'+uid()+'@howandi-los\r\nSUMMARY:'+t.replace(/[,;]/g,' ')+'\r\n';if(start){o+='DTSTART:'+dt(date,start)+'\r\nDTEND:'+dt(date,end||start)+'\r\n'}else{const nx=new Date(date+'T00:00');nx.setDate(nx.getDate()+1);o+='DTSTART;VALUE=DATE:'+dt(date)+'\r\nDTEND;VALUE=DATE:'+dt(nx.toLocaleDateString('en-CA'))+'\r\n'}if(desc)o+='DESCRIPTION:'+desc.replace(/[,;]/g,' ')+'\r\n';return o+'END:VEVENT\r\n'}
function exportICS(){let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Howandi Life OS//ID\r\nCALSCALE:GREGORIAN\r\n';S.events.forEach(e=>ics+=icsBlock(e.title,e.date,e.start,e.end,e.type));S.tasks.filter(t=>t.due&&!t.done).forEach(t=>ics+=icsBlock('⏰ '+t.name+(t.biz?' ['+t.biz+']':''),t.due,null,null,'Deadline task'));S.content.filter(c=>c.date&&c.stage!=='Posted').forEach(c=>ics+=icsBlock('🎬 '+c.title,c.date,null,null,'Content '+c.stage));ics+='END:VCALENDAR';const blob=new Blob([ics],{type:'text/calendar'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='howandi-life-os.ics';a.click();URL.revokeObjectURL(url);toast('File .ics diunduh — import ke Google Calendar')}

function render(){

  renderMobnav();
  document.getElementById('nav-tasks').textContent=S.tasks.filter(t=>!t.done).length;
  document.getElementById('nav-proj').textContent=S.projects.filter(p=>p.stage!=='Done'&&p.stage!=='Archive').length;

}
function hydrateIcons(scope){scope.querySelectorAll('[data-i]').forEach(el=>{if(!el.dataset.done){el.innerHTML=svg(el.dataset.i);el.dataset.done=1}})}

const DOW=['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
function viewCalendar(m){
  const y=calRef.getFullYear(),mo=calRef.getMonth();const monthName=calRef.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  m.innerHTML=`<div class="topbar"><div><div class="pagetitle">Calendar</div><div class="pagesub">Google Calendar = single source of truth untuk waktu.</div></div><button class="btn btn-primary" onclick="openEventModal()">${svg('plus','',15)} Event</button></div>
  <div class="gcal-banner"><div class="gi">${svg('gcal','',18)}</div><div class="gt"><b>Integrasi Google Calendar</b><p>Event, deadline task, & jadwal konten bisa dikirim ke Google Calendar 1-klik, atau export semua sebagai .ics.</p></div><button class="btn" onclick="exportICS()">${svg('download','',15)} Export .ics</button></div>
  <div class="topbar" style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:12px"><button class="icon-btn" onclick="calNav(-1)" style="background:var(--panel);border:1px solid var(--line)">${svg('chevL','',16)}</button><div style="font-family:var(--disp);font-size:18px;font-weight:600;min-width:170px;text-align:center">${monthName}</div><button class="icon-btn" onclick="calNav(1)" style="background:var(--panel);border:1px solid var(--line)">${svg('chevR','',16)}</button><button class="btn btn-ghost btn-sm" onclick="calRef=new Date();render()">Hari ini</button></div></div>
  <div class="cal-grid">${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${monthCells(y,mo)}</div>`;
}
function calNav(d){calRef.setMonth(calRef.getMonth()+d);render()}
function monthCells(y,mo){const first=new Date(y,mo,1);let sd=(first.getDay()+6)%7;const dim=new Date(y,mo+1,0).getDate();const pd=new Date(y,mo,0).getDate();let cells='';const today=todayISO();for(let i=0;i<42;i++){let dn,cd,other=false;if(i<sd){dn=pd-sd+i+1;cd=new Date(y,mo-1,dn);other=true}else if(i>=sd+dim){dn=i-sd-dim+1;cd=new Date(y,mo+1,dn);other=true}else{dn=i-sd+1;cd=new Date(y,mo,dn)}const iso=cd.toLocaleDateString('en-CA');const evs=S.events.filter(e=>e.date===iso);const dls=S.tasks.filter(t=>t.due===iso&&!t.done);const cts=S.content.filter(c=>c.date===iso&&c.stage!=='Posted');const items=[...evs.map(e=>({t:e.title,type:e.type,id:e.id})),...dls.map(t=>({t:t.name,type:'deadline'})),...cts.map(c=>({t:'🎬 '+c.title,type:'content'}))];cells+=`<div class="cal-cell ${other?'other':''} ${iso===today?'today':''}" ondblclick="openEventModal(null,'${iso}')"><span class="cal-num">${dn}</span>${items.slice(0,3).map(it=>`<div class="cal-ev ${it.type}" ${it.id?`onclick="openEventModal('${it.id}')"`:''}>${it.t}</div>`).join('')}${items.length>3?`<div class="cal-more">+${items.length-3} lagi</div>`:''}</div>`}return cells}

function openModal(html){const o=document.getElementById('overlay');document.getElementById('modal').innerHTML=html;o.classList.add('show');hydrateIcons(document.getElementById('modal'))}
function closeModal(){document.getElementById('overlay').classList.remove('show')}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal()});
let editId=null,mUrgent=false,mImportant=false;

function openTaskModal(id){editId=id;const t=id?S.tasks.find(x=>x.id===id):null;mUrgent=t?t.urgent:false;mImportant=t?t.important:true;
  openModal(`<div class="modal-h"><h3>${t?'Edit Task':'Task Baru'}</h3><button class="icon-btn" onclick="closeModal()">${svg('x','',18)}</button></div><div class="modal-b">
    <div class="field"><label>Nama task</label><input id="f-name" value="${t?esc(t.name):''}" placeholder="Apa yang harus dikerjakan?" autofocus></div>
    <div class="field-row"><div class="field"><label>Bisnis</label><select id="f-biz"><option value="">— Tanpa bisnis —</option>${S.businesses.map(b=>`<option ${t&&t.biz===b.name?'selected':''}>${b.name}</option>`).join('')}</select></div><div class="field"><label>Owner / PIC</label><input id="f-owner" value="${t?esc(t.owner||''):''}" placeholder="Saya / nama tim"></div></div>
    <div class="field-row"><div class="field"><label>Deadline</label><input id="f-due" type="date" value="${t?t.due||'':''}"></div><div class="field"><label>Estimasi (menit)</label><input id="f-est" type="number" value="${t?t.est||'':''}" placeholder="mis. 30"></div></div>
    <div class="field"><label>Prioritas (Eisenhower)</label><div class="toggles"><button class="toggle ${mImportant?'on':''}" id="tg-imp" onclick="tgl('imp')"><span class="tick">${svg('check')}</span>Penting</button><button class="toggle ${mUrgent?'on':''}" id="tg-urg" onclick="tgl('urg')"><span class="tick">${svg('check')}</span>Mendesak</button></div><div class="q-preview q-${quadrant({important:mImportant,urgent:mUrgent}).k}" id="q-prev" style="margin-top:10px"></div></div>
  </div><div class="modal-f"><div>${t?`<button class="btn btn-ghost" onclick="delTask('${t.id}');closeModal()" style="color:var(--overdue)">${svg('trash','',15)} Hapus</button>`:''}</div><div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="saveTask()">${t?'Simpan':'Tambah'}</button></div></div>`);updateQPrev()}
function tgl(w){if(w==='imp')mImportant=!mImportant;else mUrgent=!mUrgent;document.getElementById('tg-imp').classList.toggle('on',mImportant);document.getElementById('tg-urg').classList.toggle('on',mUrgent);updateQPrev()}
function updateQPrev(){const q=quadrant({important:mImportant,urgent:mUrgent});const el=document.getElementById('q-prev');el.className='q-preview q-'+q.k;el.innerHTML=`→ <b>${q.label}</b> · ${q.desc}`}
function saveTask(){const name=document.getElementById('f-name').value.trim();if(!name){toast('Nama task wajib diisi');return}const data={name,biz:document.getElementById('f-biz').value,owner:document.getElementById('f-owner').value,due:document.getElementById('f-due').value,important:mImportant,urgent:mUrgent,est:+document.getElementById('f-est').value||0};if(editId)Object.assign(S.tasks.find(t=>t.id===editId),data);else S.tasks.unshift({id:uid(),done:false,...data});save();closeModal();render();toast(editId?'Task diperbarui':'Task ditambahkan')}
function toggleTask(id){const t=S.tasks.find(x=>x.id===id);t.done=!t.done;save();render()}
function delTask(id){S.tasks=S.tasks.filter(t=>t.id!==id);save();render()}

function openProjModal(id){editId=id;const p=id?S.projects.find(x=>x.id===id):null;
