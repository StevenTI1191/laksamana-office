<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B1F33">
<title>PeopleOS — Laksamana Muda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1F33; --ink2:#122B45; --ink3:#1B3A5C;
  --gold:#F7BB0E; --gold2:#B8893A; --gold-soft:rgba(247,187,14,.14);
  --cream:#FAF6EE; --paper:#FFFFFF; --line:#E6DFD0; --line2:#EFE9DB;
  --tx:#22303F; --tx2:#5C6B7A; --tx3:#8A97A5;
  --ok:#1E8E5A; --ok-bg:#E4F4EC; --warn:#B97A0A; --warn-bg:#FBF1DC;
  --bad:#C0392B; --bad-bg:#FBE7E4; --info:#2563EB; --info-bg:#E7EEFC;
  --r:12px; --r-sm:8px;
  --shadow:0 1px 3px rgba(11,31,51,.08),0 4px 14px rgba(11,31,51,.06);
  --font-d:'Fraunces',Georgia,serif; --font-b:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-b);background:var(--cream);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,.disp{font-family:var(--font-d)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13.5px;padding:8px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;color:var(--tx);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:0;border-color:var(--gold2)}
label{font-size:12px;font-weight:600;color:var(--tx2);display:block;margin-bottom:4px}
::placeholder{color:var(--tx3)}

/* ---------- LOGIN ---------- */
#loginScreen{position:fixed;inset:0;background:radial-gradient(1200px 700px at 20% -10%,#1B3A5C 0%,var(--ink) 55%);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.login-card{background:var(--paper);border-radius:18px;padding:38px 34px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.login-card .mark{display:flex;justify-content:center;margin-bottom:14px}
.login-card h1{font-size:26px;color:var(--ink);text-align:center;font-weight:700}
.login-card .sub{text-align:center;color:var(--tx2);font-size:12.5px;margin:6px 0 24px;letter-spacing:.04em}
.login-card .field{margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:7px;justify-content:center;padding:9px 16px;border-radius:var(--r-sm);border:1px solid transparent;font-weight:600;font-size:13.5px;transition:.15s}
.btn-gold{background:var(--gold);color:var(--ink);width:100%;padding:11px}
.btn-gold:hover{background:#e0a90c}
.btn-pri{background:var(--ink);color:#fff}
.btn-pri:hover{background:var(--ink3)}
.btn-line{background:#fff;border-color:var(--line);color:var(--tx)}
.btn-line:hover{border-color:var(--gold2);color:var(--ink)}
.btn-danger{background:var(--bad);color:#fff}
.btn-sm{padding:5px 10px;font-size:12.5px}
.btn-xs{padding:3px 8px;font-size:11.5px;border-radius:6px}
.login-err{color:var(--bad);font-size:12.5px;text-align:center;margin-top:10px;min-height:16px}
.login-foot{text-align:center;margin-top:18px;font-size:11px;color:var(--tx3)}

/* ---------- SHELL ---------- */
#app{display:none;height:100vh}
#app.on{display:flex}
aside{width:236px;min-width:236px;background:linear-gradient(180deg,var(--ink) 0%,#0E2440 100%);color:#C9D4DF;display:flex;flex-direction:column;overflow:hidden}
.brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .bt{line-height:1.15}
.brand .bt b{display:block;font-family:var(--font-d);font-size:16.5px;color:#fff;font-weight:700}
.brand .bt span{font-size:10.5px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase}
nav{flex:1;overflow-y:auto;padding:10px 10px 16px}
nav::-webkit-scrollbar{width:5px}
nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.ngroup{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#6E8199;margin:14px 8px 5px;font-weight:700}
.nitem{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;color:#C9D4DF;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:1px}
.nitem svg{width:16px;height:16px;flex:none;opacity:.8}
.nitem:hover{background:rgba(255,255,255,.07);color:#fff}
.nitem.on{background:var(--gold-soft);color:var(--gold);font-weight:600}
.nitem.on svg{opacity:1}
.side-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#6E8199}
main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
header.topbar{background:var(--paper);border-bottom:1px solid var(--line2);padding:12px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.topbar h2{font-size:19px;color:var(--ink);font-weight:700;flex:1}
.userchip{display:flex;align-items:center;gap:9px;background:var(--cream);border:1px solid var(--line);border-radius:999px;padding:4px 12px 4px 4px}
.ava{width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11.5px;flex:none}
.userchip .un{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.1}
.userchip .ur{font-size:10.5px;color:var(--tx2)}
#content{padding:22px 24px 60px;max-width:1240px;width:100%;margin:0 auto}

/* ---------- COMPONENTS ---------- */
.cards{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--paper);border:1px solid var(--line2);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.card h3{font-size:15px;color:var(--ink);margin-bottom:10px;font-weight:700}
.kpi-card .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);font-weight:700}
.kpi-card .val{font-family:var(--font-d);font-size:28px;font-weight:700;color:var(--ink);margin-top:3px}
.kpi-card .sub{font-size:11.5px;color:var(--tx2);margin-top:2px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.toolbar .sp{flex:1}
.toolbar input,.toolbar select{width:auto}
table.tbl{width:100%;border-collapse:collapse;background:var(--paper);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);font-size:13px}
.tbl th{background:var(--ink);color:#E8EDF2;text-align:left;padding:9px 12px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--line2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:#FCF9F2}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}
.tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.tag.ok{background:var(--ok-bg);color:var(--ok)}.tag.warn{background:var(--warn-bg);color:var(--warn)}
.tag.bad{background:var(--bad-bg);color:var(--bad)}.tag.info{background:var(--info-bg);color:var(--info)}
.tag.gold{background:var(--gold-soft);color:var(--gold2)}.tag.mut{background:#EEF1F4;color:var(--tx2)}
.grade{font-family:var(--font-d);font-weight:700;font-size:15px}
.bar{height:7px;background:#EDF0F3;border-radius:99px;overflow:hidden;min-width:70px}
.bar i{display:block;height:100%;border-radius:99px;background:var(--gold2)}
.bar.g i{background:var(--ok)}.bar.w i{background:var(--warn)}.bar.b i{background:var(--bad)}
.stars{color:var(--gold2);letter-spacing:1px;font-size:13px;white-space:nowrap}
.empty{padding:36px;text-align:center;color:var(--tx3);background:var(--paper);border:1.5px dashed var(--line);border-radius:var(--r);font-size:13px}
.hint{font-size:11.5px;color:var(--tx3);margin-top:6px}
.note{background:var(--info-bg);border-left:3px solid var(--info);padding:9px 12px;border-radius:0 8px 8px 0;font-size:12.5px;color:#1E3A8A;margin-bottom:14px}
.note.w{background:var(--warn-bg);border-color:var(--warn);color:#7A5104}
.sec-title{display:flex;align-items:baseline;gap:10px;margin:22px 0 10px}
.sec-title h3{font-size:16px;color:var(--ink)}
.sec-title .sub{font-size:12px;color:var(--tx2)}
.flex{display:flex;gap:10px;align-items:center}.grow{flex:1}
.right{margin-left:auto}
.mut{color:var(--tx2)}.small{font-size:12px}.xs{font-size:11px}
.mono{font-variant-numeric:tabular-nums}

/* ---------- MODAL / TOAST ---------- */
#modalWrap{position:fixed;inset:0;background:rgba(11,31,51,.55);display:none;align-items:flex-start;justify-content:center;z-index:80;padding:40px 16px;overflow-y:auto}
#modalWrap.on{display:flex}
.modal{background:var(--paper);border-radius:14px;width:100%;max-width:640px;box-shadow:0 30px 80px rgba(0,0,0,.35);animation:pop .18s ease}
.modal.wide{max-width:860px}
@keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.m-head{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line2)}
.m-head h3{font-size:17px;color:var(--ink);flex:1}
.m-x{background:none;border:none;font-size:20px;color:var(--tx3);line-height:1;padding:4px}
.m-body{padding:18px 20px;max-height:calc(100vh - 220px);overflow-y:auto}
.m-foot{padding:13px 20px;border-top:1px solid var(--line2);display:flex;justify-content:flex-end;gap:9px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.f3{grid-template-columns:1fr 1fr 1fr}
.frow.f1{grid-template-columns:1fr}
#toasts{position:fixed;bottom:20px;right:20px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);border-left:3px solid var(--gold);animation:pop .2s ease;max-width:340px}
.toast.err{border-left-color:var(--bad)}

/* leaderboard / misc */
.podium{display:flex;gap:12px;align-items:flex-end;margin:8px 0 16px}
.pod{flex:1;background:var(--paper);border:1px solid var(--line2);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--shadow)}
.pod .rank{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--gold2)}
.pod.first{border-color:var(--gold);background:linear-gradient(180deg,#FFFDF5,#fff)}
.mood-row{display:flex;gap:8px;justify-content:center;margin:8px 0}
.mood-btn{font-size:26px;background:none;border:2px solid transparent;border-radius:12px;padding:6px 10px;transition:.12s}
.mood-btn:hover{transform:scale(1.12)}
.mood-btn.sel{border-color:var(--gold);background:var(--gold-soft)}
.badge-pill{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);border:1px solid rgba(184,137,58,.35);color:var(--gold2);border-radius:999px;padding:3px 10px;font-size:11.5px;font-weight:600;margin:2px}
.timeline{border-left:2px solid var(--line);padding-left:16px;margin-left:6px}
.tl-item{position:relative;padding-bottom:14px}
.tl-item:before{content:'';position:absolute;left:-21px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--gold2)}
.chip-month{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-sm);padding:7px 10px;font-weight:600;font-size:13px}
svg.chart text{font-family:var(--font-b)}
.print-only{display:none}
@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){
  aside{position:fixed;left:-240px;top:0;bottom:0;z-index:60;transition:.2s}
  aside.open{left:0}
  #menuBtn{display:inline-flex}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .frow,.frow.f3{grid-template-columns:1fr}
  #content{padding:16px 14px 60px}
}
#menuBtn{display:none;background:none;border:1px solid var(--line);border-radius:8px;padding:6px 9px}
@media print{
  aside,header.topbar,.toolbar,.btn,#toasts{display:none!important}
  body{background:#fff}
  #content{max-width:none;padding:0}
  .print-only{display:block}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="mark" id="loginMark"></div>
    <h1>PeopleOS Laksamana</h1>
    <div class="sub">PEOPLE PERFORMANCE &amp; DEVELOPMENT SYSTEM</div>
    <div class="field"><label>Pilih Kru</label><select id="loginUser"></select></div>
    <div class="field"><label>PIN</label><input type="password" id="loginPin" placeholder="••••" maxlength="8"></div>
    <button class="btn btn-gold" id="loginBtn">Naik ke Anjungan →</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-foot">Laksamana Muda Coffee &amp; Live Space · Sistem performa, bukan HRIS.<br>Absensi, cuti &amp; payroll tetap di Mekari Talenta.</div>
  </div>
</div>

<div id="app">
  <aside id="sidebar">
    <div class="brand"><span id="brandMark"></span><div class="bt"><b>PeopleOS</b><span>Laksamana Muda</span></div></div>
    <nav id="nav"></nav>
    <div class="side-foot">v1.0 · Data lokal (localStorage)<br>Phase 1–3 · AI penuh di Phase 4</div>
  </aside>
  <main>
    <header class="topbar">
      <button id="menuBtn">☰</button>
      <h2 id="pageTitle">Anjungan</h2>
      <div class="userchip"><div class="ava" id="uAva"></div><div><div class="un" id="uName"></div><div class="ur" id="uRole"></div></div></div>
      <button class="btn btn-line btn-sm" id="logoutBtn">Keluar</button>
    </header>
    <div id="content"></div>
  </main>
</div>

<div id="modalWrap"><div class="modal" id="modalBox"></div></div>
<div id="toasts"></div>

<script>
/* ====== GLOBALS (di luar IIFE agar bisa diakses dari inline handler & test) ====== */
var LM_LOGO_SVG = '<svg width="46" height="46" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="22" stroke="#F7BB0E" stroke-width="2.5"/><circle cx="24" cy="24" r="15.5" stroke="#F7BB0E" stroke-width="1" opacity=".55"/><path d="M24 5v6M24 37v6M5 24h6M37 24h6" stroke="#F7BB0E" stroke-width="2" stroke-linecap="round"/><path d="M24 12l3.2 8.8L36 24l-8.8 3.2L24 36l-3.2-8.8L12 24l8.8-3.2L24 12z" fill="#F7BB0E"/><circle cx="24" cy="24" r="2.6" fill="#0B1F33"/></svg>';
var LS_KEY = 'lm_peopleos_v1';
var SS_KEY = 'lm_peopleos_session';
var APP = null; // diisi oleh IIFE untuk akses eksternal/test

(function(){
'use strict';

/* ====== UTILS ====== */
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const uid = p => (p||'id') + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const todayStr = () => new Date().toISOString().slice(0,10);
const monthKey = d => (d||new Date().toISOString()).slice(0,7);
const NBULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const fmtMonth = mk => { if(!mk) return '-'; const [y,m]=mk.split('-'); return NBULAN[+m-1]+' '+y; };
const fmtDate = d => { if(!d) return '-'; const dt=new Date(d+'T00:00:00'); return dt.getDate()+' '+NBULAN[dt.getMonth()]+' '+dt.getFullYear(); };
const fmtNum = n => (n==null||isNaN(n)) ? '-' : Number(n).toLocaleString('id-ID',{maximumFractionDigits:1});
const initials = n => n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const shiftMonth = (mk, d) => { const [y,m]=mk.split('-').map(Number); const dt=new Date(y, m-1+d, 1); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0'); };
const lastMonths = (n, from) => { const out=[]; let mk = from||monthKey(); for(let i=0;i<n;i++){ out.unshift(mk); mk=shiftMonth(mk,-1);} return out; };
const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;

function toast(msg, err){
  const t = document.createElement('div');
  t.className = 'toast' + (err?' err':'');
  t.textContent = msg;
  $('#toasts').appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

/* ====== STATE ====== */
let S = null;
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){ toast('Gagal menyimpan: penyimpanan penuh?', true); } }
function load(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw){ S = JSON.parse(raw); migrate(); return; } }catch(e){}
  S = seed(); save();
}
function migrate(){ const d = seed(); for(const k in d){ if(S[k]===undefined) S[k]=d[k]; } for(const k in d.settings){ if(S.settings[k]===undefined) S.settings[k]=d.settings[k]; } }

/* ====== SEED ====== */
function seed(){
  const div = [
    {id:'d_mgmt', name:'Management', color:'#0B1F33'},
    {id:'d_kitchen', name:'Kitchen', color:'#C0392B'},
    {id:'d_bar', name:'Bar', color:'#B8893A'},
    {id:'d_store', name:'Store / Service', color:'#1E8E5A'},
    {id:'d_marketing', name:'Marketing & Digital', color:'#2563EB'},
    {id:'d_finance', name:'Finance', color:'#7C3AED'},
    {id:'d_event', name:'Event', color:'#DB2777'},
    {id:'d_hrga', name:'HR / GA / Legal', color:'#0891B2'}
  ];
  const E = (name, role, divId, level, appRole, join, birth) => ({
    id: uid('emp'), name, role, divId, level: level||'Staff', appRole: appRole||'staff',
    joinDate: join||'2024-06-01', birthDate: birth||'', status:'Aktif', pin:'1234',
    phone:'', email:'', notes:'', probationEnd:'', contractEnd:''
  });
  const employees = [
    E('Howandi Chandra','CEO / Nahkoda','d_mgmt','C-Level','ceo','2023-01-01'),
    E('M. Rizki Arfan','HRD','d_hrga','Manager','hr','2024-01-10'),
    E('Ismail Magribi','Store Manager','d_store','Manager','manager','2023-06-01'),
    E('Dina Mariana','CFO','d_finance','C-Level','manager','2023-03-01'),
    E('Cindy Juliawati','Finance','d_finance','Staff','staff','2024-02-01'),
    E('Devani','Sales Manager','d_marketing','Manager','manager','2024-01-15'),
    E('Aurel','Marketing / Digital','d_marketing','Staff','staff','2024-03-01'),
    E('Hengky Fernando','Event Manager','d_event','Manager','manager','2024-01-20'),
    E('Christy','Social Media & Digital','d_marketing','Staff','staff','2024-04-01'),
    E('Indah','Graphic Designer','d_marketing','Staff','staff','2024-04-01'),
    E('Aditya Setiadi','Head Chef','d_kitchen','Manager','manager','2023-08-01'),
    E('Arif Rahman Harefa','Head Bar','d_bar','Manager','manager','2023-08-01'),
    E('Novianti Kemala','Admin Purchasing','d_hrga','Staff','staff','2024-05-01'),
    E('Wandi Pranata','BDO','d_mgmt','Supervisor','manager','2024-02-01'),
    E('M. Tegar Junindri','Legal & Support','d_hrga','Staff','staff','2024-05-01')
  ];
  const K = (divId, items) => ({ id: uid('kpit'), divId, items: items.map(it=>({id:uid('ki'), name:it[0], weight:it[1], target:it[2], unit:it[3], dir:it[4]})) });
  // dir: 'up' = makin tinggi makin baik, 'down' = makin rendah makin baik (cost/waste)
  const kpiTemplates = [
    K('d_kitchen', [['Food Cost',30,30,'%','down'],['Kecepatan Penyajian (menit)',15,15,'mnt','down'],['Waste',20,3,'%','down'],['Hygiene Audit',20,90,'skor','up'],['Kepatuhan SOP',15,90,'skor','up']]),
    K('d_bar', [['Beverage Cost',30,22,'%','down'],['Speed of Service (menit)',20,7,'mnt','down'],['Upselling',25,15,'juta','up'],['Konsistensi Rasa (QC pass)',25,90,'%','up']]),
    K('d_marketing', [['Reach (ribu)',20,500,'rb','up'],['Leads / Inquiry',25,60,'leads','up'],['Konten Terbit',20,30,'konten','up'],['Closing Sponsor/Partner',35,50,'juta','up']]),

/* ====== ENGINE: KPI SCORE ====== */
function kpiTemplateFor(divId){ return S.kpiTemplates.find(t=>t.divId===divId); }
function kpiItemScore(item, actual){
  if(actual==null || actual==='' || isNaN(actual)) return null;
  actual = Number(actual);
  let ach;
  if(item.dir==='down'){ ach = actual<=0 ? 120 : (item.target/actual)*100; }
  else { ach = item.target<=0 ? 100 : (actual/item.target)*100; }
  return clamp(ach, 0, 120);
}
function divKpiScore(divId, mk){
  const t = kpiTemplateFor(divId); if(!t) return null;
  const acts = (S.kpiActuals[divId]||{})[mk]||{};
  let sw=0, sum=0, filled=0;
  t.items.forEach(it=>{
    const sc = kpiItemScore(it, acts[it.id]);
    if(sc!=null){ sum += sc*it.weight; sw += it.weight; filled++; }
  });
  if(!sw) return null;
  return { score: clamp(sum/sw,0,120), filled, total:t.items.length };
}
function empKpiScore(emp, mk){
  const mi = ((S.monthlyInputs[emp.id]||{})[mk])||{};
  if(mi.kpiOverride!=null && mi.kpiOverride!=='') return clamp(Number(mi.kpiOverride),0,120);
  const d = divKpiScore(emp.divId, mk);
  return d ? Math.min(d.score,100) : null;
}

/* ====== ENGINE: KOMPONEN PEOPLE SCORE ====== */
function trainingScore(empId){
  const recs = S.trainingRecords.filter(r=>r.empId===empId);
  const mandatory = S.trainings.filter(t=>t.mandatory && (t.divId==='all' || t.divId===(empById(empId)||{}).divId));
  if(!mandatory.length && !recs.length) return null;
  const relevant = mandatory.length ? mandatory : S.trainings.filter(t=>recs.some(r=>r.trainingId===t.id));
  if(!relevant.length) return null;
  const done = relevant.filter(t=>recs.some(r=>r.trainingId===t.id && r.status==='Lulus')).length;
  return (done/relevant.length)*100;
}
function feedbackScore(empId, mk){
  const fb = S.feedbacks.filter(f=>f.empId===empId && monthKey(f.date)===mk);
  if(!fb.length) return null;
  const pos = fb.filter(f=>f.kind==='positif').length, neg = fb.length-pos;
  return clamp(80 + pos*5 - neg*10, 0, 100);
}
function disciplineScore(empId, mk){
  const vio = S.violations.filter(v=>v.empId===empId && monthKey(v.date)===mk && v.status!=='Dibatalkan');
  let ded = 0;
  vio.forEach(v=>{ ded += (S.settings.violationDeduct[v.severity]||0); });
  return clamp(100-ded, 0, 100);
}
function reviewAspectScore(empId, mk, aspects){
  const rv = S.reviews.find(r=>r.empId===empId && r.month===mk);
  if(!rv) return null;
  const w = S.settings.reviewLayerWeights;
  const vals = [];
  aspects.forEach(a=>{
    let sw=0,sum=0;
    ['self','manager','hr','ceo'].forEach(L=>{
      const lay=rv.layers[L];
      if(lay && lay.aspects && lay.aspects[a]!=null){ sum += Number(lay.aspects[a])*(w[L]||0); sw += (w[L]||0); }
    });
    if(sw) vals.push(sum/sw);
  });
  if(!vals.length) return null;
  return avg(vals)*10; // 1-10 -> 0-100
}
function reviewOverallScore(empId, mk){
  return reviewAspectScore(empId, mk, REVIEW_ASPECTS);
}
const REVIEW_ASPECTS = ['Skill','Knowledge','Attitude','Leadership','Discipline','Communication','Problem Solving','Ownership','Integrity','Initiative','Creativity','Customer Service'];

function peopleScore(emp, mk){
  const W = S.settings.scoreWeights;
  const mi = ((S.monthlyInputs[emp.id]||{})[mk])||{};
  const dflt = S.settings.defaultComponentScore;
  const comp = {};
  comp.attendance = (mi.attendance!=null && mi.attendance!=='') ? clamp(Number(mi.attendance),0,100) : null;
  comp.kpi = empKpiScore(emp, mk);
  comp.training = trainingScore(emp.id);
  comp.review = feedbackScore(emp.id, mk); // customer review
  if(comp.review==null && mi.review!=null && mi.review!=='') comp.review = clamp(Number(mi.review),0,100);
  comp.discipline = disciplineScore(emp.id, mk);
  comp.teamwork = reviewAspectScore(emp.id, mk, ['Attitude','Communication']);
  if(comp.teamwork==null && mi.teamwork!=null && mi.teamwork!=='') comp.teamwork = clamp(Number(mi.teamwork),0,100);
  comp.initiative = reviewAspectScore(emp.id, mk, ['Initiative','Ownership']);
  if(comp.initiative==null && mi.initiative!=null && mi.initiative!=='') comp.initiative = clamp(Number(mi.initiative),0,100);
  let sum=0, dataFilled=0, totalW=0;
  const keys = ['attendance','kpi','training','review','discipline','teamwork','initiative'];
  keys.forEach(k=>{
    const w = W[k]||0; totalW += w;
    let v = comp[k];
    if(v==null){ v = dflt; } else { dataFilled += w; }
    comp[k+'_used'] = v;
    sum += Math.min(v,100)*w;
  });
  const score = totalW ? sum/totalW : 0;
  return { score, comp, completeness: totalW? Math.round(dataFilled/totalW*100):0 };
}
function gradeOf(score){
  const g = S.settings.grades.slice().sort((a,b)=>b.min-a.min).find(g=>score>=g.min);
  return g ? g.g : 'D';
}
function gradeTag(score){
  const g = gradeOf(score);
  const cls = score>=85?'ok':score>=70?'gold':score>=60?'warn':'bad';
  return '<span class="tag '+cls+'"><span class="grade">'+g+'</span></span>';
}

function sparkline(vals, w, h){
  w=w||160; h=h||40;
  const pts = vals.filter(v=>v!=null);
  if(pts.length<2) return '<span class="xs mut">data belum cukup</span>';
  const mn = Math.min(...pts)-2, mx = Math.max(...pts)+2;
  const step = w/(vals.length-1);
  let dAttr='', started=false;
  vals.forEach((v,i)=>{
    if(v==null) return;
    const x=(i*step).toFixed(1), y=(h-((v-mn)/(mx-mn||1))*h).toFixed(1);
    dAttr += (started?' L':'M')+x+' '+y; started=true;
  });
  return '<svg class="chart" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><path d="'+dAttr+'" fill="none" stroke="#B8893A" stroke-width="2" stroke-linecap="round"/></svg>';
}

/* ====== INSIGHT ENGINE (rule-based, placeholder AI Phase 4) ====== */
function buildInsights(mk){
  const prev = shiftMonth(mk,-1);
  const out = [];
  scopeEmps().forEach(e=>{
    if(e.appRole==='ceo') return;
    const now = peopleScore(e, mk), was = peopleScore(e, prev);
    if(now.completeness>=40 && was.completeness>=40 && was.score-now.score >= 8)
      out.push({sev:'warn', text: e.name+': People Score turun '+fmtNum(was.score-now.score)+' poin dari bulan lalu ('+fmtNum(was.score)+' → '+fmtNum(now.score)+'). Rekomendasi: jadwalkan coaching minggu ini.', act:'coach', empId:e.id});
    const vio = S.violations.filter(v=>v.empId===e.id && monthKey(v.date)===mk && v.status!=='Dibatalkan');
    if(vio.length>=2) out.push({sev:'bad', text: e.name+': '+vio.length+' pelanggaran bulan ini. Cek modul Disiplin — kemungkinan perlu SP sesuai aturan eskalasi.', act:'disc', empId:e.id});
    const ts = trainingScore(e.id);
    if(ts!=null && ts<50) out.push({sev:'info', text: e.name+': training wajib baru '+fmtNum(ts)+'% selesai. Assign ulang di Training Center.', act:'training', empId:e.id});
  });
  S.employees.filter(e=>e.status==='Aktif' && e.contractEnd).forEach(e=>{
    const d = Math.round((new Date(e.contractEnd)-new Date())/86400000);
    if(d>=0 && d<=45) out.push({sev:'warn', text:'Kontrak '+e.name+' habis '+fmtDate(e.contractEnd)+' ('+d+' hari lagi). Putuskan perpanjang / evaluasi.', act:'emp', empId:e.id});
  });
  const cnt = S.coachings.filter(c=>c.status!=='Selesai' && c.deadline && c.deadline < todayStr()).length;
  if(cnt) out.push({sev:'warn', text: cnt+' action plan coaching lewat deadline dan belum di-follow up.', act:'coach'});
  return out.slice(0, 8);
}

  html += '<div class="cards g4" style="margin-bottom:16px">'+

    '<tr><td style="width:26px" class="mono">'+(i+1)+'</td><td><b>'+esc(x.e.name)+'</b><div class="xs mut">'+esc(divName(x.e.divId))+'</div></td><td style="width:110px">'+barHtml(x.ps.score)+'</td><td style="width:50px">'+gradeTag(x.ps.score)+'</td></tr>').join('')+'</table>';
  html += '<button class="btn btn-line btn-sm" style="margin-top:10px" onclick="APP.go(\'score\')">Lihat semua →</button></div>';

  html += '<div class="card"><h3>KPI per Divisi — '+fmtMonth(mk)+'</h3><table class="tbl" style="box-shadow:none">';
  S.divisions.filter(d=>kpiTemplateFor(d.id)).forEach(d=>{
    const ks = divKpiScore(d.id, mk);
    html += '<tr><td><b>'+esc(d.name)+'</b></td><td style="width:140px">'+(ks?barHtml(ks.score,120):'<span class="xs mut">belum diinput</span>')+'</td><td class="xs mut" style="width:70px">'+(ks?ks.filled+'/'+ks.total+' item':'')+'</td></tr>';
  });
  html += '</table><button class="btn btn-line btn-sm" style="margin-top:10px" onclick="APP.go(\'kpi\')">Input KPI →</button></div></div>';

  // Kalender ringkas
  const upcoming = calendarItems().filter(ev=>ev.date>=todayStr()).slice(0,6);
  html += '<div class="sec-title"><h3>Agenda Terdekat</h3></div>';
  html += upcoming.length ? '<div class="card"><table class="tbl" style="box-shadow:none">'+upcoming.map(ev=>'<tr><td style="width:110px" class="mono small">'+fmtDate(ev.date)+'</td><td><b>'+esc(ev.title)+'</b>'+(ev.note?'<div class="xs mut">'+esc(ev.note)+'</div>':'')+'</td><td style="width:90px"><span class="tag '+ev.cls+'">'+esc(ev.kind)+'</span></td></tr>').join('')+'</table></div>' : '<div class="empty">Belum ada agenda.</div>';

  c.innerHTML = html;
};
function kcard(lbl, val, sub){ return '<div class="card kpi-card"><div class="lbl">'+lbl+'</div><div class="val">'+val+'</div><div class="sub">'+sub+'</div></div>'; }

RENDER.score = function(c){
  const mk = $('#psMonth') ? $('#psMonth').value : monthKey();
  renderScore(c, mk);
};
function renderScore(c, mk){
  const emps = scopeEmps().filter(e=>e.appRole!=='ceo');
  const rows = emps.map(e=>({e, ps: peopleScore(e, mk)})).sort((a,b)=>b.ps.score-a.ps.score);
  const W = S.settings.scoreWeights;
  let html = '<div class="toolbar">'+monthPicker('psMonth', mk)+'<span class="sp"></span>'+
    (can('inputKpi')?'<button class="btn btn-pri btn-sm" onclick="APP.openMonthlyInput()">＋ Input Data Bulanan</button>':'')+'</div>';
  html += '<div class="note">Bobot: Attendance '+W.attendance+'% (dari Talenta, input manual) · KPI '+W.kpi+'% · Training '+W.training+'% · Customer Review '+W.review+'% · Disiplin '+W.discipline+'% · Teamwork '+W.teamwork+'% · Inisiatif '+W.initiative+'%. Komponen kosong memakai nilai default '+S.settings.defaultComponentScore+' — ubah di Pengaturan.</div>';

  if(rows.length>=3){
    const p = rows.slice(0,3);
    html += '<div class="podium">'+
      pod(p[1],2,mk)+pod(p[0],1,mk)+pod(p[2],3,mk)+'</div>';
  }
  html += '<table class="tbl"><thead><tr><th>#</th><th>Kru</th><th>Divisi</th><th class="num">Attend</th><th class="num">KPI</th><th class="num">Training</th><th class="num">Review</th><th class="num">Disiplin</th><th>Score</th><th>Grade</th><th>Tren 6 bln</th><th></th></tr></thead><tbody>';
  rows.forEach((r,i)=>{
    const cp=r.ps.comp;
    const trend = lastMonths(6, mk).map(m=>{ const p2=peopleScore(r.e,m); return p2.completeness>0?p2.score:null; });
    html += '<tr><td class="mono">'+(i+1)+'</td><td><b>'+esc(r.e.name)+'</b><div class="xs mut">'+esc(r.e.role)+'</div></td><td class="small">'+esc(divName(r.e.divId))+'</td>'+
      cell(cp.attendance)+cell(cp.kpi)+cell(cp.training)+cell(cp.review)+cell(cp.discipline)+
      '<td style="min-width:110px">'+barHtml(r.ps.score)+'</td><td>'+gradeTag(r.ps.score)+'</td><td>'+sparkline(trend,110,30)+'</td>'+
      '<td><button class="btn btn-line btn-xs" onclick="APP.openEmpDetail(\''+r.e.id+'\')">Detail</button></td></tr>';
  });
  html += '</tbody></table><div class="hint">Skor komponen "-" artinya belum ada data → default dipakai. Kelengkapan data mempengaruhi kualitas ranking, bukan skornya.</div>';
  c.innerHTML = html;
  mpHandlers['psMonth'] = nv => renderScore(c, nv);
  function cell(v){ return '<td class="num'+(v==null?' mut':'')+'">'+(v==null?'–':fmtNum(v))+'</td>'; }
  function pod(r, rank, mk2){
    if(!r) return '';
    return '<div class="pod'+(rank===1?' first':'')+'"><div class="rank">'+(rank===1?'🏆':'#'+rank)+'</div><b>'+esc(r.e.name)+'</b><div class="xs mut">'+esc(divName(r.e.divId))+'</div><div class="disp" style="font-size:22px;font-weight:700;color:var(--ink);margin-top:4px">'+fmtNum(r.ps.score)+'</div>'+gradeTag(r.ps.score)+'</div>';
  }
}

    const t = kpiTemplateFor(d.id); if(!t) return;

    html += '<div class="card"><div class="flex"><h3 class="grow" style="margin:0">'+esc(d.name)+'</h3>'+
      (ks? '<span class="tag '+(ks.score>=100?'ok':ks.score>=85?'gold':'warn')+'">'+fmtNum(ks.score)+'</span>':'<span class="tag mut">belum diinput</span>')+

    t.items.forEach(it=>{
      const a = acts[it.id], sc = kpiItemScore(it, a);

    '<div><label>Divisi / Kru</label><span id="okr_ownerWrap"></span></div>'+
    '<div><label>Periode</label><input id="okr_period" value="'+esc(o.period)+'" placeholder="Q3 2026 / Jul 2026"></div></div>'+
    '<div class="frow f1"><div><label>Objective</label><input id="okr_obj" value="'+esc(o.objective)+'" placeholder="cth: Amankan 50 juta sponsorship untuk low season Sep–Nov"></div></div>'+
    '<label>Key Results</label><table class="tbl" style="box-shadow:none"><thead><tr><th>Nama</th><th>Target</th><th>Unit</th><th>Progress</th></tr></thead><tbody id="okr_krs">'+krRows(o.krs)+'</tbody></table>'+
    '<button class="btn btn-line btn-xs" style="margin-top:8px" id="okr_addKr">＋ Key Result</button>';
  openModal(id?'Edit OKR':'OKR Baru', body, {wide:true, onSave:()=>{
    const krs=[]; let i=0;
    while($('#okr_kn_'+i)){ const n=$('#okr_kn_'+i).value.trim(); if(n) krs.push({name:n, target:Number($('#okr_kt_'+i).value)||0, unit:$('#okr_ku_'+i).value, progress:Number($('#okr_kp_'+i).value)||0}); i++; }

      : empSelect('okr_owner', activeEmps(), o.ownerId);

  renderOwner();

/* ====== PAGE: PERFORMANCE REVIEW (multi-layer) ====== */
RENDER.review = function(c){ renderReview(c, monthKey()); };
function renderReview(c, mk){
  const emps = scopeEmps().filter(e=>e.appRole!=='ceo');
  const W = S.settings.reviewLayerWeights;
  let html = '<div class="toolbar">'+monthPicker('rvMonth', mk)+'<span class="sp"></span></div>';
  html += '<div class="note">Penilaian 12 aspek (skala 1–10), berlapis: Self ('+W.self+'%) → Manager ('+W.manager+'%) → HRD ('+W.hr+'%) → CEO ('+W.ceo+'%). Nilai akhir = rata-rata tertimbang layer yang sudah mengisi. Hasil review otomatis mengisi komponen Teamwork &amp; Inisiatif di People Score.</div>';
  html += '<table class="tbl"><thead><tr><th>Kru</th><th>Divisi</th><th>Self</th><th>Manager</th><th>HRD</th><th>CEO</th><th class="num">Nilai Akhir</th><th></th></tr></thead><tbody>';
  emps.forEach(e=>{
    const rv = S.reviews.find(r=>r.empId===e.id && r.month===mk);
    const layAvg = L => { if(!rv||!rv.layers[L]||!rv.layers[L].aspects) return null; const vs=Object.values(rv.layers[L].aspects).map(Number).filter(v=>!isNaN(v)); return vs.length?avg(vs):null; };
    const fin = reviewOverallScore(e.id, mk);
    html += '<tr><td><b>'+esc(e.name)+'</b></td><td class="small">'+esc(divName(e.divId))+'</td>'+
      lcell(layAvg('self'))+lcell(layAvg('manager'))+lcell(layAvg('hr'))+lcell(layAvg('ceo'))+
      '<td class="num">'+(fin!=null?'<b>'+fmtNum(fin)+'</b> '+gradeTag(fin):'–')+'</td>'+
      '<td><button class="btn btn-line btn-xs" onclick="APP.openReview(\''+e.id+'\',\''+mk+'\')">'+(rv?'Lihat / Isi':'Mulai')+'</button></td></tr>';
  });
  html += '</tbody></table>';
  c.innerHTML = html;
  mpHandlers['rvMonth'] = nv => renderReview(c, nv);
  function lcell(v){ return '<td>'+(v!=null?'<span class="tag '+(v>=8.5?'ok':v>=7?'gold':'warn')+'">'+fmtNum(v)+'</span>':'<span class="xs mut">–</span>')+'</td>'; }
}
function myLayer(empId){
  if(CU.appRole==='ceo') return 'ceo';
  if(CU.appRole==='hr') return 'hr';
  const e = empById(empId);
  if(CU.appRole==='manager' && e && e.divId===CU.divId && CU.id!==empId) return 'manager';
  if(CU.id===empId) return 'self';
  return null;

        REVIEW_ASPECTS.map(a=>'<tr><td>'+a+'</td>'+others.map(o=>'<td class="num">'+(rv.layers[o].aspects[a]??'–')+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
    }
  }
  openModal('Review '+e.name+' — '+fmtMonth(mk), body, {wide:true, onSave:()=>{
    const aspects = {};
    let any=false;
    REVIEW_ASPECTS.forEach(a=>{ const v=$('#rv_'+a.replace(/\s/g,'')).value; if(v!==''){ aspects[a]=clamp(Number(v),1,10); any=true; } });

    log('REVIEW_SAVE', e.name+' '+mk+' ['+L+']'); save(); toast('Review tersimpan.');
    go('review');
  }});
}

/* ====== PAGE: DISIPLIN ====== */
const VIO_TYPES = ['Terlambat','Absen tanpa izin','Merokok di area kerja','Tidak pakai seragam','Komplain pelanggan','Selisih kas','Pelanggaran SOP','Sikap tidak profesional','Lainnya'];
function activeSP(empId){
  const cutoff = shiftMonth(monthKey(), -S.settings.spRules.spValidMonths);
  const sps = S.violations.filter(v=>v.empId===empId && v.sp && v.status!=='Dibatalkan' && monthKey(v.date) >= cutoff).map(v=>v.sp);
  if(sps.includes('SP3')) return 'SP3';
  if(sps.includes('SP2')) return 'SP2';
  if(sps.includes('SP1')) return 'SP1';
  return '';
}
function suggestSP(empId){
  const cutoff = shiftMonth(monthKey(), -S.settings.spRules.spValidMonths);
  const vios = S.violations.filter(v=>v.empId===empId && v.status!=='Dibatalkan' && monthKey(v.date)>=cutoff);
  const cur = activeSP(empId);
  const berat = vios.some(v=>v.severity==='Berat');
  const ringanCnt = vios.filter(v=>v.severity==='Ringan').length;
  const sedangCnt = vios.filter(v=>v.severity==='Sedang').length;
  if(cur==='SP2' && (berat||sedangCnt>=3)) return 'SP3';
  if(cur==='SP1' && (berat||sedangCnt>=2)) return 'SP2';
  if(!cur && (berat || sedangCnt>=2 || ringanCnt>=S.settings.spRules.ringanToSP1)) return 'SP1';
  return '';
}

      '<td><span class="tag '+(v.status==='Dibatalkan'?'mut':'info')+'">'+esc(v.status||'Tercatat')+'</span></td>'+
      '<td>'+(can('manageDiscipline')?'<button class="btn btn-line btn-xs" onclick="APP.editViolation(\''+v.id+'\')">✎</button>':'')+'</td></tr>';

  let html = '<div class="cards g2"><div class="card"><h3>Mood Check Hari Ini</h3><div class="small mut">Bagaimana perasaanmu hari ini? Anonim untuk sesama kru; HR hanya melihat tren agregat &amp; individu bila perlu.</div>'+
    '<div class="mood-row">'+MOODS.map(m=>'<button class="mood-btn'+(myMood&&myMood.mood===m.v?' sel':'')+'" onclick="APP.setMood('+m.v+')">'+m.e+'</button>').join('')+'</div>'+
    (myMood?'<div class="small" style="text-align:center;color:var(--ok)">Tercatat. Terima kasih! ⚓</div>':'')+'</div>';

  html += '<div class="card"><div class="frow"><div><input id="sg_text" placeholder="Tulis saran / ide / keluhan…"></div><div class="flex"><label class="flex" style="margin:0;font-weight:500"><input type="checkbox" id="sg_anon" style="width:auto"> Kirim anonim</label><button class="btn btn-pri btn-sm" onclick="APP.addSuggestion()">Kirim</button></div></div></div>';

    html += '<table class="tbl" style="margin-top:12px"><thead><tr><th>Tanggal</th><th>Dari</th><th>Saran</th><th>Status</th><th>Respon</th>'+(can('seeAll')?'<th></th>':'')+'</tr></thead><tbody>'+
      sgs.map(s=>'<tr><td class="mono small">'+fmtDate(s.date)+'</td><td class="small">'+(s.empId?esc((empById(s.empId)||{}).name||'-'):'<i class="mut">Anonim</i>')+'</td><td class="small" style="max-width:280px">'+esc(s.text)+'</td>'+
      '<td><span class="tag '+(s.status==='Diterapkan'?'ok':s.status==='Ditinjau'?'info':'mut')+'">'+esc(s.status)+'</span></td><td class="small mut">'+esc(s.response||'')+'</td>'+
      (can('seeAll')?'<td><button class="btn btn-line btn-xs" onclick="APP.respondSuggestion(\''+s.id+'\')">Respon</button></td>':'')+'</tr>').join('')+'</tbody></table>';
  } else html += '<div class="empty" style="margin-top:12px">Belum ada saran masuk.</div>';

    [['Attendance (Talenta)','attendance'],['KPI','kpi'],['Training','training'],['Customer Review','review'],['Disiplin','discipline'],['Teamwork','teamwork'],['Inisiatif','initiative']].map(([lbl,k])=>
      '<tr><td>'+lbl+'</td><td class="num">'+W[k]+'%</td><td class="num">'+(ps.comp[k]!=null?fmtNum(ps.comp[k]):'<span class="mut">default '+S.settings.defaultComponentScore+'</span>')+'</td></tr>').join('')+'</tbody></table>';
  if(bs.length) body += '<div style="margin-top:10px">'+bs.map(b=>'<span class="badge-pill">🏅 '+esc(b.badge)+' · '+fmtMonth(b.month)+'</span>').join('')+'</div>';
  body += '<div class="small" style="margin-top:8px"><b>'+pts+'</b> poin reward · <b>'+recs.filter(r=>r.status==='Lulus').length+'</b> sertifikat · <b>'+cos.length+'</b> sesi coaching · <b>'+vios.length+'</b> pelanggaran'+(activeSP(empId)?' · <span class="tag bad">'+activeSP(empId)+' aktif</span>':'')+'</div>';
  if(cm && cm.skills.length) body += '<div class="sec-title"><h3>Kompetensi</h3></div>'+cm.skills.map(s=>'<span class="badge-pill">'+esc(s.name)+' '+'★'.repeat(s.level)+'</span>').join('');
  if(cos.length) body += '<div class="sec-title"><h3>Coaching terakhir</h3></div><div class="timeline">'+cos.slice(0,3).map(x=>'<div class="tl-item"><b class="small">'+fmtDate(x.date)+'</b> — '+esc(x.problem)+'<div class="xs mut">Plan: '+esc(x.actionPlan||'-')+' · '+esc(x.status)+'</div></div>').join('')+'</div>';
  openModal('Profil Kru', body, {wide:true, noSave:true});
}

/* ====== PAGE: KALENDER HR ====== */
function calendarItems(){
  const out = S.calendar.map(ev=>({date:ev.date, title:ev.title, kind:ev.kind, note:ev.note, cls: ev.kind==='Training'?'info':ev.kind==='Event'?'gold':'mut', id:ev.id}));
  const yr = new Date().getFullYear();
  activeEmps().forEach(e=>{
    if(e.birthDate){ const md = e.birthDate.slice(5); out.push({date: yr+'-'+md, title:'🎂 Ulang tahun '+e.name, kind:'Birthday', cls:'gold'}); }
    if(e.contractEnd) out.push({date:e.contractEnd, title:'Kontrak habis: '+e.name, kind:'Kontrak', cls:'bad', note:'Putuskan perpanjang/evaluasi H-30'});
    if(e.probationEnd) out.push({date:e.probationEnd, title:'Probation selesai: '+e.name, kind:'Probation', cls:'warn'});
  });
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}
RENDER.cal = function(c){
  let html = '<div class="toolbar"><span class="sp"></span>'+(can('seeAll')?'<button class="btn btn-pri btn-sm" onclick="APP.addCalEvent()">＋ Agenda</button>':'')+'</div>';
  html += '<div class="note">Shift harian tetap di Talenta. Kalender ini untuk agenda HR: training, meeting, event internal, ulang tahun, kontrak habis, probation selesai (2 terakhir otomatis dari profil kru).</div>';
  const items = calendarItems();
  const future = items.filter(i=>i.date>=todayStr());
  const past = items.filter(i=>i.date<todayStr()).slice(-6);
  if(!items.length){ c.innerHTML = html+'<div class="empty">Belum ada agenda.</div>'; return; }
  html += '<table class="tbl"><thead><tr><th>Tanggal</th><th>Agenda</th><th>Jenis</th><th></th></tr></thead><tbody>';
  future.forEach(ev=>{
    html += '<tr><td class="mono small" style="width:120px">'+fmtDate(ev.date)+'</td><td><b>'+esc(ev.title)+'</b>'+(ev.note?'<div class="xs mut">'+esc(ev.note)+'</div>':'')+'</td><td><span class="tag '+ev.cls+'">'+esc(ev.kind)+'</span></td>'+
      '<td>'+(ev.id && can('seeAll')?'<button class="btn btn-line btn-xs" onclick="APP.delCalEvent(\''+ev.id+'\')">🗑</button>':'')+'</td></tr>';
  });
  html += '</tbody></table>';
  if(past.length) html += '<div class="sec-title"><h3>Sudah lewat</h3></div><table class="tbl"><tbody>'+past.map(ev=>'<tr><td class="mono small" style="width:120px">'+fmtDate(ev.date)+'</td><td class="mut">'+esc(ev.title)+'</td><td><span class="tag mut">'+esc(ev.kind)+'</span></td></tr>').join('')+'</tbody></table>';
  c.innerHTML = html;
};
function addCalEvent(){
  let body = '<div class="frow f3"><div><label>Tanggal</label><input type="date" id="cal_date" value="'+todayStr()+'"></div>'+
    '<div><label>Jenis</label><select id="cal_kind">'+['Training','Meeting','Event','Interview','Libur','Lainnya'].map(k=>'<option>'+k+'</option>').join('')+'</select></div>'+
    '<div><label>Judul</label><input id="cal_title" placeholder="cth: Briefing bulanan semua kru"></div></div>'+
    '<div class="frow f1"><div><label>Catatan</label><input id="cal_note"></div></div>';
  openModal('Agenda Baru', body, {onSave:()=>{
    if(!$('#cal_title').value.trim()){ toast('Judul wajib.', true); return false; }
    S.calendar.push({id:uid('cal'), date:$('#cal_date').value, kind:$('#cal_kind').value, title:$('#cal_title').value.trim(), note:$('#cal_note').value});
    log('CAL_ADD', $('#cal_title').value); save(); go('cal');
  }});
}
function delCalEvent(id){ S.calendar = S.calendar.filter(x=>x.id!==id); save(); go('cal'); }

/* ====== PAGE: SETTINGS ====== */

  let html = '<div class="note">Semua angka di bawah adalah <b>titik kalibrasi awal</b>. Setelah 2–3 bulan data aktual berjalan, review ulang bobot dan target bersama HRD &amp; para manager.</div>';
  html += '<div class="cards g2">';
  html += '<div class="card"><h3>Bobot People Score '+(sumW!==100?'<span class="tag warn">total '+sumW+'% — sebaiknya 100%</span>':'<span class="tag ok">total 100%</span>')+'</h3>'+
    [['attendance','Attendance (dari Talenta)'],['kpi','KPI'],['training','Training'],['review','Customer Review'],['discipline','Disiplin'],['teamwork','Teamwork'],['initiative','Inisiatif']].map(([k,l])=>
      '<div class="flex" style="margin-bottom:8px"><label class="grow" style="margin:0">'+l+'</label><input type="number" min="0" max="100" style="width:80px" id="sw_'+k+'" value="'+W[k]+'"></div>').join('')+
    '<div class="flex" style="margin-top:8px"><label class="grow" style="margin:0">Nilai default komponen kosong</label><input type="number" style="width:80px" id="s_dflt" value="'+S.settings.defaultComponentScore+'"></div></div>';

  html += '<div class="card"><h3>Grade &amp; Review</h3>'+
    S.settings.grades.map((g,i)=>'<div class="flex" style="margin-bottom:6px"><span class="grade grow">'+g.g+'</span><span class="xs mut">min.</span><input type="number" style="width:80px" id="gr_'+i+'" value="'+g.min+'"></div>').join('')+
    '<div class="sec-title"><h3 style="font-size:14px">Bobot layer review</h3></div>'+
    [['self','Self'],['manager','Manager'],['hr','HRD'],['ceo','CEO']].map(([k,l])=>'<div class="flex" style="margin-bottom:6px"><label class="grow" style="margin:0">'+l+'</label><input type="number" style="width:80px" id="rw_'+k+'" value="'+RW[k]+'"></div>').join('')+'</div>';

  html += '<div class="card"><h3>Disiplin &amp; Poin</h3>'+
    [['Ringan','Ringan'],['Sedang','Sedang'],['Berat','Berat']].map(([k,l])=>'<div class="flex" style="margin-bottom:6px"><label class="grow" style="margin:0">Potongan '+l+'</label><input type="number" style="width:80px" id="vd_'+k+'" value="'+VD[k]+'"></div>').join('')+
    '<div class="flex" style="margin-bottom:6px"><label class="grow" style="margin:0">Ringan → SP1 setelah (×)</label><input type="number" style="width:80px" id="sp_r1" value="'+S.settings.spRules.ringanToSP1+'"></div>'+
    '<div class="flex" style="margin-bottom:6px"><label class="grow" style="margin:0">Masa berlaku SP (bulan)</label><input type="number" style="width:80px" id="sp_valid" value="'+S.settings.spRules.spValidMonths+'"></div>'+
    '<div class="flex" style="margin-bottom:6px"><label class="grow" style="margin:0">Poin badge</label><input type="number" style="width:80px" id="pr_badge" value="'+PR.badge+'"></div>'+
    '<div class="flex" style="margin-bottom:6px"><label class="grow" style="margin:0">Poin lulus training</label><input type="number" style="width:80px" id="pr_train" value="'+PR.trainingPass+'"></div>'+
    '<div class="flex"><label class="grow" style="margin:0">Poin Employee of the Month</label><input type="number" style="width:80px" id="pr_eom" value="'+PR.eom+'"></div></div>';

  html += '<div class="card"><h3>Data</h3><div class="small mut" style="margin-bottom:10px">Data tersimpan di perangkat ini (localStorage). Rutin ekspor backup — terutama sebelum ganti perangkat/clear browser. Multi-device sync = Phase 2 (backend/Apps Script).</div>'+
    '<div class="flex" style="flex-wrap:wrap"><button class="btn btn-pri btn-sm" onclick="APP.exportJson()">⬇ Ekspor Backup (JSON)</button>'+
    '<label class="btn btn-line btn-sm" style="margin:0">⬆ Impor Backup<input type="file" accept=".json" style="display:none" id="importFile"></label>'+
    '<button class="btn btn-danger btn-sm" onclick="APP.resetAll()">Reset ke data awal</button></div></div>';
  html += '</div><div style="margin-top:14px"><button class="btn btn-gold" style="width:auto;padding:10px 22px" onclick="APP.saveSettings()">Simpan Pengaturan</button></div>';
  c.innerHTML = html;
  $('#importFile').onchange = importJson;
};
function saveSettings(){
  const W = S.settings.scoreWeights;
  Object.keys(W).forEach(k=>{ W[k] = Number($('#sw_'+k).value)||0; });
  S.settings.defaultComponentScore = Number($('#s_dflt').value)||75;
  S.settings.grades.forEach((g,i)=>{ g.min = Number($('#gr_'+i).value)||0; });
  ['self','manager','hr','ceo'].forEach(k=>{ S.settings.reviewLayerWeights[k] = Number($('#rw_'+k).value)||0; });
  ['Ringan','Sedang','Berat'].forEach(k=>{ S.settings.violationDeduct[k] = Number($('#vd_'+k).value)||0; });
  S.settings.spRules.ringanToSP1 = Number($('#sp_r1').value)||3;
  S.settings.spRules.spValidMonths = Number($('#sp_valid').value)||6;
  S.settings.pointRules.badge = Number($('#pr_badge').value)||50;
  S.settings.pointRules.trainingPass = Number($('#pr_train').value)||20;
  S.settings.pointRules.eom = Number($('#pr_eom').value)||150;
  log('SETTINGS_SAVE',''); save(); toast('Pengaturan tersimpan.'); go('settings');
}
function exportJson(){
  const blob = new Blob([JSON.stringify(S, null, 1)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PeopleOS_Laksamana_backup_'+todayStr()+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  log('EXPORT',''); save(); toast('Backup terunduh.');
}
function importJson(ev){
  const f = ev.target.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = ()=>{
    try{
      const data = JSON.parse(rd.result);
      if(!data.employees || !data.settings) throw new Error('format');
      confirmBox('Impor akan MENIMPA semua data saat ini. Lanjutkan?', ()=>{
        S = data; migrate(); save(); toast('Backup diimpor. Silakan login ulang.'); doLogout();
      });
    }catch(e){ toast('File tidak valid.', true); }
  };
  rd.readAsText(f);
}
function resetAll(){
  confirmBox('Reset akan menghapus SEMUA data dan kembali ke data awal. Yakin?', ()=>{
    S = seed(); save(); toast('Data direset.'); doLogout();
  });
}

function init(){
  load();
  $('#loginMark').innerHTML = LM_LOGO_SVG;
  $('#brandMark').innerHTML = LM_LOGO_SVG.replace('width="46" height="46"','width="34" height="34"');
  const sel = $('#loginUser');

  $('#loginBtn').onclick = doLogin;
  $('#loginPin').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  $('#logoutBtn').onclick = doLogout;
  $('#menuBtn').onclick = ()=> $('#sidebar').classList.toggle('open');
  $('#modalWrap').addEventListener('click', e=>{ if(e.target.id==='modalWrap') closeModal(); });
  // auto-resume session
  let sid=null; try{ sid = sessionStorage.getItem(SS_KEY); }catch(_){}
  if(sid && empById(sid)){ const e=empById(sid); $('#loginUser').value=sid; $('#loginPin').value=e.pin; doLogin(); $('#loginPin').value=''; }
}
