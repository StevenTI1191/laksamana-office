<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B1B2B">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Akademi Laksamana — Training & Standardisasi Kru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1B2B; --ink2:#122840; --ink3:#1A3450;
  --gold:#F7BB0E; --gold2:#B8893A; --cream:#FAF6EE; --cream2:#F1EADC;
  --white:#FFFFFF; --line:#E4DCC9; --line-dark:rgba(247,187,14,.18);
  --ok:#1E9E6A; --warn:#E08A00; --bad:#D64545; --info:#2E6FD8;
  --muted:#6B7686; --muted-dark:#8FA0B5;
  --radius:14px; --shadow:0 6px 24px rgba(11,27,43,.10);
  --font-d:'Fraunces',Georgia,serif; --font-b:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font-b);background:var(--cream);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:var(--font-b);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font-b);font-size:14px}
h1,h2,h3{font-family:var(--font-d)}
a{color:var(--info)}
.hidden{display:none!important}

/* ========== LOGIN ========== */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(1200px 600px at 80% -10%, rgba(247,187,14,.12), transparent 60%),
  radial-gradient(900px 500px at -10% 110%, rgba(46,111,216,.10), transparent 60%),
  var(--ink);padding:20px}
.login-card{width:100%;max-width:420px;background:var(--cream);border-radius:22px;padding:36px 32px;box-shadow:0 30px 80px rgba(0,0,0,.45)}
.login-emblem{display:flex;justify-content:center;margin-bottom:14px}
.login-card h1{font-size:28px;font-weight:900;text-align:center;letter-spacing:-.02em}
.login-sub{text-align:center;color:var(--muted);font-size:13px;margin:6px 0 24px}
.login-sub b{color:var(--gold2)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;background:var(--white);outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:10px;font-weight:700;font-size:14px;transition:transform .1s,box-shadow .15s}
.btn:active{transform:scale(.98)}
.btn-gold{background:var(--gold);color:var(--ink);box-shadow:0 4px 14px rgba(247,187,14,.35)}
.btn-gold:hover{box-shadow:0 6px 20px rgba(247,187,14,.5)}
.btn-ink{background:var(--ink);color:var(--gold)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn-danger{background:#FBE9E9;color:var(--bad)}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
.btn-block{width:100%}
.login-err{background:#FBE9E9;color:var(--bad);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;display:none}
.login-foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:18px}

/* ========== APP SHELL ========== */
#appView{display:none;min-height:100vh}
.shell{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.sidebar{background:var(--ink);color:var(--cream);padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.side-brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;border-bottom:1px solid var(--line-dark);margin-bottom:14px}
.side-brand .t{font-family:var(--font-d);font-weight:900;font-size:17px;color:var(--gold);line-height:1.1}
.side-brand .s{font-size:10px;color:var(--muted-dark);text-transform:uppercase;letter-spacing:.12em}
.nav-sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--muted-dark);padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 10px;border-radius:9px;color:#D9E2EC;font-size:13.5px;font-weight:600;text-align:left;transition:background .12s}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.active{background:var(--gold);color:var(--ink)}
.nav-item .ic{width:18px;text-align:center}
.side-user{margin-top:auto;padding:12px 10px;border-top:1px solid var(--line-dark);font-size:12px}
.side-user .n{font-weight:700;color:var(--gold)}
.side-user .r{color:var(--muted-dark);font-size:11px}
.main{padding:26px 30px 60px;max-width:1180px;width:100%}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.topbar h2{font-size:26px;font-weight:900;letter-spacing:-.02em}
.topbar .sub{color:var(--muted);font-size:13px;margin-top:3px}

/* mobile */
.mobile-top{display:none}
.mobile-nav{display:none}
@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:16px 14px 90px}
  .mobile-top{display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:var(--gold);padding:13px 16px;position:sticky;top:0;z-index:40}
  .mobile-top .t{font-family:var(--font-d);font-weight:900;font-size:15px}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--ink);border-top:1px solid var(--line-dark);z-index:40}
  .mobile-nav button{flex:1;padding:9px 2px 11px;color:var(--muted-dark);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px}
  .mobile-nav button .ic{font-size:17px}
  .mobile-nav button.active{color:var(--gold)}
  .topbar h2{font-size:21px}
}

/* ========== COMPONENTS ========== */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.g4,.g3,.g2{grid-template-columns:1fr}}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 2px 8px rgba(11,27,43,.04)}
.card h3{font-size:16px;font-weight:700;margin-bottom:10px}
.stat{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.stat .v{font-family:var(--font-d);font-size:30px;font-weight:900;line-height:1}
.stat .l{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:6px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.b-gold{background:#FDF3D5;color:var(--gold2)}
.b-ok{background:#E3F5ED;color:var(--ok)}
.b-warn{background:#FCF0DC;color:var(--warn)}
.b-bad{background:#FBE9E9;color:var(--bad)}
.b-info{background:#E7EFFC;color:var(--info)}
.b-ink{background:var(--ink);color:var(--gold)}
.b-mut{background:var(--cream2);color:var(--muted)}
.progress{height:8px;background:var(--cream2);border-radius:99px;overflow:hidden}
.progress>div{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:99px;transition:width .4s}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:2px solid var(--line);white-space:nowrap}
td{padding:10px;border-bottom:1px solid var(--cream2);vertical-align:middle}
tr:last-child td{border-bottom:none}
.table-wrap{overflow-x:auto;background:var(--white);border:1px solid var(--line);border-radius:var(--radius)}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:7px 14px;border-radius:99px;border:1.5px solid var(--line);background:var(--white);font-size:12.5px;font-weight:700;color:var(--muted);transition:all .12s}
.chip.active{background:var(--ink);color:var(--gold);border-color:var(--ink)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .big{font-size:38px;margin-bottom:8px}

/* materi card */
.mat-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:9px;cursor:pointer;transition:transform .12s,box-shadow .15s;position:relative}
.mat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.mat-card .ty{font-size:22px}
.mat-card .ti{font-weight:700;font-size:14.5px;line-height:1.35}
.mat-card .me{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.mat-done{position:absolute;top:12px;right:12px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(11,27,43,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--cream);border-radius:18px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:24px}
.modal.wide{max-width:860px}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
.modal-head h3{font-size:20px;font-weight:900}
.modal-x{font-size:22px;color:var(--muted);padding:2px 8px;border-radius:8px}
.modal-x:hover{background:var(--cream2)}
.video-frame{position:relative;width:100%;padding-top:56.25%;border-radius:12px;overflow:hidden;background:#000;margin-bottom:14px}
.video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.modul-body{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:20px;font-size:14.5px;line-height:1.75;white-space:pre-wrap}
.sop-step{display:flex;gap:11px;align-items:flex-start;background:var(--white);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.sop-step input{width:19px;height:19px;margin-top:1px;accent-color:var(--gold2);flex-shrink:0}
.sop-step .tx{font-size:14px;line-height:1.55}
.quiz-q{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
.quiz-q .qt{font-weight:700;margin-bottom:11px;font-size:14.5px;line-height:1.4}
.quiz-opt{display:flex;gap:10px;align-items:center;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;margin-bottom:7px;cursor:pointer;font-size:14px;transition:all .1s}
.quiz-opt:hover{border-color:var(--gold2)}
.quiz-opt.sel{border-color:var(--gold2);background:#FDF7E3}
.quiz-opt.correct{border-color:var(--ok);background:#E3F5ED}
.quiz-opt.wrong{border-color:var(--bad);background:#FBE9E9}
.quiz-opt input{accent-color:var(--gold2)}
.menu-hero{background:linear-gradient(135deg,var(--ink),var(--ink3));color:var(--cream);border-radius:14px;padding:22px;margin-bottom:14px}
.menu-hero .nm{font-family:var(--font-d);font-size:24px;font-weight:900;color:var(--gold)}
.menu-hero .pr{font-size:15px;margin-top:4px;font-weight:700}
.kv{display:grid;grid-template-columns:120px 1fr;gap:6px 12px;font-size:13.5px;margin-bottom:10px}
.kv .k{font-weight:800;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding-top:2px}
.script-box{background:#FDF7E3;border:1.5px dashed var(--gold2);border-radius:11px;padding:14px;font-size:14px;line-height:1.6;font-style:italic}

/* cert */
.cert{border:3px double var(--gold2);border-radius:14px;background:var(--white);padding:34px 24px;text-align:center}
.cert .h{font-family:var(--font-d);font-size:13px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold2);font-weight:700}
.cert .n{font-family:var(--font-d);font-size:30px;font-weight:900;margin:10px 0 4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold);padding:12px 22px;border-radius:99px;font-weight:700;font-size:13.5px;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.35);animation:tin .25s}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.list-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--cream2)}
.list-row:last-child{border-bottom:none}
.org-col{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.org-col .oh{background:var(--ink);color:var(--gold);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.org-col .oh .nm{font-weight:800;font-size:14px}
.org-person{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--cream2);font-size:13px}
.org-person:last-child{border-bottom:none}
.org-pic{background:#FDF7E3}
.org-line{width:2px;height:20px;background:var(--gold2);margin:0 auto}
.prog-item{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--white);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.prog-item .t{font-size:13.5px;font-weight:600;line-height:1.35}
.sync-dot{display:inline-block;width:9px;height:9px;border-radius:99px;background:var(--muted)}
.sync-dot.ok{background:var(--ok)}.sync-dot.pending{background:var(--warn)}.sync-dot.error{background:var(--bad)}
.guide-step{display:flex;gap:10px;margin-bottom:10px;font-size:13.5px;line-height:1.55}
.guide-step .n{flex-shrink:0;width:22px;height:22px;border-radius:99px;background:var(--ink);color:var(--gold);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
@media print{.sidebar,.mobile-top,.mobile-nav,.topbar,.no-print{display:none!important}.main{padding:0}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginView">
  <div class="login-card">
    <div class="login-emblem">
      <svg width="72" height="72" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="#0B1B2B"/>
        <circle cx="50" cy="50" r="46" fill="none" stroke="#F7BB0E" stroke-width="2.5"/>
        <circle cx="50" cy="50" r="34" fill="none" stroke="#B8893A" stroke-width="1" opacity=".7"/>
        <polygon points="50,12 55,45 50,50 45,45" fill="#F7BB0E"/>
        <polygon points="50,88 55,55 50,50 45,55" fill="#B8893A"/>
        <polygon points="12,50 45,45 50,50 45,55" fill="#B8893A"/>
        <polygon points="88,50 55,55 50,50 55,45" fill="#B8893A"/>
        <circle cx="50" cy="50" r="5" fill="#FAF6EE"/>
      </svg>
    </div>
    <h1>Akademi Laksamana</h1>
    <div class="login-sub">Training & Standardisasi Kru — <b>Laksamana Muda Coffee & Live Space</b></div>
    <div class="login-err" id="loginErr"></div>
    <div class="field">
      <label>Nama Kru</label>
      <select id="loginUser"></select>
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="password" id="loginPin" inputmode="numeric" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-gold btn-block" onclick="doLogin()">⚓ Naik Kapal</button>
    <div class="login-foot">Satu standar, satu pelayaran. · PIN default kru baru: 1234</div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="appView">
  <div class="mobile-top">
    <div class="t">⚓ Akademi Laksamana</div>
    <button onclick="doLogout()" style="color:#8FA0B5;font-size:12px;font-weight:700">Keluar</button>
  </div>
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main" id="main"></main>
  </div>
  <nav class="mobile-nav" id="mobileNav"></nav>
</div>

<script>
'use strict';
/* =====================================================
   AKADEMI LAKSAMANA — Training Management System
   Laksamana Muda Coffee & Live Space · Pekanbaru
   Single-file PWA · vanilla JS · localStorage
   ===================================================== */

var DB_KEY = 'lm_akademi_v1';
var SESSION_KEY = 'lm_akademi_session';
var DB = null;
var VIEW = 'dashboard';
var VIEW_ARG = null;

/* ---------- divisions ---------- */
var DEFAULT_DIVISIONS = [
  {id:'service',  name:'Service / FOH',        icon:'🛎️'},
  {id:'kitchen',  name:'Galangan Dapur',       icon:'🍳'},
  {id:'bar',      name:'Galangan Bar',         icon:'🥤'},
  {id:'marketing',name:'Marketing & Digital',  icon:'📣'},
  {id:'sales',    name:'Sales & Event',        icon:'🤝'},
  {id:'finance',  name:'Finance & Admin',      icon:'📊'}
];
var DIVISIONS = DEFAULT_DIVISIONS;
var TYPES = {
  video:{label:'Video',icon:'🎬',badge:'b-info'},
  modul:{label:'Modul',icon:'📘',badge:'b-gold'},
  sop:  {label:'SOP',icon:'📋',badge:'b-ink'},
  menu: {label:'Menu Baru',icon:'🍽️',badge:'b-warn'},
  quiz: {label:'Kuis',icon:'📝',badge:'b-ok'}
};
var CATS = [
  {id:'onboarding',name:'Onboarding'},
  {id:'sop',name:'SOP & Standar'},
  {id:'menu',name:'Product Knowledge'},
  {id:'skill',name:'Skill & Service'},
  {id:'brand',name:'Brand & Culture'}
];

function divName(id){ if(id==='all') return 'Semua Divisi'; var d=DIVISIONS.find(function(x){return x.id===id}); return d?d.name:id; }
function divIcon(id){ if(id==='all') return '🌐'; var d=DIVISIONS.find(function(x){return x.id===id}); return d?d.icon:'•'; }
function uid(p){ return (p||'id')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts){ if(!ts) return '—'; var d=new Date(ts); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDT(ts){ if(!ts) return '—'; var d=new Date(ts); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'})+' '+d.toTimeString().slice(0,5); }
function toast(msg){ var t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(function(){t.remove()},2400); }

/* ---------- seed ---------- */
function seedDB(){
  var now = Date.now();
  var users = [
    {id:'u_howandi', name:'Howandi Chandra', role:'admin',   division:'all',      pin:'2045', title:'CEO / Nahkoda', active:true},
    {id:'u_ismail',  name:'Ismail Magribi',  role:'admin',   division:'all',      pin:'1234', title:'Store Manager', active:true},
    {id:'u_aditya',  name:'Aditya Setiadi',  role:'manager', division:'kitchen',  pin:'1234', title:'Head Chef', active:true},
    {id:'u_arif',    name:'Arif Rahman Harefa', role:'manager', division:'bar',   pin:'1234', title:'Head Bar', active:true},
    {id:'u_devani',  name:'Devani',          role:'manager', division:'sales',    pin:'1234', title:'Sales Manager', active:true},
    {id:'u_aurel',   name:'Aurel',           role:'manager', division:'marketing',pin:'1234', title:'Marketing & Digital', active:true},
    {id:'u_hengky',  name:'Hengky Fernando', role:'manager', division:'sales',    pin:'1234', title:'Event Manager', active:true},
    {id:'u_dina',    name:'Dina Mariana',    role:'manager', division:'finance',  pin:'1234', title:'CFO', active:true},
    {id:'u_christy', name:'Christy',         role:'staff',   division:'marketing',pin:'1234', title:'Social Media', active:true},
    {id:'u_indah',   name:'Indah',           role:'staff',   division:'marketing',pin:'1234', title:'Graphic Designer', active:true},
    {id:'u_cindy',   name:'Cindy Juliawati', role:'staff',   division:'finance',  pin:'1234', title:'Finance', active:true},
    {id:'u_novianti',name:'Novianti Kemala', role:'staff',   division:'finance',  pin:'1234', title:'Admin Purchasing', active:true},
    {id:'u_kru1',    name:'Kru Service 01',  role:'staff',   division:'service',  pin:'1234', title:'Waiter/ss', active:true},
    {id:'u_kru2',    name:'Kru Service 02',  role:'staff',   division:'service',  pin:'1234', title:'Waiter/ss', active:true},
    {id:'u_kru3',    name:'Kru Dapur 01',    role:'staff',   division:'kitchen',  pin:'1234', title:'Cook', active:true},
    {id:'u_kru4',    name:'Kru Bar 01',      role:'staff',   division:'bar',      pin:'1234', title:'Barista', active:true}
  ];

/* ---------- store ---------- */
function loadDB(){
  try{ var raw=localStorage.getItem(DB_KEY); if(raw){ DB=JSON.parse(raw); } }catch(e){}
  if(!DB) DB=seedDB();
  migrateDB();
  DIVISIONS=DB.divisions;
  saveDB(true);
}
function migrateDB(){
  if(!DB.divisions || !DB.divisions.length) DB.divisions=DEFAULT_DIVISIONS.map(function(d){return {id:d.id,name:d.name,icon:d.icon}});
  if(!DB.programs) DB.programs=[];
  if(!DB.progProg) DB.progProg={};
  if(!DB.settings) DB.settings={passingDefault:80};
  if(DB.settings.syncUrl==null) DB.settings.syncUrl='';
  if(DB.settings.syncKey==null) DB.settings.syncKey='';
  if(DB.settings.syncAuto==null) DB.settings.syncAuto=true;
  if(!DB.updatedAt) DB.updatedAt=Date.now();
  DB.version=2;
}
function saveDB(skipSync){
  try{
    if(!skipSync){ DB.updatedAt=Date.now(); }
    localStorage.setItem(DB_KEY, JSON.stringify(DB));
  }catch(e){ console.error('save fail',e); }
  if(!skipSync) scheduleSync();
}
function logAct(action, detail){
  DB.activity.unshift({ts:Date.now(), userId:(currentUser()?currentUser().id:'-'), action:action, detail:detail});
  if(DB.activity.length>500) DB.activity.length=500;
  saveDB();
}
function currentUser(){
  var sid=null; try{ sid=localStorage.getItem(SESSION_KEY); }catch(e){}
  if(!sid) return null;
  return DB.users.find(function(u){return u.id===sid && u.active;})||null;
}
function isAdmin(u){ return u && u.role==='admin'; }
function isManager(u){ return u && (u.role==='manager'||u.role==='admin'); }

/* ---------- progress helpers ---------- */
function getProg(userId, matId){
  var p=DB.progress[userId]; return p?p[matId]:null;
}
function setProg(userId, matId, data){
  if(!DB.progress[userId]) DB.progress[userId]={};
  var cur=DB.progress[userId][matId]||{};
  for(var k in data) cur[k]=data[k];
  DB.progress[userId][matId]=cur; saveDB();
}
function matsForUser(u){
  return DB.materials.filter(function(m){
    if(!m.published) return false;
    if(u.division==='all') return true;
    return m.division.indexOf('all')>-1 || m.division.indexOf(u.division)>-1;
  });
}
function isDone(u, m){
  var p=getProg(u.id, m.id);
  if(!p) return false;
  if(m.type==='quiz') return p.passed===true;
  return p.status==='done';
}
function userStats(u){
  var mats=matsForUser(u);
  var mand=mats.filter(function(m){return m.mandatory});
  var doneAll=mats.filter(function(m){return isDone(u,m)}).length;
  var doneMand=mand.filter(function(m){return isDone(u,m)}).length;
  return {total:mats.length, done:doneAll, mandTotal:mand.length, mandDone:doneMand,
    pct: mats.length? Math.round(doneAll/mats.length*100):0,
    mandPct: mand.length? Math.round(doneMand/mand.length*100):100,
    certified: mand.length>0 && doneMand===mand.length};
}

/* ---------- auth ---------- */
function renderLoginUsers(){
  var sel=document.getElementById('loginUser');
  var list=DB.users.filter(function(u){return u.active}).slice().sort(function(a,b){return a.name.localeCompare(b.name)});
  sel.innerHTML=list.map(function(u){
    return '<option value="'+u.id+'">'+esc(u.name)+' — '+esc(u.title||divName(u.division))+'</option>';
  }).join('');
}
function doLogin(){
  var id=document.getElementById('loginUser').value;
  var pin=document.getElementById('loginPin').value.trim();
  var u=DB.users.find(function(x){return x.id===id});
  var err=document.getElementById('loginErr');
  if(!u || u.pin!==pin){ err.textContent='PIN salah. Coba lagi atau hubungi Store Manager.'; err.style.display='block'; return; }
  err.style.display='none';
  try{ localStorage.setItem(SESSION_KEY, u.id); }catch(e){}
  document.getElementById('loginPin').value='';
  logAct('login', u.name+' naik kapal');
  VIEW = 'dashboard'; VIEW_ARG=null;
  showApp();
}
function doLogout(){
  logAct('logout', 'Turun kapal');
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
  document.getElementById('appView').style.display='none';
  document.getElementById('loginView').style.display='flex';
  renderLoginUsers();
}

/* ---------- material viewer ---------- */
function closeModal(){ PROG_CTX=null; document.getElementById('modalRoot').innerHTML=''; }
function modal(html, wide){
  document.getElementById('modalRoot').innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal'+(wide?' wide':'')+'">'+html+'</div></div>';
}
function ytId(url){
  if(!url) return null;
  var m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  return m?m[1]:null;
}
function openMaterial(id, progId){
  var u=currentUser(); var m=DB.materials.find(function(x){return x.id===id});
  if(!m) return;
  PROG_CTX = progId||null;
  var t=TYPES[m.type];
  var inScope = matsForUser(u).some(function(x){return x.id===m.id});
  OPEN_SCOPE = inScope;
  var done = PROG_CTX ? progItemDone(u, PROG_CTX, m.id) : isDone(u,m);
  var head='<div class="modal-head"><div><span class="badge '+t.badge+'">'+t.icon+' '+t.label+'</span>'+
    (m.mandatory?' <span class="badge b-bad">Wajib</span>':'')+
    (PROG_CTX?' <span class="badge b-info">📅 Program Bulanan</span>':'')+
    '<h3 style="margin-top:8px">'+esc(m.title)+'</h3>'+
    '<div style="font-size:12px;color:var(--muted);margin-top:4px">Untuk: '+m.division.map(divName).join(', ')+'</div></div>'+
    '<button class="modal-x" onclick="closeModal()">✕</button></div>';
  var body='';
  var scopeNote = inScope ? '' : '<div style="background:#E7EFFC;color:var(--info);border-radius:9px;padding:10px 13px;font-size:12.5px;font-weight:600;margin-bottom:12px">📖 Mode Baca — materi ini milik divisi lain. Kamu bebas mempelajarinya, tapi tidak masuk hitungan progress/sertifikasimu.</div>';
  if(m.type==='modul'){
    body='<div class="modul-body">'+esc(m.body)+'</div>'+doneBtn(m,done);
  }
  else if(m.type==='video'){
    var vid=ytId(m.videoUrl);
    body = vid
      ? '<div class="video-frame"><iframe src="https://www.youtube.com/embed/'+vid+'" allowfullscreen allow="accelerometer; autoplay; encrypted-media; picture-in-picture"></iframe></div>'
      : '<div class="card">Link video: <a href="'+esc(m.videoUrl)+'" target="_blank" rel="noopener">'+esc(m.videoUrl)+'</a></div>';
    if(m.desc) body+='<div style="font-size:13.5px;color:var(--muted);margin-bottom:12px">'+esc(m.desc)+'</div>';
    body+=doneBtn(m,done,'Saya sudah menonton video ini sampai selesai');
  }
  else if(m.type==='sop'){
    var p=getProg(u.id,m.id)||{};
    body='<div style="font-size:13px;color:var(--muted);margin-bottom:12px">Baca & centang setiap langkah. Setelah semua dicentang, konfirmasi komitmenmu di bawah.</div>';
    body+=m.steps.map(function(s,i){
      return '<label class="sop-step"><input type="checkbox" class="sopChk" '+(done?'checked disabled':'')+' onchange="sopCheck(\''+m.id+'\')"><div class="tx"><b>'+(i+1)+'.</b> '+esc(s)+'</div></label>';
    }).join('');
    if(done){
      body+='<div class="badge b-ok" style="margin-top:10px">✓ Dikonfirmasi '+fmtDT(p.completedAt)+'</div>';
    } else if(!inScope){
      body+='';
    } else {
      body+='<button id="sopAckBtn" class="btn btn-gold btn-block" style="margin-top:12px" disabled onclick="completeMaterial(\''+m.id+'\')">🖊️ Saya sudah membaca, paham, dan berkomitmen menjalankan SOP ini</button>';
    }
  }
  else if(m.type==='menu'){
    var mn=m.menu||{};
    body='<div class="menu-hero"><div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-dark)">'+esc(mn.category||'')+'</div>'+
      '<div class="nm">'+esc(mn.name||m.title)+'</div><div class="pr" style="color:var(--gold)">'+esc(mn.price||'')+'</div>'+
      '<div style="font-size:13.5px;margin-top:9px;line-height:1.6">'+esc(mn.desc||'')+'</div></div>'+
      '<div class="card" style="margin-bottom:12px"><div class="kv">'+
      '<div class="k">Komposisi</div><div>'+esc(mn.ingredients||'—')+'</div>'+
      '<div class="k">⚠️ Alergen</div><div><b>'+esc(mn.allergens||'—')+'</b></div>'+
      '<div class="k">Catatan Ops</div><div>'+esc(mn.notes||'—')+'</div></div></div>'+
      '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--gold2);margin-bottom:6px">💬 Selling Script (hafalkan gayanya, bukan kata per kata)</div>'+
      '<div class="script-box">'+esc(mn.selling||'—')+'</div>'+
      doneBtn(m,done,'Saya sudah mempelajari produk ini (komposisi, alergen, script)');
  }
  else if(m.type==='quiz'){
    body=renderQuizIntro(u,m);
  }
  modal(head+scopeNote+body, m.type==='quiz'||m.type==='menu');
}
function doneBtn(m,done,label){
  if(typeof OPEN_SCOPE!=='undefined' && OPEN_SCOPE===false) return '';
  if(done) return '<div style="margin-top:14px"><span class="badge b-ok">✓ Sudah diselesaikan</span></div>';
  return '<button class="btn btn-gold btn-block" style="margin-top:14px" onclick="completeMaterial(\''+m.id+'\')">✓ '+(label||'Tandai selesai')+'</button>';
}
function sopCheck(){
  var chks=document.querySelectorAll('.sopChk');
  var all=true; chks.forEach(function(c){ if(!c.checked) all=false; });
  var b=document.getElementById('sopAckBtn'); if(b) b.disabled=!all;
}
function completeMaterial(id){
  var u=currentUser(); var m=DB.materials.find(function(x){return x.id===id});
  setProg(u.id, id, {status:'done', completedAt:Date.now()});
  if(PROG_CTX) markProgDone(u.id, PROG_CTX, id, null);
  logAct('selesai', 'Menyelesaikan '+TYPES[m.type].label+': '+m.title);
  closeModal(); toast('✓ Materi selesai. Kerja bagus, Pelaut!');
  var st=userStats(u);
  if(st.certified && !u._certToasted){ toast('🏅 Semua materi wajib selesai — kamu tersertifikasi!'); }
  render();
}

/* ---------- quiz ---------- */
var quizState=null;
function renderQuizIntro(u,m){
  var p=getProg(u.id,m.id)||{};
  var h='';
  if(PROG_CTX && !progItemDone(u,PROG_CTX,m.id) && p.passed) h+='<div class="badge b-info" style="margin-bottom:10px">🔁 Refresher program bulan ini — kerjakan ulang meski dulu sudah lulus</div>';
  h+='<div class="card" style="margin-bottom:14px"><div class="kv">'+
    '<div class="k">Jumlah Soal</div><div>'+m.questions.length+' pertanyaan pilihan ganda</div>'+
    '<div class="k">Nilai Lulus</div><div>'+(m.passing||DB.settings.passingDefault)+'%</div>'+
    '<div class="k">Percobaan</div><div>'+(p.attempts||0)+'× '+(p.score!=null?('· skor terakhir <b>'+p.score+'%</b> '+(p.passed?'✅ LULUS':'❌ belum lulus')):'')+'</div></div></div>';
  if(OPEN_SCOPE===false){
    h+='<button class="btn btn-ghost btn-block" onclick="startQuiz(\''+m.id+'\',true)">🎯 Coba Kuis (Mode Latihan — skor tidak disimpan)</button>';
  } else {
    h+='<button class="btn btn-gold btn-block" onclick="startQuiz(\''+m.id+'\')">'+(p.attempts?'🔁 Ulangi Kuis':'▶️ Mulai Kuis')+'</button>';
  }
  return h;
}
function startQuiz(id, practice){
  var m=DB.materials.find(function(x){return x.id===id});
  quizState={matId:id, answers:new Array(m.questions.length).fill(null), practice:!!practice};
  var h='<div class="modal-head"><h3>📝 '+esc(m.title)+'</h3><button class="modal-x" onclick="closeModal()">✕</button></div>';
  h+=m.questions.map(function(q,qi){
    return '<div class="quiz-q"><div class="qt">'+(qi+1)+'. '+esc(q.q)+'</div>'+
      q.opts.map(function(o,oi){
        return '<label class="quiz-opt" id="q'+qi+'o'+oi+'"><input type="radio" name="q'+qi+'" onchange="pickAns('+qi+','+oi+')"> '+esc(o)+'</label>';
      }).join('')+'</div>';
  }).join('');
  h+='<button class="btn btn-gold btn-block" onclick="submitQuiz()">Kumpulkan Jawaban ✓</button>';
  modal(h, true);
}
function pickAns(qi,oi){
  quizState.answers[qi]=oi;
  var m=DB.materials.find(function(x){return x.id===quizState.matId});
  m.questions[qi].opts.forEach(function(_,i){
    var el=document.getElementById('q'+qi+'o'+i);
    if(el) el.classList.toggle('sel', i===oi);
  });
}
function submitQuiz(){
  var u=currentUser();
  var m=DB.materials.find(function(x){return x.id===quizState.matId});
  if(quizState.answers.some(function(a){return a===null})){ toast('⚠️ Masih ada soal yang belum dijawab'); return; }
  var correct=0;
  m.questions.forEach(function(q,i){ if(quizState.answers[i]===q.a) correct++; });
  var score=Math.round(correct/m.questions.length*100);
  var passing=m.passing||DB.settings.passingDefault;
  var passed=score>=passing;
  if(!quizState.practice){
    var p=getProg(u.id,m.id)||{};
    setProg(u.id, m.id, {attempts:(p.attempts||0)+1, score:score, passed:passed||p.passed===true, lastAt:Date.now(), completedAt: passed?Date.now():(p.completedAt||null)});
    if(PROG_CTX && passed) markProgDone(u.id, PROG_CTX, m.id, score);
    logAct('kuis', m.title+' — skor '+score+'% ('+(passed?'LULUS':'belum lulus')+')');
  }
  var h='<div class="modal-head"><h3>'+(quizState.practice?'🎯 Hasil Latihan':(passed?'🏅 Lulus!':'🌊 Belum Lulus'))+'</h3><button class="modal-x" onclick="closeModal();render()">✕</button></div>';
  h+='<div class="cert" style="margin-bottom:14px"><div class="h">Hasil Kuis</div><div class="n">'+score+'%</div>'+
    '<div style="font-size:13px;color:var(--muted)">'+correct+' dari '+m.questions.length+' benar · nilai lulus '+passing+'%</div>'+
    '<div style="margin-top:10px">'+(quizState.practice?'<span class="badge b-info">Mode Latihan — skor tidak disimpan</span>':(passed?'<span class="badge b-ok">✓ LULUS — standar tercapai</span>':'<span class="badge b-warn">Pelajari lagi materinya, lalu ulangi. Kamu pasti bisa!</span>'))+'</div></div>';
  h+='<div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px">Review Jawaban</div>';
  h+=m.questions.map(function(q,qi){
    var ua=quizState.answers[qi]; var ok=ua===q.a;
    return '<div class="quiz-q"><div class="qt">'+(qi+1)+'. '+esc(q.q)+' '+(ok?'✅':'❌')+'</div>'+
      q.opts.map(function(o,oi){
        var cls= oi===q.a?'correct':(oi===ua && !ok?'wrong':'');
        return '<div class="quiz-opt '+cls+'">'+esc(o)+(oi===q.a?' <b style="margin-left:auto;font-size:11px">JAWABAN BENAR</b>':'')+'</div>';
      }).join('')+'</div>';
  }).join('');
  h+='<button class="btn btn-ink btn-block" onclick="closeModal();render()">Selesai</button>';
  modal(h, true);
}

  var avgPct=Math.round(kru.reduce(function(s,k){return s+userStats(k).mandPct},0)/(kru.length||1));
  var h='<div class="topbar"><div><h2>🧭 Anjungan</h2><div class="sub">Pusat kendali training — kondisi standar kru secara keseluruhan</div></div></div>';
  h+='<div class="grid g4" style="margin-bottom:18px">'+
    '<div class="stat"><div class="v">'+kru.length+'</div><div class="l">Kru Aktif</div></div>'+
    '<div class="stat"><div class="v">'+certified+'</div><div class="l">Tersertifikasi</div></div>'+
    '<div class="stat"><div class="v">'+avgPct+'%</div><div class="l">Rata-rata Progress Wajib</div><div class="progress" style="margin-top:10px"><div style="width:'+avgPct+'%"></div></div></div>'+
    '<div class="stat"><div class="v">'+totalMat+'</div><div class="l">Materi Terbit</div></div></div>';
  h+='<div class="grid g2" style="margin-bottom:16px"><div class="card"><h3>Progress per Divisi</h3>';
  DIVISIONS.forEach(function(d){
    var dk=kru.filter(function(k){return k.division===d.id});
    if(!dk.length){ return; }
    var pct=Math.round(dk.reduce(function(s,k){return s+userStats(k).mandPct},0)/dk.length);
    h+='<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:4px"><span>'+d.icon+' '+d.name+' <span style="color:var(--muted);font-weight:500">('+dk.length+' kru)</span></span><b>'+pct+'%</b></div><div class="progress"><div style="width:'+pct+'%"></div></div></div>';
  });
  h+='</div><div class="card"><h3>⚠️ Kru yang Perlu Didorong (&lt;50% wajib)</h3>';
  var lagging=kru.filter(function(k){var s=userStats(k);return s.mandTotal>0 && s.mandPct<50}).sort(function(a,b){return userStats(a).mandPct-userStats(b).mandPct});
  if(!lagging.length) h+='<div class="empty" style="padding:20px">Semua kru di atas 50%. Kapal berlayar mulus. 🌊</div>';
  else lagging.slice(0,8).forEach(function(k){
    var s=userStats(k);
    h+='<div class="list-row"><div><b>'+esc(k.name)+'</b><div style="font-size:11px;color:var(--muted)">'+divName(k.division)+'</div></div><span class="badge b-bad">'+s.mandPct+'%</span></div>';
  });
  h+='</div></div>';
  var quizzes=DB.materials.filter(function(m){return m.type==='quiz'&&m.published});
  h+='<div class="card"><h3>Hasil Kuis per Materi</h3><div class="table-wrap" style="border:none"><table><thead><tr><th>Kuis</th><th>Peserta</th><th>Lulus</th><th>Rata-rata Skor</th></tr></thead><tbody>';
  quizzes.forEach(function(q){
    var taken=0, pass=0, sum=0;
    kru.forEach(function(k){ var p=getProg(k.id,q.id); if(p&&p.attempts){taken++; sum+=p.score; if(p.passed)pass++;} });
    h+='<tr><td style="font-weight:600">'+esc(q.title)+'</td><td>'+taken+'/'+kru.length+'</td><td>'+pass+'</td><td>'+(taken?Math.round(sum/taken)+'%':'—')+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function saveMaterial(id, type){
  var title=document.getElementById('fTitle').value.trim();
  if(!title){ toast('⚠️ Judul wajib diisi'); return; }
  var divs=[]; document.querySelectorAll('.fDiv:checked').forEach(function(c){divs.push(c.value)});
  if(!divs.length){ toast('⚠️ Pilih minimal satu divisi'); return; }
  if(divs.indexOf('all')>-1) divs=['all'];
  var m = id ? DB.materials.find(function(x){return x.id===id}) : {id:uid('m'), type:type, createdAt:Date.now(), published:true};
  m.title=title; m.division=divs;
  m.cat=document.getElementById('fCat').value;
  m.mandatory=document.getElementById('fMand').value==='1';
  if(type==='modul') m.body=document.getElementById('fBody').value;
  if(type==='video'){ m.videoUrl=document.getElementById('fVideo').value.trim(); m.desc=document.getElementById('fDesc').value; }
  if(type==='sop'){
    m.steps=document.getElementById('fSteps').value.split('\n').map(function(s){return s.trim()}).filter(Boolean);
    if(!m.steps.length){ toast('⚠️ SOP butuh minimal satu langkah'); return; }
  }
  if(type==='menu'){
    m.menu={name:document.getElementById('fMName').value, price:document.getElementById('fMPrice').value,
      category:document.getElementById('fMCat').value, desc:document.getElementById('fMDesc').value,
      ingredients:document.getElementById('fMIng').value, allergens:document.getElementById('fMAll').value,
      selling:document.getElementById('fMSell').value, notes:document.getElementById('fMNotes').value};
  }
  if(type==='quiz'){
    var qs=editQ.filter(function(q){return q.q.trim() && q.opts.filter(function(o){return o.trim()}).length>=2});
    if(!qs.length){ toast('⚠️ Kuis butuh minimal satu soal lengkap'); return; }
    m.questions=qs.map(function(q){return {q:q.q.trim(), opts:q.opts.map(function(o){return o.trim()}).filter(Boolean), a:Math.min(q.a, q.opts.filter(Boolean).length-1)}});
    m.passing=parseInt(document.getElementById('fPassing').value)||DB.settings.passingDefault;
  }
  if(!id) DB.materials.push(m);
  logAct(id?'edit_materi':'tambah_materi', m.title);
  saveDB(); closeModal(); render(); toast('💾 Materi tersimpan');
}

   V2: STRUKTUR ORGANISASI · PROGRAM BULANAN · SYNC
   ===================================================== */
var PROG_CTX=null;
var OPEN_SCOPE=true;
var SYNC_TIMER=null;
var SYNC_STATE='off';

/* ---------- bulan helpers ---------- */
function bulanLabel(mk){ var d=new Date(mk+'-01T00:00:00'); return d.toLocaleDateString('id-ID',{month:'long',year:'numeric'}); }
function currentMonthKey(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function nextMonthKey(mk){ var d=new Date(mk+'-01T00:00:00'); d.setMonth(d.getMonth()+1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function lastDayOf(mk){ var d=new Date(mk+'-01T00:00:00'); var ld=new Date(d.getFullYear(), d.getMonth()+1, 0); return ld.getFullYear()+'-'+String(ld.getMonth()+1).padStart(2,'0')+'-'+String(ld.getDate()).padStart(2,'0'); }

/* ---------- program helpers ---------- */
function progMats(p){ return p.materialIds.map(function(id){return DB.materials.find(function(m){return m.id===id})}).filter(function(m){return m && m.published}); }
function progMatsForUser(u,p){
  return progMats(p).filter(function(m){
    if(u.division==='all') return true;
    return m.division.indexOf('all')>-1 || m.division.indexOf(u.division)>-1;
  });
}
function progItemDone(u,progId,matId){ var pp=DB.progProg[u.id]; var r=pp&&pp[progId]&&pp[progId][matId]; return !!(r&&r.done); }
function markProgDone(userId,progId,matId,score){
  if(!DB.progProg[userId]) DB.progProg[userId]={};
  if(!DB.progProg[userId][progId]) DB.progProg[userId][progId]={};
  var r={done:true, at:Date.now()}; if(score!=null) r.score=score;
  DB.progProg[userId][progId][matId]=r; saveDB();
}
function programUserStats(u,p){
  var mats=progMatsForUser(u,p);
  var done=mats.filter(function(m){return progItemDone(u,p.id,m.id)}).length;
  return {total:mats.length, done:done, pct: mats.length?Math.round(done/mats.length*100):100};
}
function programAvg(p){
  var kru=DB.users.filter(function(k){return k.active && k.role!=='admin'});
  var vals=[]; kru.forEach(function(k){ var s=programUserStats(k,p); if(s.total>0) vals.push(s.pct); });
  return vals.length? Math.round(vals.reduce(function(a,b){return a+b},0)/vals.length) : 0;
}

/* ---------- VIEW: program bulanan (semua kru) ---------- */
function vProgram(u){
  var progs=DB.programs.slice().sort(function(a,b){return b.bulan.localeCompare(a.bulan)});
  var h='<div class="topbar"><div><h2>📅 Program Bulanan</h2><div class="sub">Training baru & refresher tiap bulan — standar dijaga terus, bukan sekali jalan</div></div></div>';
  if(!progs.length) return h+'<div class="empty"><div class="big">🗓️</div>Belum ada program bulanan. '+(isAdmin(u)?'Buat di menu Kelola Program.':'Tunggu pengumuman dari manajemen ya!')+'</div>';
  progs.forEach(function(p){
    var mats=progMatsForUser(u,p);
    var st=programUserStats(u,p);
    var isCur=p.bulan===currentMonthKey();
    var over=new Date(p.deadline+'T23:59:59')<new Date();
    h+='<div class="card" style="margin-bottom:16px'+(isCur?';border:1.5px solid var(--gold2)':'')+'">';

function saveProgram(id){
  var bulan=document.getElementById('pBulan').value;

  var ids=[]; document.querySelectorAll('.pMat:checked').forEach(function(c){ids.push(c.value)});
  if(!ids.length){ toast('⚠️ Pilih minimal satu materi'); return; }
  var p = id ? DB.programs.find(function(x){return x.id===id}) : {id:uid('p'), createdAt:Date.now()};

  p.note=document.getElementById('pNote').value; p.materialIds=ids;

function delProgram(id){

  DB.programs=DB.programs.filter(function(x){return x.id!==id});
  Object.keys(DB.progProg).forEach(function(uid){ delete DB.progProg[uid][id]; });
  logAct('hapus_program', p.title); saveDB(); render(); toast('Program dihapus');
}

  DB.programs.push({id:uid('p'), bulan:nb, title:'Program '+bulanLabel(nb), deadline:lastDayOf(nb),
    note:p.note, materialIds:p.materialIds.slice(), createdAt:Date.now()});

  saveDB(); render(); toast('📄 Program '+bulanLabel(nb)+' dibuat — silakan edit isinya');

/* ---------- SYNC ENGINE (Google Apps Script backend) ---------- */
function setSyncBadge(state){
  SYNC_STATE=state;
  var d=document.getElementById('syncDot'); if(d) d.className='sync-dot '+state;
  var t=document.getElementById('syncTxt'); if(t) t.textContent={ok:'tersinkron',pending:'menunggu…',error:'gagal',off:'off'}[state]||state;
  var s=document.getElementById('syncStatusLine');
  if(s) s.innerHTML='<span class="sync-dot '+state+'"></span> '+({ok:'Tersinkron dengan server',pending:'Perubahan menunggu dikirim…',error:'Gagal terhubung — cek URL/kunci/koneksi',off:'Belum terhubung'}[state]||state);
}
function scheduleSync(){
  if(!DB.settings || !DB.settings.syncUrl || !DB.settings.syncAuto) return;
  setSyncBadge('pending');
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER=setTimeout(function(){ pushDB(false); }, 3000);
}
function pushDB(manual){
  var url=DB.settings.syncUrl;
  if(!url){ if(manual) toast('⚠️ Isi URL server dulu di pengaturan'); return; }
  setSyncBadge('pending');
  try{
    fetch(url, {method:'POST', body: JSON.stringify({action:'push', key:DB.settings.syncKey||'', db:DB})})
      .then(function(r){return r.json()})
      .then(function(res){
        if(res && res.ok){ setSyncBadge('ok'); if(manual) toast('☁️ Data terkirim ke server'); }
        else { setSyncBadge('error'); if(manual) toast('❌ Server menolak: '+(res&&res.error?res.error:'cek kunci')); }
      })
      .catch(function(){ setSyncBadge('error'); if(manual) toast('❌ Gagal kirim — cek koneksi/URL'); });
  }catch(e){ setSyncBadge('error'); }
}
function pullDB(silent){
  var url=DB.settings.syncUrl;
  if(!url){ if(!silent) toast('⚠️ Isi URL server dulu di pengaturan'); return; }
  try{
    fetch(url+(url.indexOf('?')>-1?'&':'?')+'action=pull&key='+encodeURIComponent(DB.settings.syncKey||''))
      .then(function(r){return r.json()})
      .then(function(res){
        if(res && res.ok && res.db){
          if((res.db.updatedAt||0) > (DB.updatedAt||0)){
            var keep={u:DB.settings.syncUrl, k:DB.settings.syncKey, a:DB.settings.syncAuto};
            DB=res.db; migrateDB();
            DB.settings.syncUrl=keep.u; DB.settings.syncKey=keep.k; DB.settings.syncAuto=keep.a;
            DIVISIONS=DB.divisions;
            saveDB(true);
            if(currentUser()) render(); else renderLoginUsers();
            if(!silent) toast('☁️ Data terbaru diambil dari server');
          } else if(!silent) toast('✓ Data lokal sudah paling baru');
          setSyncBadge('ok');
        } else if(res && res.ok){
          if(!silent) toast('Server masih kosong — klik "Kirim ke Server" dulu dari device utama');
          setSyncBadge('ok');
        } else { setSyncBadge('error'); if(!silent) toast('❌ Server menolak: '+(res&&res.error?res.error:'cek kunci')); }
      })
      .catch(function(){ setSyncBadge('error'); if(!silent) toast('❌ Gagal ambil data — cek koneksi/URL'); });
  }catch(e){ setSyncBadge('error'); }
}
function testSync(){
  var url=document.getElementById('sUrl').value.trim();
  var key=document.getElementById('sKey').value.trim();
  if(!url){ toast('⚠️ Isi URL dulu'); return; }
  toast('⏳ Menguji koneksi…');
  try{
    fetch(url+(url.indexOf('?')>-1?'&':'?')+'key='+encodeURIComponent(key))
      .then(function(r){return r.json()})
      .then(function(res){ toast(res&&res.ok?'✅ Terhubung! Server aktif.':'❌ Server merespon tapi kunci salah'); })
      .catch(function(){ toast('❌ Tidak terhubung — cek URL & deployment'); });
  }catch(e){ toast('❌ Tidak terhubung'); }
}

  DB.settings.syncUrl=document.getElementById('sUrl').value.trim();

    'Di Sheet itu, buka menu <b>Extensions → Apps Script</b>.',
    'Hapus semua isi editor, lalu tempel seluruh isi file <b>Code.gs</b> yang gue sertakan.',
    'Ganti nilai <b>SECRET</b> di baris paling atas dengan kunci rahasia kalian sendiri, lalu simpan (ikon 💾).',
    'Klik <b>Deploy → New deployment</b> → pilih tipe <b>Web app</b>.',
    '<b>Execute as: Me</b> · <b>Who has access: Anyone</b> → klik Deploy → izinkan akses akun Google lo.',
    'Salin <b>Web app URL</b> (berakhiran /exec) → tempel ke kolom URL di atas, isi kunci yang sama → Simpan Pengaturan.',
    'Dari device utama (yang datanya paling lengkap), klik <b>⬆️ Kirim ke Server</b> sekali. Di device lain: isi URL & kunci yang sama → <b>⬇️ Ambil dari Server</b>. Selesai — selanjutnya auto-sync jalan sendiri.'
  ];
  h+='<div class="card"><h3>🛠️ Panduan Setup Backend (± 5 menit, sekali saja)</h3>'+
    steps.map(function(st,i){return '<div class="guide-step"><div class="n">'+(i+1)+'</div><div>'+st+'</div></div>'}).join('')+
    '<div style="font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.6">Catatan: sistem tetap jalan penuh saat offline (data tersimpan di device) dan tersinkron begitu online lagi. Prinsipnya <i>last-write-wins</i> — kalau dua admin mengedit materi bersamaan di device berbeda, perubahan terakhir yang menang. Di Google Sheet juga otomatis dibuat tab <b>"Rekap Progress"</b> yang bisa lo baca & olah langsung tanpa buka app — tab <b>"DB"</b> jangan diedit manual.</div></div>';
  return h;
}
function exportJSON(){
  var data=JSON.stringify(DB, null, 1);
  try{
    var blob=new Blob([data],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='akademi_laksamana_backup_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    toast('📦 Backup diunduh');
  }catch(e){
    modal('<div class="modal-head"><h3>Backup JSON</h3><button class="modal-x" onclick="closeModal()">✕</button></div><div class="field"><textarea rows="14" onclick="this.select()">'+esc(data)+'</textarea></div><div style="font-size:12px;color:var(--muted)">Salin semua teks di atas dan simpan sebagai file .json</div>', true);
  }
}
function importJSON(){
  modal('<div class="modal-head"><h3>Pulihkan dari Backup</h3><button class="modal-x" onclick="closeModal()">✕</button></div>'+
    '<div class="field"><label>Tempel isi file backup .json di sini</label><textarea id="impTxt" rows="12" placeholder="{ ... }"></textarea></div>'+
    '<div style="font-size:12.5px;color:var(--bad);margin-bottom:12px">⚠️ Ini akan MENGGANTI seluruh data di device ini dengan isi backup.</div>'+
    '<button class="btn btn-gold btn-block" onclick="doImportJSON()">Pulihkan Data</button>', true);
}
function doImportJSON(){
  try{
    var d=JSON.parse(document.getElementById('impTxt').value);
    if(!d.users || !d.materials) throw new Error('format tidak dikenal');
    DB=d; migrateDB(); DIVISIONS=DB.divisions; saveDB(true);
    logAct('restore','Data dipulihkan dari backup JSON');
    closeModal(); render(); toast('✅ Data berhasil dipulihkan');
  }catch(e){ toast('❌ File backup tidak valid: '+e.message); }
}



/* ---------- VIEW: perpustakaan (semua divisi) ---------- */
var perpusFilter={q:'', div:'all', type:'all'};
function setPerpus(k,v){ perpusFilter[k]=v; render(); }
function perpusSearch(v){ perpusFilter.q=v; renderPerpusGrid(); }
function vPerpus(u){
  var h='<div class="topbar"><div><h2>📖 Perpustakaan Laksamana</h2><div class="sub">Semua materi training lintas divisi — belajar apa pun, kapan pun. Materi di luar divisimu terbuka dalam Mode Baca.</div></div></div>';
  h+='<div class="field" style="max-width:420px"><input placeholder="🔍 Cari judul materi…" value="'+esc(perpusFilter.q)+'" oninput="perpusSearch(this.value)"></div>';
  h+='<div class="chip-row"><button class="chip'+(perpusFilter.div==='all'?' active':'')+'" onclick="setPerpus(\'div\',\'all\')">🌐 Semua Divisi</button>'+
    DIVISIONS.map(function(d){
      return '<button class="chip'+(perpusFilter.div===d.id?' active':'')+'" onclick="setPerpus(\'div\',\''+d.id+'\')">'+d.icon+' '+esc(d.name)+'</button>';
    }).join('')+'</div>';
  h+='<div class="chip-row"><button class="chip'+(perpusFilter.type==='all'?' active':'')+'" onclick="setPerpus(\'type\',\'all\')">Semua Tipe</button>'+
    Object.keys(TYPES).map(function(k){
      return '<button class="chip'+(perpusFilter.type===k?' active':'')+'" onclick="setPerpus(\'type\',\''+k+'\')">'+TYPES[k].icon+' '+TYPES[k].label+'</button>';
    }).join('')+'</div>';
  h+='<div id="perpusGrid"></div>';
  setTimeout(renderPerpusGrid,0);
  return h;
}
function renderPerpusGrid(){
  var el=document.getElementById('perpusGrid'); if(!el) return;
  var u=currentUser();
  var q=perpusFilter.q.toLowerCase();
  var mine=matsForUser(u).map(function(m){return m.id});
  var list=DB.materials.filter(function(m){
    if(!m.published) return false;
    if(perpusFilter.type!=='all' && m.type!==perpusFilter.type) return false;
    if(perpusFilter.div!=='all' && m.division.indexOf('all')===-1 && m.division.indexOf(perpusFilter.div)===-1) return false;
    if(q && m.title.toLowerCase().indexOf(q)===-1) return false;
    return true;
  }).sort(function(a,b){return b.createdAt-a.createdAt});
  if(!list.length){ el.innerHTML='<div class="empty"><div class="big">🌊</div>Tidak ada materi yang cocok dengan pencarian.</div>'; return; }
  el.innerHTML='<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+list.length+' materi ditemukan</div>'+
    '<div class="grid g3">'+list.map(function(m){
      var t=TYPES[m.type]; var inScope=mine.indexOf(m.id)>-1; var done=inScope&&isDone(u,m);
      return '<div class="mat-card" onclick="openMaterial(\''+m.id+'\')">'+
        (done?'<span class="mat-done badge b-ok">✓ Selesai</span>':(!inScope?'<span class="mat-done badge b-info">📖 Mode Baca</span>':''))+
        '<div class="ty">'+t.icon+'</div><div class="ti">'+esc(m.title)+'</div>'+
        '<div class="me"><span class="badge '+t.badge+'">'+t.label+'</span>'+
        (m.mandatory&&inScope?'<span class="badge b-bad">Wajib</span>':'')+
        '<span class="badge b-mut">'+m.division.map(divIcon).join(' ')+'</span></div></div>';
    }).join('')+'</div>';
}

/* ---------- init ---------- */
loadDB();
renderLoginUsers();
if(currentUser()){ showApp(); }
if(DB.settings.syncUrl && DB.settings.syncAuto){ pullDB(true); }
</script>
